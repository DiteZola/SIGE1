async function pgPatrimonio(){if(!['director','subdirAdm'].includes(CU.perfil)){notify('Sem permissão!','er');return}const s=await db.collection('escolas').doc(CSI).collection('patrimonio').get();let r='';let totalVal=0;s.forEach(d=>{const p=d.data();totalVal+=(p.valor||0);r+=`<tr><td>${p.codigo||''}</td><td><strong>${p.descricao}</strong></td><td>${p.categoria||''}</td><td>${p.quantidade||1}</td><td><span class="badge ${p.estado==='Bom'?'b-ok':p.estado==='Regular'?'b-wn':'b-dg'}">${p.estado||'Bom'}</span></td><td>${p.localizacao||''}</td><td>${(p.valor||0).toLocaleString()} Kz</td><td><button class="btn btn-sm btn-inf" onclick="editPat('${d.id}')">✏️</button> <button class="btn btn-sm btn-s" onclick="delC('patrimonio','${d.id}',pgPatrimonio)">🗑️</button></td></tr>`});$('eC').innerHTML=`<div class="sg"><div class="sc"><div class="sci tl">🏗️</div><div class="scn"><h3>${s.size}</h3><p>Itens</p></div></div><div class="sc"><div class="sci yl">💰</div><div class="scn"><h3 style="font-size:1.1em">${totalVal.toLocaleString()}</h3><p>Kz Valor Total</p></div></div></div><div class="card"><div class="card-h"><h3>🏗️ Património</h3><div class="btn-group"><button class="btn btn-sm btn-ok" onclick="patXL()">📊</button><button class="btn btn-sm btn-s" onclick="patPDF()">📄</button><button class="btn btn-p" onclick="addPat()">➕</button></div></div><div class="card-b"><div class="tbl"><table><tr><th>Código</th><th>Descrição</th><th>Categoria</th><th>Qtd</th><th>Estado</th><th>Local</th><th>Valor</th><th></th></tr>${r||'<tr><td colspan="8">—</td></tr>'}</table></div></div></div>`}
function addPat(pid){$('mB').className='modal lg';$('mB').innerHTML=`<div class="mh"><h3>${pid?'✏️':'➕'} Item Patrimonial</h3><button class="mx" onclick="cM()">×</button></div><div class="mb"><div class="fr"><div class="fg"><label>Código</label><input id="ptCd"></div><div class="fg"><label>Descrição <span class="req">*</span></label><input id="ptDs"></div></div><div class="fr3"><div class="fg"><label>Categoria</label><select id="ptCt"><option>Mobiliário</option><option>Equipamento</option><option>Material Didáctico</option><option>Informática</option><option>Veículo</option><option>Imóvel</option><option>Outro</option></select></div><div class="fg"><label>Qtd</label><input type="number" id="ptQt" value="1"></div><div class="fg"><label>Estado</label><select id="ptEs"><option>Bom</option><option>Regular</option><option>Mau</option><option>Avariado</option></select></div></div><div class="fr"><div class="fg"><label>Localização</label><input id="ptLc"></div><div class="fg"><label>Valor (Kz)</label><input type="number" id="ptVl"></div></div><div class="fr"><div class="fg"><label>Data Aquisição</label><input type="date" id="ptDt"></div><div class="fg"><label>Fornecedor</label><input id="ptFr"></div></div></div><div class="mf"><button class="btn btn-out" onclick="cM()">Cancelar</button><button class="btn btn-p" onclick="svPat('${pid||''}')">💾</button></div>`;oM();if(pid)ldPat(pid)}
async function ldPat(id){const d=await db.collection('escolas').doc(CSI).collection('patrimonio').doc(id).get();if(!d.exists)return;const p=d.data();$('ptCd').value=p.codigo||'';$('ptDs').value=p.descricao||'';$('ptCt').value=p.categoria||'';$('ptQt').value=p.quantidade||1;$('ptEs').value=p.estado||'Bom';$('ptLc').value=p.localizacao||'';$('ptVl').value=p.valor||'';$('ptDt').value=p.dataAquisicao||'';$('ptFr').value=p.fornecedor||''}
async function svPat(pid){const ds=$('ptDs').value.trim();if(!ds){notify('Descrição!','er');return}const d={codigo:$('ptCd').value.trim(),descricao:ds,categoria:$('ptCt').value,quantidade:parseInt($('ptQt').value)||1,estado:$('ptEs').value,localizacao:$('ptLc').value.trim(),valor:parseFloat($('ptVl').value)||0,dataAquisicao:$('ptDt').value,fornecedor:$('ptFr').value.trim()};if(pid)await db.collection('escolas').doc(CSI).collection('patrimonio').doc(pid).update(d);else{d.criadoEm=ts();await db.collection('escolas').doc(CSI).collection('patrimonio').add(d)}logAct((pid?'Editou':'Cadastrou')+' item patrimonial: '+ds);notify('OK','ok');cM();pgPatrimonio()}
function editPat(id){addPat(id)}
async function patXL(){const s=await db.collection('escolas').doc(CSI).collection('patrimonio').get();const d=[['Código','Descrição','Categoria','Qtd','Estado','Local','Valor','Data Aquis.','Fornecedor']];s.forEach(x=>{const p=x.data();d.push([p.codigo,p.descricao,p.categoria,p.quantidade,p.estado,p.localizacao,p.valor,p.dataAquisicao,p.fornecedor])});const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),'Património');XLSX.writeFile(wb,'Patrimonio.xlsx');notify('XLSX!','ok')}
async function patPDF(){const{jsPDF}=window.jspdf;const pdf=new jsPDF('l');pdf.setFontSize(13);pdf.text('INVENTÁRIO PATRIMONIAL - '+CS.nome,148,12,{align:'center'});const s=await db.collection('escolas').doc(CSI).collection('patrimonio').get();const body=[];let totalV=0;s.forEach(x=>{const p=x.data();totalV+=(p.valor||0);body.push([p.codigo,p.descricao,p.categoria,p.quantidade,p.estado,p.localizacao,(p.valor||0).toLocaleString()])});pdf.autoTable({head:[['Cód','Descrição','Categoria','Qtd','Estado','Local','Valor (Kz)']],body,startY:20,theme:'grid',headStyles:{fillColor:[26,35,126]},styles:{fontSize:8}});pdf.text('VALOR TOTAL: '+totalV.toLocaleString()+' Kz',15,pdf.lastAutoTable.finalY+10);pdf.save('Patrimonio.pdf');notify('PDF!','ok')}

// ===== FALTAS FUNCIONÁRIOS =====
async function pgFaltasF(){const[us,fs]=await Promise.all([db.collection('escolas').doc(CSI).collection('usuarios').get(),db.collection('escolas').doc(CSI).collection('faltas').get()]);const fp={};fs.forEach(d=>{fp[d.data().userId]=(fp[d.data().userId]||0)+1});const sorted=[...us.docs].sort((a,b)=>(a.data().nome||'').localeCompare(b.data().nome||''));let r='';sorted.forEach(d=>{const u=d.data();r+=`<tr><td>${u.nome}</td><td><span class="badge b-p">${PN[u.perfil]||u.perfil}</span></td><td><strong>${fp[d.id]||0}</strong></td><td><span class="badge ${u.estado==='ativo'?'b-ok':'b-wn'}">${u.estado||'ativo'}</span></td><td><button class="btn btn-sm btn-s" onclick="regFalta('${d.id}')">➕ Falta</button> <button class="btn btn-sm btn-inf" onclick="verFaltas('${d.id}','${u.nome.replace(/'/g,"\\'")}')">👁️</button></td></tr>`});$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>📊 Faltas de Funcionários</h3><button class="btn btn-sm btn-ok" onclick="faltasXL()">📊 XLSX</button></div><div class="card-b"><div class="tbl"><table><tr><th>Nome</th><th>Perfil</th><th>Total Faltas</th><th>Estado</th><th></th></tr>${r}</table></div></div></div>`}
async function regFalta(uid){await db.collection('escolas').doc(CSI).collection('faltas').add({userId:uid,data:new Date().toISOString().split('T')[0],justificada:false,criadoEm:ts()});logAct('Registou falta');notify('Falta registada!','ok');pgFaltasF()}
async function verFaltas(uid,nm){const s=await db.collection('escolas').doc(CSI).collection('faltas').where('userId','==',uid).get();let r='';s.forEach(d=>{const f=d.data();r+=`<tr><td>${f.data}</td><td>${f.justificada?'✅ Sim':'❌ Não'}</td><td><button class="btn btn-sm btn-wn" onclick="justFalta('${d.id}')">Justificar</button> <button class="btn btn-sm btn-s" onclick="db.collection('escolas').doc(CSI).collection('faltas').doc('${d.id}').delete().then(()=>verFaltas('${uid}','${nm.replace(/'/g,"\\'")}'))">🗑️</button></td></tr>`});$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>📋 Faltas — ${nm} (${s.size})</h3><button class="mx" onclick="cM()">×</button></div><div class="mb"><table><tr><th>Data</th><th>Just.</th><th></th></tr>${r||'<tr><td colspan="3">Sem faltas</td></tr>'}</table></div>`;oM()}
async function justFalta(id){await db.collection('escolas').doc(CSI).collection('faltas').doc(id).update({justificada:true});notify('Justificada!','ok')}
async function faltasXL(){const[us,fs]=await Promise.all([db.collection('escolas').doc(CSI).collection('usuarios').get(),db.collection('escolas').doc(CSI).collection('faltas').get()]);const fp={};fs.forEach(d=>{fp[d.data().userId]=(fp[d.data().userId]||0)+1});const d=[['Nome','Perfil','Faltas','Estado']];us.forEach(x=>{const u=x.data();d.push([u.nome,PN[u.perfil]||u.perfil,fp[x.id]||0,u.estado])});const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),'Faltas');XLSX.writeFile(wb,'Faltas.xlsx');notify('XLSX!','ok')}

// ===== EVENTOS =====
async function pgEventos(){const s=await db.collection('escolas').doc(CSI).collection('eventos').orderBy('data','desc').get();let r='';s.forEach(d=>{const ev=d.data();const up=ev.data>=new Date().toISOString().split('T')[0];r+=`<tr><td><span class="badge ${up?'b-wn':'b-p'}">${ev.data||''}</span></td><td><strong>${ev.titulo||''}</strong></td><td>${ev.tipo||''}</td><td>${ev.descricao||''}</td><td><button class="btn btn-sm btn-s" onclick="delC('eventos','${d.id}',pgEventos)">🗑️</button></td></tr>`});$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>📅 Eventos</h3><button class="btn btn-p" onclick="addEv()">➕</button></div><div class="card-b"><div class="tbl"><table><tr><th>Data</th><th>Título</th><th>Tipo</th><th>Descrição</th><th></th></tr>${r||'<tr><td colspan="5">—</td></tr>'}</table></div></div></div>`}
function addEv(){$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>➕ Evento</h3><button class="mx" onclick="cM()">×</button></div><div class="mb"><div class="fg"><label>Título <span class="req">*</span></label><input id="evT"></div><div class="fr"><div class="fg"><label>Data <span class="req">*</span></label><input type="date" id="evD"></div><div class="fg"><label>Tipo</label><select id="evP"><option>Reunião</option><option>Conselho de Notas</option><option>Feriado</option><option>Exame</option><option>Entrega de Boletins</option><option>Formação</option><option>Outro</option></select></div></div><div class="fg"><label>Descrição</label><textarea id="evDs" rows="2"></textarea></div></div><div class="mf"><button class="btn btn-p" onclick="svEv()">💾</button></div>`;oM()}
async function svEv(){const t=$('evT').value.trim();if(!t||!$('evD').value){notify('Preencha!','er');return}await db.collection('escolas').doc(CSI).collection('eventos').add({titulo:t,data:$('evD').value,tipo:$('evP').value,descricao:$('evDs').value.trim(),criadoEm:ts()});logAct('Criou evento: '+t);notify('Criado!','ok');cM();pgEventos()}

// ===== RELATÓRIOS =====
async function pgRels(){$('eC').innerHTML=`<div class="sg">
<div class="sc dash-card-link" onclick="exAlXL()" style="flex-direction:column;text-align:center;padding:24px"><div style="font-size:2em">👨‍🎓</div><p style="font-weight:700;margin-top:6px">Lista de Alunos (XLSX)</p></div>
<div class="sc dash-card-link" onclick="exUsXL()" style="flex-direction:column;text-align:center;padding:24px"><div style="font-size:2em">👥</div><p style="font-weight:700;margin-top:6px">Lista de Funcionários (XLSX)</p></div>
<div class="sc dash-card-link" onclick="finPDF()" style="flex-direction:column;text-align:center;padding:24px"><div style="font-size:2em">💰</div><p style="font-weight:700;margin-top:6px">Relatório Financeiro (PDF)</p></div>
<div class="sc dash-card-link" onclick="patPDF()" style="flex-direction:column;text-align:center;padding:24px"><div style="font-size:2em">🏗️</div><p style="font-weight:700;margin-top:6px">Inventário Património (PDF)</p></div>
<div class="sc dash-card-link" onclick="faltasXL()" style="flex-direction:column;text-align:center;padding:24px"><div style="font-size:2em">📊</div><p style="font-weight:700;margin-top:6px">Faltas Funcionários (XLSX)</p></div>
<div class="sc dash-card-link" onclick="relGeral()" style="flex-direction:column;text-align:center;padding:24px"><div style="font-size:2em">📋</div><p style="font-weight:700;margin-top:6px">Relatório Geral (PDF)</p></div>
</div>`}
async function exUsXL(){const s=await db.collection('escolas').doc(CSI).collection('usuarios').get();const d=[['Nome','Perfil','BI','Género','Idade','Habilitações','Categoria','Nº Agente','INSS','Telefone','Email','Estado']];const sorted=[...s.docs].sort((a,b)=>(a.data().nome||'').localeCompare(b.data().nome||''));sorted.forEach(x=>{const u=x.data();d.push([u.nome,PN[u.perfil]||u.perfil,u.bi,u.genero,calcIdade(u.nascimento),u.habilitacoes,u.categoria,u.agente,u.inss,u.telefone,u.email,u.estado])});const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),'Funcionários');XLSX.writeFile(wb,`Funcionarios_${CS.nome}.xlsx`);notify('XLSX!','ok')}
async function relGeral(){const{jsPDF}=window.jspdf;const pdf=new jsPDF();pdf.setFontSize(15);pdf.text('RELATÓRIO GERAL - '+CS.nome,105,15,{align:'center'});pdf.setFontSize(9);pdf.text('Data: '+new Date().toLocaleDateString('pt-AO'),105,23,{align:'center'});const[als,uss]=await Promise.all([db.collection('escolas').doc(CSI).collection('alunos').get(),db.collection('escolas').doc(CSI).collection('usuarios').get()]);let y=35;pdf.setFontSize(10);pdf.text(`Total de Alunos: ${als.size}`,15,y);y+=6;pdf.text(`Total de Funcionários: ${uss.size}`,15,y);y+=10;const st={};als.forEach(d=>{const a=d.data();if(!st[a.classe])st[a.classe]={t:0,m:0,f:0};st[a.classe].t++;a.genero==='M'?st[a.classe].m++:st[a.classe].f++});pdf.autoTable({head:[['Classe','Total','♂','♀']],body:Object.entries(st).sort().map(([c,v])=>[c,v.t,v.m,v.f]),startY:y,theme:'grid',headStyles:{fillColor:[26,35,126]}});pdf.save(`Relatorio_${CS.nome}.pdf`);notify('PDF!','ok')}

// ===== LOGS (Director only) =====
async function pgLogs(){const s=await db.collection('escolas').doc(CSI).collection('logs').orderBy('criadoEm','desc').limit(100).get();let r='';s.forEach(d=>{const l=d.data();r+=`<div class="log-item"><span class="log-time">${l.data?new Date(l.data).toLocaleString('pt-AO',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):''}</span><span><strong>${l.usuario}</strong> <span class="badge b-p" style="margin-left:4px">${PN[l.perfil]||l.perfil||''}</span> — ${l.acao}</span></div>`});$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>📋 Registo de Atividades (${s.size})</h3></div><div class="card-b">${r||'<p style="color:var(--txl);text-align:center;padding:20px">Sem registos</p>'}</div></div>`}

// ===== MENSAGENS =====
async function pgMsgs(){const us=await db.collection('escolas').doc(CSI).collection('usuarios').get();let uO='<option value="todos">📢 Todos</option>';const allowed=CU.perfil==='professor'?['director','subdirPed','subdirAdm','secretaria','professor']:null;us.forEach(d=>{if(d.id===CU.id)return;if(allowed&&!allowed.includes(d.data().perfil))return;uO+=`<option value="${d.id}">${d.data().nome}</option>`});const ms=await db.collection('escolas').doc(CSI).collection('mensagens').orderBy('criadoEm','desc').limit(20).get();let mh='';ms.forEach(d=>{const m=d.data();const isMe=m.deId===CU.id,isFor=m.paraId===CU.id;if(!isMe&&!isFor)return;mh+=`<div style="padding:7px;border-bottom:1px solid #f0f0f0;${!m.lida&&isFor?'background:#e3f2fd;':''}font-size:.78em"><strong>${isMe?'→ '+m.paraNome:m.deNome}</strong> — ${m.assunto||''}<br><span style="color:var(--txl)">${(m.mensagem||'').substring(0,80)}</span></div>`});$('eC').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="card"><div class="card-h"><h3>✉️ Enviar</h3></div><div class="card-b"><div class="fg"><label>Para</label><select id="msgP">${uO}</select></div><div class="fg"><label>Assunto</label><input id="msgA"></div><div class="fg"><label>Mensagem</label><textarea id="msgT" rows="4"></textarea></div><button class="btn btn-p" onclick="sMsg()">📨 Enviar</button></div></div><div class="card"><div class="card-h"><h3>📬 Mensagens</h3></div><div class="card-b" style="max-height:380px;overflow-y:auto">${mh||'<p class="text-center" style="color:var(--txl);padding:20px">Nenhuma</p>'}</div></div></div>`}
async function sMsg(){const para=$('msgP').value,msg=$('msgT').value.trim();if(!msg)return;const base={deId:CU.id,deNome:CU.nome,assunto:$('msgA').value.trim(),mensagem:msg,lida:false,criadoEm:ts()};if(para==='todos'){const s=await db.collection('escolas').doc(CSI).collection('usuarios').get();for(const d of s.docs)if(d.id!==CU.id)await db.collection('escolas').doc(CSI).collection('mensagens').add({...base,paraId:d.id,paraNome:d.data().nome})}else{const ud=await db.collection('escolas').doc(CSI).collection('usuarios').doc(para).get();await db.collection('escolas').doc(CSI).collection('mensagens').add({...base,paraId:para,paraNome:ud.data().nome})}logAct('Enviou mensagem');notify('Enviada!','ok');$('msgA').value=$('msgT').value='';pgMsgs()}

init();
</script>
