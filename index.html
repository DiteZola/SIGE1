<!DOCTYPE html>
<html lang="pt-AO">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#1a237e;--pl:#3949ab;--pd:#0d1642;--s:#c62828;--ok:#2e7d32;--wn:#ef6c00;--inf:#0277bd;--bg:#f0f2f5;--tx:#212121;--txl:#757575;--brd:#e0e0e0;--sh:0 2px 8px rgba(0,0,0,.06);--r:8px;--sw:250px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}
.hidden{display:none!important}
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1642,#1a237e 50%,#3949ab);padding:16px}
.auth-card{background:#fff;border-radius:14px;padding:32px;width:100%;max-width:480px;box-shadow:0 16px 48px rgba(0,0,0,.3)}
.auth-card.wide{max-width:800px}
.alogo{text-align:center;margin-bottom:20px}
.alogo .licon{width:64px;height:64px;background:linear-gradient(135deg,var(--p),var(--pl));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:1.8em;color:#fff}
.alogo h1{color:var(--p);font-size:1.4em}
.alogo p{color:var(--txl);font-size:.82em}
.fg{margin-bottom:10px}
.fg label{display:block;margin-bottom:3px;font-weight:600;font-size:.78em}
.fg .req{color:var(--s)}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:2px solid var(--brd);border-radius:var(--r);font-size:.86em;outline:none;background:#fafbfc;font-family:inherit}
.fg input:focus,.fg select:focus{border-color:var(--p)}
.fg textarea{resize:vertical;min-height:50px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.st{font-size:.85em;font-weight:700;color:var(--p);margin:12px 0 6px;padding-bottom:3px;border-bottom:2px solid #e8eaf6}
.btn{padding:7px 15px;border:none;border-radius:var(--r);cursor:pointer;font-size:.82em;font-weight:600;display:inline-flex;align-items:center;gap:5px;justify-content:center;font-family:inherit;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-p{background:var(--p);color:#fff}.btn-s{background:var(--s);color:#fff}.btn-ok{background:var(--ok);color:#fff}.btn-wn{background:var(--wn);color:#fff}.btn-inf{background:var(--inf);color:#fff}
.btn-out{background:transparent;border:2px solid var(--p);color:var(--p)}.btn-out:hover{background:var(--p);color:#fff}
.btn-ghost{background:rgba(26,35,126,.05);color:var(--p)}
.btn-block{width:100%;display:flex}.btn-sm{padding:3px 9px;font-size:.73em}.btn-lg{padding:10px 20px;font-size:.92em}
.btn-group{display:flex;gap:5px;flex-wrap:wrap}
.dash{display:flex;min-height:100vh}
.side{width:var(--sw);background:linear-gradient(180deg,var(--pd),var(--p) 50%,#283593);color:#fff;position:fixed;height:100vh;overflow-y:auto;z-index:200;transition:transform .3s;left:0;top:0}
.side::-webkit-scrollbar{width:3px}.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2)}
.shdr{padding:12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.1)}
.shdr .slogo{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.3);margin:0 auto 6px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;overflow:hidden}
.shdr .slogo img{width:100%;height:100%;object-fit:cover}
.shdr h3{font-size:.78em}.shdr p{font-size:.66em;opacity:.6}
.smenu{padding:4px 0}.scat{padding:6px 14px 2px;font-size:.58em;text-transform:uppercase;letter-spacing:1.5px;opacity:.4;font-weight:700}
.si{display:flex;align-items:center;padding:7px 14px;cursor:pointer;transition:all .12s;gap:8px;font-size:.77em;border-left:3px solid transparent;color:rgba(255,255,255,.78)}
.si:hover{background:rgba(255,255,255,.06)}.si.act{background:rgba(255,255,255,.1);border-left-color:#ff8f00;font-weight:600;color:#fff}
.si .ic{width:15px;text-align:center;flex-shrink:0}
.si.logout{margin-top:6px;color:#ef5350;border-top:1px solid rgba(255,255,255,.06);padding-top:10px}

.main{margin-left:var(--sw);flex:1;min-height:100vh}
.top{background:#fff;padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 2px rgba(0,0,0,.05);position:sticky;top:0;z-index:50}
.top h2{font-size:.95em;color:var(--p)}
.uinfo{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.78em}
.uav{width:30px;height:30px;border-radius:50%;border:2px solid var(--p);background:#e8eaf6;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}

.content{padding:16px}
.mtog{display:none;background:none;border:none;font-size:1.1em;color:var(--p);cursor:pointer;margin-right:8px}
@media(max-width:900px){.side{transform:translateX(-100%)}.side.open{transform:translateX(0)}.main{margin-left:0!important}.mtog{display:block}.fr,.fr3{grid-template-columns:1fr}}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.sc{background:#fff;border-radius:var(--r);padding:12px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px}
.sci{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1em;color:#fff;flex-shrink:0}
.sci.bl{background:#1565c0}.sci.gn{background:#2e7d32}.sci.or{background:#e65100}.sci.rd{background:#c62828}.sci.pp{background:#6a1b9a}.sci.tl{background:#00695c}.sci.yl{background:#f9a825}
.scn h3{font-size:1.3em;line-height:1}.scn p{font-size:.72em;color:var(--txl)}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden}
.card-h{padding:10px 12px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;background:#fafbfc}
.card-h h3{font-size:.85em;color:var(--p)}.card-b{padding:12px}
.tbl{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid #eee;font-size:.78em}
th{background:var(--p);color:#fff;font-weight:600;white-space:nowrap}
tr:hover td{background:#f5f7ff}
.badge{padding:2px 7px;border-radius:12px;font-size:.68em;font-weight:600;display:inline-block}
.b-ok{background:#e8f5e9;color:var(--ok)}.b-wn{background:#fff3e0;color:var(--wn)}.b-dg{background:#ffebee;color:var(--s)}.b-p{background:#e8eaf6;color:var(--p)}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:640px;max-height:93vh;overflow-y:auto}
.modal.lg{max-width:860px}.modal.xl{max-width:1020px}
.mh{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--p);color:#fff;border-radius:12px 12px 0 0;position:sticky;top:0;z-index:1}
.mh h3{font-size:.85em}.mx{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:1em;cursor:pointer;padding:2px 6px;border-radius:4px}
.mb{padding:16px}.mf{padding:10px 16px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:6px;background:#fafbfc;border-radius:0 0 12px 12px}
.phup{text-align:center;margin-bottom:10px}
.phpv{width:90px;height:90px;border-radius:50%;border:3px dashed var(--brd);display:flex;align-items:center;justify-content:center;margin:0 auto 4px;overflow:hidden;cursor:pointer;background:#fafbfc;position:relative}
.phpv:hover{border-color:var(--p)}.phpv img{width:100%;height:100%;object-fit:cover}
.phpv .pht{color:var(--txl);font-size:.7em;padding:6px}
.phpv .phb{position:absolute;bottom:1px;right:1px;background:var(--p);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7em}
.fp{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px;padding:8px;background:#f5f7ff;border-radius:var(--r)}
.fp select,.fp input{padding:5px 8px;border:1px solid var(--brd);border-radius:var(--r);font-size:.78em;background:#fff;font-family:inherit}
.acwrap{position:relative}.aclist{position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid var(--p);border-top:none;border-radius:0 0 var(--r) var(--r);max-height:160px;overflow-y:auto;z-index:10}
.acitem{padding:7px 9px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:.78em}.acitem:hover{background:#e8eaf6}
.toast{position:fixed;top:12px;right:12px;padding:9px 14px;border-radius:var(--r);color:#fff;z-index:2000;animation:ti .3s;max-width:320px;font-size:.8em}
.toast.ok{background:#2e7d32}.toast.er{background:#c62828}.toast.wn{background:#e65100}.toast.in{background:#0277bd}
@keyframes ti{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.divider{height:1px;background:var(--brd);margin:10px 0}
.avsm{width:24px;height:24px;border-radius:50%;object-fit:cover}
.mt-1{margin-top:5px}.mt-2{margin-top:10px}.text-center{text-align:center}
.fin-card{border-radius:var(--r);padding:16px;margin-bottom:12px;color:#fff}
.fin-card.green{background:linear-gradient(135deg,#1b5e20,#388e3c)}
.fin-card.red{background:linear-gradient(135deg,#b71c1c,#e53935)}
.fin-card.blue{background:linear-gradient(135deg,#0d47a1,#1976d2)}
.fin-card h2{font-size:1.5em}.fin-card p{opacity:.8;font-size:.78em}
.fin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.pauta-tbl th{text-align:center!important;font-size:.7em;padding:4px 6px}
.pauta-tbl td{text-align:center!important;font-size:.75em;padding:4px 6px}
.pauta-tbl td.nome{text-align:left!important;font-weight:600}
.pauta-tbl .nota-ok{background:#e8f5e9;color:#1b5e20;font-weight:700}
.pauta-tbl .nota-dg{background:#ffebee;color:#b71c1c;font-weight:700}
.pauta-tbl .obs-ok{color:var(--ok);font-weight:600;font-size:.72em}
.pauta-tbl .obs-dg{color:var(--s);font-weight:600;font-size:.72em}
.pauta-tbl .obs-wn{color:var(--wn);font-weight:600;font-size:.72em}
.log-item{padding:6px 10px;border-bottom:1px solid #f0f0f0;font-size:.78em;display:flex;gap:8px;align-items:flex-start}
.log-item .log-time{color:var(--txl);font-size:.72em;white-space:nowrap;flex-shrink:0}
.dash-card-link{cursor:pointer;transition:transform .2s}
.dash-card-link:hover{transform:translateY(-2px)}
@media(max-width:700px){.fin-grid{grid-template-columns:1fr}}
@media(max-width:500px){.sg{grid-template-columns:1fr 1fr}}
@media print{.side,.top,.sov{display:none!important}.main{margin-left:0!important}}
</style>
</head>
<body>
<div id="pgSetup" class="auth-bg"><div class="auth-card wide"><div class="alogo"><div class="licon">🏫</div><h1>SIGE</h1><p>Sistema Integrado de Gestão Escolar</p></div><div class="st">🔐 Configuração Inicial</div><div class="fr"><div class="fg"><label>Nome <span class="req">*</span></label><input id="sNm"></div><div class="fg"><label>Email <span class="req">*</span></label><input id="sEm"></div></div><div class="fr"><div class="fg"><label>Utilizador <span class="req">*</span></label><input id="sUs"></div><div class="fg"><label>Senha <span class="req">*</span></label><input type="password" id="sPw"></div></div><div class="fg"><label>Confirmar <span class="req">*</span></label><input type="password" id="sPw2"></div><button class="btn btn-p btn-block btn-lg mt-2" onclick="criarAdmin()">🔐 Criar</button></div></div>
<div id="pgLogin" class="auth-bg hidden"><div class="auth-card"><div class="alogo"><div class="licon">🏫</div><h1>SIGE</h1><p>Sistema Integrado de Gestão Escolar</p></div><div style="display:flex;border-bottom:2px solid var(--brd);margin-bottom:12px;justify-content:center" id="ltabs"><div style="padding:6px 14px;cursor:pointer;font-weight:600;color:var(--p);border-bottom:3px solid var(--p);margin-bottom:-2px;font-size:.82em" onclick="ltab('login',this)">🔑 Entrar</div><div style="padding:6px 14px;cursor:pointer;font-weight:600;color:var(--txl);border-bottom:3px solid transparent;margin-bottom:-2px;font-size:.82em" onclick="ltab('enc',this)">👨‍👩‍👧 Encarregado</div></div><div id="loginDiv"><div class="fg"><input id="lUs" placeholder="Utilizador ou email"></div><div class="fg"><input type="password" id="lPw" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()"></div><button class="btn btn-p btn-block btn-lg" onclick="doLogin()">🔑 Entrar</button><p id="loginErr" class="hidden" style="color:var(--s);text-align:center;margin-top:6px;font-size:.8em"></p></div><div id="encDiv" class="hidden"><div class="fg"><input id="encBI" placeholder="BI ou Cédula"></div><div class="fg"><select id="encEsc"></select></div><button class="btn btn-p btn-block" onclick="consultarEnc()">🔍</button><div id="encRes" class="hidden mt-2"></div></div></div></div>
<div id="pgAdmin" class="dash hidden"><div class="sov" id="ovA" onclick="cS('a')"></div><div class="side" id="sideA"><div class="shdr"><div class="slogo">⚙️</div><h3 id="anm">Admin</h3><p>Sistema</p></div><div class="smenu"><div class="scat">Principal</div><div class="si act" onclick="aN('dash',this)"><span class="ic">📊</span>Painel</div><div class="si" onclick="aN('esc',this)"><span class="ic">🏫</span>Escolas</div><div class="si" onclick="aN('bkp',this)"><span class="ic">💾</span>Backup</div><div class="si logout" onclick="logout()"><span class="ic">🚪</span>Sair</div></div></div><div class="main"><div class="top"><button class="mtog" onclick="oS('a')">☰</button><h2 id="aT">Painel</h2><div class="uinfo" onclick="logout()"><div class="uav">👤</div><span id="anmT">Admin</span> 🚪</div></div><div class="content" id="aC"></div></div></div>
<div id="pgEsc" class="dash hidden"><div class="sov" id="ovE" onclick="cS('e')"></div><div class="side" id="sideE"><div class="shdr"><div class="slogo" id="eLogo">🏫</div><h3 id="eNS">Escola</h3><p id="ePS">Perfil</p></div><div class="smenu" id="eMenu"></div></div><div class="main"><div class="top"><button class="mtog" onclick="oS('e')">☰</button><h2 id="eT">Painel</h2><div class="uinfo"><div class="uav" id="eAv">👤</div><span id="eUN">User</span><span style="cursor:pointer;margin-left:4px" onclick="logout()">🚪</span></div></div><div class="content" id="eC"></div></div></div>
<div id="mOv" class="mov hidden" onclick="if(event.target===this)cM()"><div class="modal" id="mB"></div></div>
<div id="tC"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<script>
firebase.initializeApp({apiKey:"AIzaSyDrxTEwO8vLDyYSZGk2UbQb11oWEA3hlIE",authDomain:"sige1-2ee70.firebaseapp.com",projectId:"sige1-2ee70",storageBucket:"sige1-2ee70.firebasestorage.app",messagingSenderId:"976468440304",appId:"1:976468440304:web:f5d0344344c93f0e24be35"});
const db=firebase.firestore();let CU=null,CS=null,CSI=null;
const $=id=>document.getElementById(id),show=id=>$(id)?.classList.remove('hidden'),hide=id=>$(id)?.classList.add('hidden'),ts=()=>firebase.firestore.FieldValue.serverTimestamp(),isMob=()=>window.innerWidth<=900;
const PN={director:'Diretor Geral',subdirPed:'Subdiretor Pedagógico',subdirAdm:'Subdiretor Administrativo',secretaria:'Secretário(a)',professor:'Professor(a)'};
function notify(m,t='in'){const d=document.createElement('div');d.className='toast '+t;d.textContent=m;$('tC').appendChild(d);setTimeout(()=>d.remove(),3500)}
function calcIdade(n){if(!n)return'';const h=new Date(),x=new Date(n);let a=h.getFullYear()-x.getFullYear();if(h.getMonth()<x.getMonth()||(h.getMonth()===x.getMonth()&&h.getDate()<x.getDate()))a--;return a>=0?a:''}
function genMat(){return'MAT-'+new Date().getFullYear()+'-'+Math.floor(10000+Math.random()*90000)}
function provO(){return['','Bengo','Benguela','Bié','Cabinda','Cuando Cubango','Cuanza Norte','Cuanza Sul','Cunene','Huambo','Huíla','Luanda','Lunda Norte','Lunda Sul','Malanje','Moxico','Namibe','Uíge','Zaire'].map(p=>`<option value="${p}">${p||'Selecione'}</option>`).join('')}
function cM(){hide('mOv')}function oM(){show('mOv')}
function oS(c){$(c==='a'?'sideA':'sideE').classList.add('open');$(c==='a'?'ovA':'ovE').classList.add('show')}
function cS(c){$(c==='a'?'sideA':'sideE').classList.remove('open');$(c==='a'?'ovA':'ovE').classList.remove('show')}
function autoC(c){if(isMob())cS(c)}
async function imgB64(inp){return new Promise(r=>{if(!inp.files?.[0]){r(null);return}const f=inp.files[0];if(f.size>5.5e6){notify('Max 5,5MB!','er');r(null);return}const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;const mx=800;if(w>mx||h>mx){if(w>h){h*=mx/w;w=mx}else{w*=mx/h;h=mx}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);r(c.toDataURL('image/jpeg',0.8))};img.src=e.target.result};rd.readAsDataURL(f)})}
function prevF(i,img,txt){const f=$(i).files[0];if(!f||f.size>5.5e6)return;const r=new FileReader();r.onload=e=>{$(img).src=e.target.result;$(img).style.display='block';if(txt)$(txt).style.display='none'};r.readAsDataURL(f)}
function drawChart(id,type,labels,datasets){const ctx=$(id);if(!ctx)return;if(ctx._chart)ctx._chart.destroy();ctx._chart=new Chart(ctx,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:9}}}}}})}
function isPrimario(c){return c&&(c.includes('1ª')||c.includes('2ª')||c.includes('3ª')||c.includes('4ª')||c.includes('5ª')||c.includes('6ª'))}
function notaMax(c){return isPrimario(c)?10:20}
async function logAct(acao){if(!CSI)return;try{await db.collection('escolas').doc(CSI).collection('logs').add({usuario:CU?.nome||'',perfil:CU?.perfil||'',acao,data:new Date().toISOString(),criadoEm:ts()})}catch(e){}}

async function init(){try{const a=await db.collection('system').doc('admin').get();if(a.exists){hide('pgSetup');show('pgLogin');ldEncE()}else{show('pgSetup');hide('pgLogin')}}catch(e){show('pgSetup')}}
async function criarAdmin(){const n=$('sNm').value.trim(),u=$('sUs').value.trim(),p=$('sPw').value;if(!n||!$('sEm').value.trim()||!u||!p||p.length<6||p!==$('sPw2').value){notify('Verifique!','er');return}await db.collection('system').doc('admin').set({nome:n,email:$('sEm').value.trim(),username:u,password:p,perfil:'admin',criadoEm:ts()});notify('Criado!','ok');hide('pgSetup');show('pgLogin');ldEncE()}
function ltab(t,el){document.querySelectorAll('#ltabs > div').forEach(x=>{x.style.color='var(--txl)';x.style.borderBottomColor='transparent'});el.style.color='var(--p)';el.style.borderBottomColor='var(--p)';t==='login'?(show('loginDiv'),hide('encDiv')):(hide('loginDiv'),show('encDiv'));hide('loginErr')}
async function doLogin(){const u=$('lUs').value.trim(),p=$('lPw').value;hide('loginErr');if(!u||!p){notify('Preencha!','er');return}const ad=await db.collection('system').doc('admin').get();if(ad.exists){const a=ad.data();if((a.username===u||a.email===u)&&a.password===p){CU={...a,id:'admin',perfil:'admin'};hide('pgLogin');show('pgAdmin');$('anm').textContent=$('anmT').textContent=a.nome;aN('dash');return}}const escs=await db.collection('escolas').get();for(const ed of escs.docs){const us=await db.collection('escolas').doc(ed.id).collection('usuarios').get();for(const ud of us.docs){const uu=ud.data();if((uu.username===u||uu.email===u)&&uu.password===p){if(uu.estado==='inativo'){notify('Inativa!','er');return}CU={...uu,id:ud.id};CSI=ed.id;CS=ed.data();hide('pgLogin');show('pgEsc');initE();logAct('Login');return}}}$('loginErr').textContent='❌ Credenciais inválidas';show('loginErr')}
function logout(){CU=CS=CSI=null;hide('pgAdmin');hide('pgEsc');show('pgLogin');$('lUs').value=$('lPw').value='';hide('loginErr')}
async function ldEncE(){const s=await db.collection('escolas').get();let h='<option value="">Escola</option>';s.forEach(d=>{h+=`<option value="${d.id}">${d.data().nome}</option>`});$('encEsc').innerHTML=h}
async function consultarEnc(){const bi=$('encBI').value.trim(),eid=$('encEsc').value;if(!bi||!eid)return;let s=await db.collection('escolas').doc(eid).collection('alunos').where('bi','==',bi).get();if(s.empty)s=await db.collection('escolas').doc(eid).collection('alunos').where('cedula','==',bi).get();if(s.empty){notify('Não encontrado!','er');return}const a=s.docs[0].data();const pags=await db.collection('escolas').doc(eid).collection('pagamentos').where('alunoId','==',s.docs[0].id).get();let pago=0;pags.forEach(p=>{pago+=(p.data().valor||0)});$('encRes').classList.remove('hidden');$('encRes').innerHTML=`<div class="card"><div class="card-b">${a.foto?`<img src="${a.foto}" style="width:50px;height:50px;border-radius:50%;object-fit:cover;float:left;margin-right:8px">`:''}<strong>${a.nome}</strong><br>${a.classe||''} / ${a.turma||''} · <span class="badge ${a.estado==='ativo'?'b-ok':'b-dg'}">${a.estado||'ativo'}</span><br>Total Pago: ${pago.toLocaleString()} Kz</div></div>`}

async function admEsc(){const s=await db.collection('escolas').get();let r='';s.forEach(d=>{const e=d.data();r+=`<tr><td>${e.nome}</td><td>${e.provincia||''}</td><td>${e.directorNome||''}</td><td><button class="btn btn-sm btn-s" onclick="if(confirm('Eliminar?'))delEsc('${d.id}')">🗑️</button></td></tr>`});$('aC').innerHTML=`<div class="card"><div class="card-h"><h3>🏫 Escolas</h3><button class="btn btn-p" onclick="mEsc()">➕</button></div><div class="card-b"><table><tr><th>Nome</th><th>Prov.</th><th>Diretor</th><th></th></tr>${r||'<tr><td colspan="4">—</td></tr>'}</table></div></div>`}
function mEsc(){$('mB').className='modal lg';$('mB').innerHTML=`<div class="mh"><h3>➕ Escola</h3><button class="mx" onclick="cM()">×</button></div><div class="mb"><div class="fr"><div class="fg"><label>Nome <span class="req">*</span></label><input id="eNm"></div><div class="fg"><label>Província</label><select id="ePv">${provO()}</select></div></div><div class="fg"><label>Município</label><input id="eMn"></div><div class="st">👤 Diretor</div><div class="fr"><div class="fg"><label>Nome <span class="req">*</span></label><input id="dNm"></div><div class="fg"><label>BI</label><input id="dBI"></div></div><div class="fr"><div class="fg"><label>Tel</label><input id="dTl"></div><div class="fg"><label>Email</label><input id="dEm"></div></div><div class="st">🔑 Credenciais</div><div class="fr"><div class="fg"><label>User <span class="req">*</span></label><input id="dUs"></div><div class="fg"><label>Senha <span class="req">*</span></label><input type="password" id="dPw"></div></div></div><div class="mf"><button class="btn btn-out" onclick="cM()">Cancelar</button><button class="btn btn-p" onclick="svEsc()">💾</button></div>`;oM()}
async function svEsc(){const n=$('eNm').value.trim();if(!n||!$('dNm').value.trim()||$('dPw').value.length<6){notify('Preencha!','er');return}const r=await db.collection('escolas').add({nome:n,provincia:$('ePv').value,municipio:$('eMn').value.trim(),directorNome:$('dNm').value.trim(),directorBI:$('dBI').value.trim(),criadoEm:ts()});await db.collection('escolas').doc(r.id).collection('usuarios').add({nome:$('dNm').value.trim(),bi:$('dBI').value.trim(),telefone:$('dTl').value.trim(),email:$('dEm').value.trim(),username:$('dUs').value.trim(),password:$('dPw').value,perfil:'director',estado:'ativo',criadoEm:ts()});notify('Criada!','ok');cM();admEsc();ldEncE()}
async function delEsc(id){for(const c of['usuarios','alunos','notas','turmas','classes','disciplinas','turnos','anosLetivos','presencas','mensagens','faltas','pagamentos','config','patrimonio','financeiro','logs','eventos']){const s=await db.collection('escolas').doc(id).collection(c).get();for(const d of s.docs)await d.ref.delete()}await db.collection('escolas').doc(id).delete();notify('OK','ok');admEsc();ldEncE()}
function admBkp(){$('aC').innerHTML=`<div class="card"><div class="card-b text-center" style="padding:30px"><div style="font-size:3em">💾</div><p class="mt-2">Backup completo do sistema</p><div class="btn-group mt-2" style="justify-content:center"><button class="btn btn-ok btn-lg" onclick="bkpXL()">📊 XLSX</button><button class="btn btn-s btn-lg" onclick="bkpPDF()">📄 PDF</button></div></div></div>`}

function bkpPDF(){const{jsPDF}=window.jspdf;const pdf=new jsPDF();pdf.setFontSize(16);pdf.text('SIGE - Backup do Sistema',105,20,{align:'center'});pdf.setFontSize(10);pdf.text('Data: '+new Date().toLocaleDateString('pt-AO'),105,28,{align:'center'});pdf.save('Backup_SIGE.pdf');notify('PDF!','ok')}

async function pgDash(){const[als,uss]=await Promise.all([db.collection('escolas').doc(CSI).collection('alunos').get(),db.collection('escolas').doc(CSI).collection('usuarios').get()]);let m=0,f=0,at=0;const byCl={};als.forEach(d=>{const a=d.data();a.genero==='M'?m++:f++;if(a.estado==='ativo')at++;if(!byCl[a.classe])byCl[a.classe]=0;byCl[a.classe]++});const anos=await db.collection('escolas').doc(CSI).collection('anosLetivos').where('estado','==','aberto').get();let logsH='';if(CU.perfil==='director'){const logs=await db.collection('escolas').doc(CSI).collection('logs').orderBy('criadoEm','desc').limit(8).get();logs.forEach(d=>{const l=d.data();logsH+=`<div class="log-item"><span class="log-time">${l.data?new Date(l.data).toLocaleString('pt-AO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}</span><span><strong>${l.usuario}</strong> — ${l.acao}</span></div>`})}$('eC').innerHTML=`<div class="sg"><div class="sc"><div class="sci bl">👨‍🎓</div><div class="scn"><h3>${als.size}</h3><p>Alunos (${m}♂/${f}♀)</p></div></div><div class="sc"><div class="sci gn">👨‍🏫</div><div class="scn"><h3>${uss.docs.filter(d=>d.data().perfil==='professor').length}</h3><p>Professores</p></div></div><div class="sc"><div class="sci or">✅</div><div class="scn"><h3>${at}</h3><p>Ativos</p></div></div><div class="sc"><div class="sci pp">📅</div><div class="scn"><h3 style="font-size:.85em">${anos.empty?'—':anos.docs[0].data().nome}</h3><p>Ano Letivo</p></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="card"><div class="card-h"><h3>📊 Alunos por Classe</h3></div><div class="card-b"><div style="height:200px"><canvas id="chD1"></canvas></div></div></div><div class="card"><div class="card-h"><h3>📊 Género</h3></div><div class="card-b"><div style="height:200px"><canvas id="chD2"></canvas></div></div></div></div>${logsH?`<div class="card"><div class="card-h"><h3>📋 Atividades Recentes</h3></div><div class="card-b">${logsH}</div></div>`:''}`;setTimeout(()=>{const cls=Object.keys(byCl).sort();drawChart('chD1','bar',cls,[{label:'Alunos',data:cls.map(c=>byCl[c]),backgroundColor:'#1565c0'}]);drawChart('chD2','doughnut',['Masculino','Feminino'],[{data:[m,f],backgroundColor:['#1565c0','#e65100']}])},100)}

async function pgAnoLet(){const s=await db.collection('escolas').doc(CSI).collection('anosLetivos').orderBy('criadoEm','desc').get();let r='';s.forEach(d=>{const a=d.data();r+=`<tr><td>${a.nome}</td><td><span class="badge ${a.estado==='aberto'?'b-ok':'b-dg'}">${a.estado}</span></td><td>${a.trimestre||'—'}</td><td><span class="badge ${a.trimestreEstado==='aberto'?'b-ok':'b-wn'}">${a.trimestreEstado||'fechado'}</span></td><td>${a.estado==='aberto'?`<button class="btn btn-sm btn-wn" onclick="mTrim('${d.id}')">📅</button> <button class="btn btn-sm btn-s" onclick="fAno('${d.id}')">🔒</button>`:`<button class="btn btn-sm btn-ok" onclick="rAno('${d.id}')">🔓</button>`}</td></tr>`});$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>📅 Anos Letivos</h3><button class="btn btn-p" onclick="nAno()">➕</button></div><div class="card-b"><table><tr><th>Ano</th><th>Estado</th><th>Trim.</th><th>Est.</th><th></th></tr>${r||'<tr><td colspan="5">—</td></tr>'}</table></div></div>`}
function nAno(){const y=new Date().getFullYear();$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>➕</h3><button class="mx" onclick="cM()">×</button></div><div class="mb"><div class="fg"><label>Nome</label><input id="anN" value="${y}/${y+1}"></div></div><div class="mf"><button class="btn btn-p" onclick="cAno()">Criar</button></div>`;oM()}
async function cAno(){const nm=$('anN').value.trim();if(!nm)return;const ab=await db.collection('escolas').doc(CSI).collection('anosLetivos').where('estado','==','aberto').get();for(const d of ab.docs)await d.ref.update({estado:'fechado',trimestreEstado:'fechado'});await db.collection('escolas').doc(CSI).collection('anosLetivos').add({nome:nm,estado:'aberto',trimestre:'1º Trimestre',trimestreEstado:'aberto',criadoEm:ts()});logAct('Criou ano: '+nm);cM();pgAnoLet()}
async function fAno(id){await db.collection('escolas').doc(CSI).collection('anosLetivos').doc(id).update({estado:'fechado',trimestreEstado:'fechado'});logAct('Fechou ano');pgAnoLet()}
async function rAno(id){const ab=await db.collection('escolas').doc(CSI).collection('anosLetivos').where('estado','==','aberto').get();for(const d of ab.docs)await d.ref.update({estado:'fechado'});await db.collection('escolas').doc(CSI).collection('anosLetivos').doc(id).update({estado:'aberto'});pgAnoLet()}
function mTrim(id){$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>📅</h3><button class="mx" onclick="cM()">×</button></div><div class="mb"><div class="fg"><select id="sT"><option>1º Trimestre</option><option>2º Trimestre</option><option>3º Trimestre</option></select></div><div class="btn-group"><button class="btn btn-ok" onclick="aT('${id}')">Abrir</button><button class="btn btn-s" onclick="fT('${id}')">Fechar</button></div></div>`;oM()}
async function aT(id){await db.collection('escolas').doc(CSI).collection('anosLetivos').doc(id).update({trimestre:$('sT').value,trimestreEstado:'aberto'});logAct('Abriu '+$('sT').value);cM();pgAnoLet()}
async function fT(id){await db.collection('escolas').doc(CSI).collection('anosLetivos').doc(id).update({trimestreEstado:'fechado'});cM();pgAnoLet()}

async function pgAlunos(){const als=await db.collection('escolas').doc(CSI).collection('alunos').get();const cs=await db.collection('escolas').doc(CSI).collection('classes').get();const sorted=[...als.docs].sort((a,b)=>(a.data().nome||'').localeCompare(b.data().nome||''));let r='';sorted.forEach(d=>{const a=d.data();r+=`<tr data-cl="${a.classe||''}" data-nm="${(a.nome||'').toLowerCase()}"><td>${a.foto?`<img src="${a.foto}" class="avsm">`:'👤'}</td><td><strong>${a.nome}</strong></td><td>${a.classe||''}</td><td>${a.turma||''}</td><td><span class="badge ${a.estado==='ativo'?'b-ok':a.estado==='transferido'?'b-wn':'b-dg'}">${a.estado||'ativo'}</span></td><td><button class="btn btn-sm btn-inf" onclick="editAl('${d.id}')">✏️</button> <button class="btn btn-sm btn-wn" onclick="tEA('${d.id}')">🔄</button></td></tr>`});$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>👨‍🎓 Alunos (${als.size})</h3><div class="btn-group"><button class="btn btn-sm btn-ok" onclick="exAlXL()">📊</button><button class="btn btn-p" onclick="mAluno()">➕</button></div></div><div class="card-b"><div class="fp"><select id="fCl" onchange="fAl()"><option value="">Todas</option>${cs.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}</select><input type="text" placeholder="🔍 Nome..." onkeyup="fAlN(this.value)" style="flex:1;max-width:200px"></div><div class="tbl"><table id="tAl"><tr><th></th><th>Nome</th><th>Classe</th><th>Turma</th><th>Estado</th><th></th></tr>${r||'<tr><td colspan="6">—</td></tr>'}</table></div></div></div>`}

async function mAluno(aid){const[cs,ts2]=await Promise.all([db.collection('escolas').doc(CSI).collection('classes').get(),db.collection('escolas').doc(CSI).collection('turmas').get()]);$('mB').className='modal lg';$('mB').innerHTML=`<div class="mh"><h3>${aid?'✏️':'➕'} Aluno</h3><button class="mx" onclick="cM()">×</button></div><div class="mb"><div class="phup"><div class="phpv" onclick="$('aFo').click()"><span class="pht" id="aFoT">📷</span><img id="aFoI" style="display:none"><div class="phb">📷</div></div><input type="file" id="aFo" accept="image/*" style="display:none" onchange="prevF('aFo','aFoI','aFoT')"></div><div class="fr3"><div class="fg"><label>Mat.</label><input id="aMt" value="${aid?'':genMat()}" readonly style="background:#f0f0f0"></div><div class="fg"><label>Classe <span class="req">*</span></label><select id="aCl">${cs.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}</select></div><div class="fg"><label>Turma</label><select id="aTm">${ts2.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}</select></div></div><div class="fr"><div class="fg"><label>Nome <span class="req">*</span></label><input id="aNm"></div><div class="fg"><label>Nascimento</label><input type="date" id="aNs"></div></div><div class="fr3"><div class="fg"><label>Género</label><select id="aGn"><option value="M">M</option><option value="F">F</option></select></div><div class="fg"><label>BI</label><input id="aBI"></div><div class="fg"><label>Nº</label><input id="aNum"></div></div><div class="fr"><div class="fg"><label>Pai</label><input id="aPai"></div><div class="fg"><label>Mãe</label><input id="aMae"></div></div><div class="fr"><div class="fg"><label>Encarregado</label><input id="aEN"></div><div class="fg"><label>Tel Enc.</label><input id="aET"></div></div></div><div class="mf"><button class="btn btn-out" onclick="cM()">✕</button><button class="btn btn-p" onclick="svAl('${aid||''}')">💾</button></div>`;oM();if(aid)ldAl(aid)}
async function ldAl(id){const d=await db.collection('escolas').doc(CSI).collection('alunos').doc(id).get();if(!d.exists)return;const a=d.data();$('aMt').value=a.matricula||'';$('aCl').value=a.classe||'';$('aTm').value=a.turma||'';$('aNm').value=a.nome||'';$('aNs').value=a.nascimento||'';$('aGn').value=a.genero||'M';$('aBI').value=a.bi||'';$('aNum').value=a.numero||'';$('aPai').value=a.nomePai||'';$('aMae').value=a.nomeMae||'';$('aEN').value=a.encNome||'';$('aET').value=a.encTelefone||'';if(a.foto){$('aFoI').src=a.foto;$('aFoI').style.display='block';$('aFoT').style.display='none'}}
async function svAl(aid){const nm=$('aNm').value.trim();if(!nm){notify('Nome!','er');return}let foto=null;if($('aFo').files[0])foto=await imgB64($('aFo'));const d={nome:nm,matricula:$('aMt').value.trim(),classe:$('aCl').value,turma:$('aTm').value,nascimento:$('aNs').value,genero:$('aGn').value,bi:$('aBI').value.trim(),numero:$('aNum').value.trim(),nomePai:$('aPai').value.trim(),nomeMae:$('aMae').value.trim(),encNome:$('aEN').value.trim(),encTelefone:$('aET').value.trim(),estado:'ativo'};if(foto)d.foto=foto;if(aid)await db.collection('escolas').doc(CSI).collection('alunos').doc(aid).update(d);else{d.criadoEm=ts();await db.collection('escolas').doc(CSI).collection('alunos').add(d)}logAct((aid?'Editou':'Matriculou')+' aluno: '+nm);notify('OK','ok');cM();pgAlunos()}
function editAl(id){mAluno(id)}
async function tEA(id){const d=await db.collection('escolas').doc(CSI).collection('alunos').doc(id).get();const es=['ativo','transferido','desistente'];const at=d.data().estado||'ativo';const nx=es[(es.indexOf(at)+1)%es.length];await db.collection('escolas').doc(CSI).collection('alunos').doc(id).update({estado:nx});logAct('Alterou estado aluno para: '+nx);notify('Estado: '+nx,'in');pgAlunos()}
async function exAlXL(){const s=await db.collection('escolas').doc(CSI).collection('alunos').get();const d=[['Nº','Mat','Nome','Classe','Turma','Género','Idade','BI','Pai','Mãe','Encarregado','Tel Enc.','Estado']];const sorted=[...s.docs].sort((a,b)=>(a.data().nome||'').localeCompare(b.data().nome||''));sorted.forEach(x=>{const a=x.data();d.push([a.numero,a.matricula,a.nome,a.classe,a.turma,a.genero,calcIdade(a.nascimento),a.bi,a.nomePai,a.nomeMae,a.encNome,a.encTelefone,a.estado])});const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),'Alunos');XLSX.writeFile(wb,`Alunos_${CS.nome}.xlsx`);notify('XLSX!','ok')}

// ===== LANÇAR NOTAS =====
async function pgNotas(){const[cs,ds,anos]=await Promise.all([db.collection('escolas').doc(CSI).collection('classes').get(),db.collection('escolas').doc(CSI).collection('disciplinas').get(),db.collection('escolas').doc(CSI).collection('anosLetivos').get()]);$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>📝 Lançar Notas</h3></div><div class="card-b"><div class="fp"><select id="nA">${anos.docs.map(d=>`<option value="${d.id}" ${d.data().estado==='aberto'?'selected':''}>${d.data().nome}</option>`).join('')}</select><select id="nC" onchange="lTN()"><option value="">Classe</option>${cs.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}</select><select id="nT"><option value="">Turma</option></select><select id="nD"><option value="">Disciplina</option>${ds.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}</select><select id="nTr"><option>1º Trimestre</option><option>2º Trimestre</option><option>3º Trimestre</option></select><button class="btn btn-p" onclick="lP()">📋</button></div><div id="pD"></div></div></div>`}
async function lTN(){const c=$('nC').value;const s=await db.collection('escolas').doc(CSI).collection('turmas').where('classe','==',c).get();$('nT').innerHTML='<option value="">Turma</option>'+s.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}
async function lP(){const cl=$('nC').value,tm=$('nT').value,dsc=$('nD').value,trim=$('nTr').value,aId=$('nA').value;if(!cl||!tm||!dsc){notify('Selecione!','er');return}const ad=await db.collection('escolas').doc(CSI).collection('anosLetivos').doc(aId).get();const ano=ad.data(),aNm=ano.nome;const lk=ano.estado!=='aberto'||ano.trimestreEstado!=='aberto'||ano.trimestre!==trim;const dis=lk?'disabled':'';const mx=notaMax(cl);const als=await db.collection('escolas').doc(CSI).collection('alunos').where('classe','==',cl).where('turma','==',tm).where('estado','==','ativo').get();const sorted=[...als.docs].sort((a,b)=>(a.data().nome||'').localeCompare(b.data().nome||''));const ns=await db.collection('escolas').doc(CSI).collection('notas').where('classe','==',cl).where('turma','==',tm).where('disciplina','==',dsc).where('trimestre','==',trim).where('anoLetivo','==',aNm).get();const nm={};ns.forEach(d=>{nm[d.data().alunoId]=d.data()});let rows='',i=0;sorted.forEach(d=>{i++;const a=d.data(),n=nm[d.id]||{};rows+=`<tr><td>${i}</td><td style="text-align:left">${a.nome}</td><td><input type="number" min="0" max="${mx}" value="${n.av1||''}" class="ni" data-a="${d.id}" data-f="av1" style="width:38px" ${dis}></td><td><input type="number" min="0" max="${mx}" value="${n.av2||''}" class="ni" data-a="${d.id}" data-f="av2" style="width:38px" ${dis}></td><td><input type="number" min="0" max="${mx}" value="${n.av3||''}" class="ni" data-a="${d.id}" data-f="av3" style="width:38px" ${dis}></td><td><input type="number" min="0" max="${mx}" value="${n.av4||''}" class="ni" data-a="${d.id}" data-f="av4" style="width:38px" ${dis}></td><td id="mac_${d.id}" style="font-weight:700;text-align:center">-</td><td><input type="number" min="0" max="${mx}" value="${n.pt||''}" class="ni" data-a="${d.id}" data-f="pt" style="width:38px" ${dis}></td><td id="mt_${d.id}" style="font-weight:700;text-align:center;color:var(--p)">-</td></tr>`});$('pD').innerHTML=`${lk?'<div style="background:#fff3e0;padding:6px 8px;border-radius:var(--r);margin-bottom:6px;color:var(--wn);font-size:.75em;font-weight:600">⚠️ Fechado</div>':''}<p style="font-size:.75em;color:var(--txl);margin-bottom:6px">Notas: 0 a ${mx} ${isPrimario(cl)?'(Primário)':'(Secundário)'}</p><div class="tbl"><table><tr><th>#</th><th style="text-align:left">Nome</th><th>AV1</th><th>AV2</th><th>AV3</th><th>AV4</th><th>MAC</th><th>PT</th><th>MT</th></tr>${rows||'<tr><td colspan="9">—</td></tr>'}</table></div>${!lk&&rows?'<button class="btn btn-ok mt-2" onclick="sN()">💾 Salvar</button>':''}`;document.querySelectorAll('.ni').forEach(inp=>{inp.addEventListener('input',()=>cN(inp.dataset.a))});sorted.forEach(d=>cN(d.id))}
function cN(aid){const inps=document.querySelectorAll(`.ni[data-a="${aid}"]`);let a1=0,a2=0,a3=0,a4=0,pt=0;inps.forEach(i=>{const v=parseFloat(i.value)||0;if(i.dataset.f==='av1')a1=v;if(i.dataset.f==='av2')a2=v;if(i.dataset.f==='av3')a3=v;if(i.dataset.f==='av4')a4=v;if(i.dataset.f==='pt')pt=v});const mac=Math.round((a1+a2+a3+a4)/4);document.getElementById('mac_'+aid).textContent=mac||'-';const mt=pt>0?Math.round((mac+pt)/2):mac;document.getElementById('mt_'+aid).textContent=mt||'-'}
async function sN(){const cl=$('nC').value,tm=$('nT').value,dsc=$('nD').value,tr=$('nTr').value,aId=$('nA').value;const ad=await db.collection('escolas').doc(CSI).collection('anosLetivos').doc(aId).get();const ano=ad.data();if(ano.estado!=='aberto'||ano.trimestreEstado!=='aberto'||ano.trimestre!==tr){notify('Fechado!','er');return}const aNm=ano.nome;const aids=[...new Set([...document.querySelectorAll('.ni')].map(i=>i.dataset.a))];for(const aid of aids){const inps=document.querySelectorAll(`.ni[data-a="${aid}"]`);const d={alunoId:aid,classe:cl,turma:tm,disciplina:dsc,trimestre:tr,anoLetivo:aNm};inps.forEach(i=>{d[i.dataset.f]=parseFloat(i.value)||0});d.mac=Math.round(((d.av1||0)+(d.av2||0)+(d.av3||0)+(d.av4||0))/4);d.mt=d.pt>0?Math.round((d.mac+(d.pt||0))/2):d.mac;const ex=await db.collection('escolas').doc(CSI).collection('notas').where('alunoId','==',aid).where('disciplina','==',dsc).where('trimestre','==',tr).where('anoLetivo','==',aNm).get();if(!ex.empty)await ex.docs[0].ref.update(d);else await db.collection('escolas').doc(CSI).collection('notas').add(d)}logAct('Lançou notas: '+dsc+' '+cl+'/'+tm+' '+tr);notify('Salvas!','ok')}

async function pgPautas(){const[cs,anos]=await Promise.all([db.collection('escolas').doc(CSI).collection('classes').get(),db.collection('escolas').doc(CSI).collection('anosLetivos').get()]);$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>📋 Pautas</h3></div><div class="card-b"><div class="fp"><select id="pgAno">${anos.docs.map(d=>`<option value="${d.data().nome}" ${d.data().estado==='aberto'?'selected':''}>${d.data().nome}</option>`).join('')}</select><select id="pgCl" onchange="ldPgTm()"><option value="">Classe</option>${cs.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}</select><select id="pgTm"><option value="">Turma</option></select><select id="pgTrim"><option value="">Todos Trim.</option><option>1º Trimestre</option><option>2º Trimestre</option><option>3º Trimestre</option></select><button class="btn btn-p" onclick="loadPauta()">📋 Gerar</button></div><div id="pgDiv"></div></div></div>`}
async function ldPgTm(){const c=$('pgCl').value;const s=await db.collection('escolas').doc(CSI).collection('turmas').where('classe','==',c).get();$('pgTm').innerHTML='<option value="">Turma</option>'+s.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}
async function loadPauta(){const anoLet=$('pgAno').value,cl=$('pgCl').value,tm=$('pgTm').value,trimFiltro=$('pgTrim').value;if(!cl){notify('Selecione classe!','er');return}let qAl=db.collection('escolas').doc(CSI).collection('alunos').where('classe','==',cl);if(tm)qAl=qAl.where('turma','==',tm);const alsSnap=await qAl.get();const alunos=[...alsSnap.docs].map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));let qN=db.collection('escolas').doc(CSI).collection('notas').where('classe','==',cl).where('anoLetivo','==',anoLet);if(tm)qN=qN.where('turma','==',tm);if(trimFiltro)qN=qN.where('trimestre','==',trimFiltro);const notasSnap=await qN.get();const discSet=new Set();const notasByAluno={};notasSnap.forEach(d=>{const n=d.data();discSet.add(n.disciplina);if(!notasByAluno[n.alunoId])notasByAluno[n.alunoId]={};if(!notasByAluno[n.alunoId][n.disciplina])notasByAluno[n.alunoId][n.disciplina]={};notasByAluno[n.alunoId][n.disciplina][n.trimestre]=n});const disciplinas=[...discSet].sort();const trims=trimFiltro?[trimFiltro]:['1º Trimestre','2º Trimestre','3º Trimestre'];const mx=notaMax(cl);const limiteAprov=isPrimario(cl)?5:10;
let thDiscs='';disciplinas.forEach(disc=>{trims.forEach(tr=>{thDiscs+=`<th style="font-size:.6em">${disc.substring(0,4)}<br>${tr.substring(0,2)}<br>MAC</th><th style="font-size:.6em">${disc.substring(0,4)}<br>${tr.substring(0,2)}<br>PT</th><th style="font-size:.6em">${disc.substring(0,4)}<br>${tr.substring(0,2)}<br>MT</th>`});if(trims.length>1)thDiscs+=`<th style="font-size:.6em;background:#283593">${disc.substring(0,4)}<br>MF</th>`});
let bodyRows='';alunos.forEach((al,idx)=>{let totalMF=0,countMF=0;let tds='';disciplinas.forEach(disc=>{const dn=notasByAluno[al.id]?.[disc]||{};let mfNums=[];trims.forEach(tr=>{const n=dn[tr];const mac=n?.mac||'-';const pt=n?.pt||'-';const mt=n?.mt||'-';const mtOk=typeof mt==='number'&&mt>=limiteAprov;tds+=`<td class="${typeof mt==='number'?(mtOk?'nota-ok':'nota-dg'):''}">${mac}</td><td>${pt}</td><td class="${typeof mt==='number'?(mtOk?'nota-ok':'nota-dg'):''}">${mt}</td>`;if(typeof mt==='number')mfNums.push(mt)});if(trims.length>1){const mf=mfNums.length?Math.round(mfNums.reduce((a,b)=>a+b,0)/mfNums.length):'-';const mfOk=typeof mf==='number'&&mf>=limiteAprov;tds+=`<td style="font-weight:700" class="${typeof mf==='number'?(mfOk?'nota-ok':'nota-dg'):''}">${mf}</td>`;if(typeof mf==='number'){totalMF+=mf;countMF++}}});const mediaGeral=countMF?Math.round(totalMF/countMF):'-';const pct=countMF?Math.round((totalMF/(countMF*mx))*100):'-';let obs='',obsCls='';if(al.estado==='transferido'){obs='Transferido';obsCls='obs-wn'}else if(al.estado==='desistente'){obs='Desistente';obsCls='obs-dg'}else if(typeof mediaGeral==='number'){if(mediaGeral>=limiteAprov){obs='Aprovado';obsCls='obs-ok'}else{obs='Reprovado';obsCls='obs-dg'}}bodyRows+=`<tr><td>${idx+1}</td><td class="nome">${al.nome}</td>${tds}<td style="font-weight:700">${mediaGeral}</td><td>${pct}${typeof pct==='number'?'%':''}</td><td class="${obsCls}">${obs}</td></tr>`});
$('pgDiv').innerHTML=`<h4 style="font-size:.82em;margin:8px 0">${cl}${tm?' / Turma '+tm:''} — ${anoLet}${trimFiltro?' — '+trimFiltro:''}</h4><div class="tbl"><table class="pauta-tbl" id="pautaGeral"><tr><th>#</th><th style="text-align:left;min-width:120px">Nome</th>${thDiscs}<th>MG</th><th>%</th><th>Obs</th></tr>${bodyRows||'<tr><td colspan="20">Sem dados</td></tr>'}</table></div><div class="btn-group mt-2"><button class="btn btn-ok" onclick="expPautaXL()">📊 XLSX</button><button class="btn btn-s" onclick="expPautaPDF()">📄 PDF</button></div>`}
function expPautaXL(){const t=document.querySelector('#pautaGeral');if(!t)return;const wb=XLSX.utils.table_to_book(t);XLSX.writeFile(wb,'Pauta.xlsx');notify('XLSX!','ok')}
function expPautaPDF(){const{jsPDF}=window.jspdf;const pdf=new jsPDF('l');pdf.setFontSize(11);pdf.text('PAUTA — '+CS.nome,148,10,{align:'center'});const t=document.querySelector('#pautaGeral');if(t)pdf.autoTable({html:t,startY:16,theme:'grid',headStyles:{fillColor:[26,35,126],fontSize:5},styles:{fontSize:6,cellPadding:2},columnStyles:{1:{halign:'left'}}});pdf.save('Pauta.pdf');notify('PDF!','ok')}

async function ldPr(){const cl=$('pCl').value,tm=$('pTm').value,dt=$('pDt').value;if(!cl||!tm){notify('Selecione!','er');return}const als=await db.collection('escolas').doc(CSI).collection('alunos').where('classe','==',cl).where('turma','==',tm).where('estado','==','ativo').get();const sorted=[...als.docs].sort((a,b)=>(a.data().nome||'').localeCompare(b.data().nome||''));const ps=await db.collection('escolas').doc(CSI).collection('presencas').where('classe','==',cl).where('turma','==',tm).where('data','==',dt).get();const pm={};ps.forEach(d=>{pm[d.data().alunoId]=d.data().presente});let r='',i=0;sorted.forEach(d=>{i++;r+=`<tr><td>${i}</td><td>${d.data().nome}</td><td><label><input type="checkbox" ${pm[d.id]!==false?'checked':''} class="pc" data-a="${d.id}"> Presente</label></td></tr>`});$('prD').innerHTML=`<table><tr><th>#</th><th>Nome</th><th>Presença</th></tr>${r}</table><button class="btn btn-ok mt-2" onclick="svPr()">💾</button>`}

async function pgStats(){const als=await db.collection('escolas').doc(CSI).collection('alunos').get();let t=als.size,m=0,f=0,at=0,tr=0,ds=0;const byCl={};als.forEach(d=>{const a=d.data();a.genero==='M'?m++:f++;if(a.estado==='ativo')at++;if(a.estado==='transferido')tr++;if(a.estado==='desistente')ds++;if(!byCl[a.classe])byCl[a.classe]={m:0,f:0};a.genero==='M'?byCl[a.classe].m++:byCl[a.classe].f++});$('eC').innerHTML=`<div class="sg"><div class="sc"><div class="sci bl">👥</div><div class="scn"><h3>${t}</h3><p>Total</p></div></div><div class="sc"><div class="sci gn">✅</div><div class="scn"><h3>${at}</h3><p>Ativos</p></div></div><div class="sc"><div class="sci or">🔄</div><div class="scn"><h3>${tr}</h3><p>Transf.</p></div></div><div class="sc"><div class="sci rd">❌</div><div class="scn"><h3>${ds}</h3><p>Desist.</p></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="card"><div class="card-h"><h3>📊 Classe/Género</h3></div><div class="card-b"><div style="height:220px"><canvas id="chSCl"></canvas></div></div></div><div class="card"><div class="card-h"><h3>📊 Estado</h3></div><div class="card-b"><div style="height:220px"><canvas id="chSEst"></canvas></div></div></div></div><div class="btn-group mt-2"><button class="btn btn-ok" onclick="stXL()">📊 XLSX</button><button class="btn btn-s" onclick="stPDF()">📄 PDF</button></div>`;setTimeout(()=>{const cls=Object.keys(byCl).sort();drawChart('chSCl','bar',cls,[{label:'♂',data:cls.map(c=>byCl[c].m),backgroundColor:'#1565c0'},{label:'♀',data:cls.map(c=>byCl[c].f),backgroundColor:'#e65100'}]);drawChart('chSEst','pie',['Ativos','Transf.','Desist.'],[{data:[at,tr,ds],backgroundColor:['#2e7d32','#ff9800','#c62828']}])},100)}
async function stXL(){const s=await db.collection('escolas').doc(CSI).collection('alunos').get();const st={};s.forEach(d=>{const a=d.data();if(!st[a.classe])st[a.classe]={t:0,m:0,f:0};st[a.classe].t++;a.genero==='M'?st[a.classe].m++:st[a.classe].f++});const d=[['Classe','Total','♂','♀']];for(const[c,v]of Object.entries(st))d.push([c,v.t,v.m,v.f]);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),'Stats');XLSX.writeFile(wb,'Estatisticas.xlsx');notify('XLSX!','ok')}
async function stPDF(){const{jsPDF}=window.jspdf;const pdf=new jsPDF();pdf.setFontSize(14);pdf.text('ESTATÍSTICAS - '+CS.nome,105,15,{align:'center'});const s=await db.collection('escolas').doc(CSI).collection('alunos').get();const st={};s.forEach(d=>{const a=d.data();if(!st[a.classe])st[a.classe]={t:0,m:0,f:0};st[a.classe].t++;a.genero==='M'?st[a.classe].m++:st[a.classe].f++});pdf.autoTable({head:[['Classe','Total','♂','♀']],body:Object.entries(st).sort().map(([c,v])=>[c,v.t,v.m,v.f]),startY:25,theme:'grid',headStyles:{fillColor:[26,35,126]}});pdf.save('Estatisticas.pdf');notify('PDF!','ok')}

async function ldDocAl(){const cl=$('docCl').value;if(!cl)return;let q=db.collection('escolas').doc(CSI).collection('alunos').where('classe','==',cl);const tm=$('docTm').value;if(tm)q=q.where('turma','==',tm);const s=await q.get();const sorted=[...s.docs].sort((a,b)=>(a.data().nome||'').localeCompare(b.data().nome||''));let r='';sorted.forEach(d=>{const a=d.data();r+=`<tr><td><input type="checkbox" class="dk" value="${d.id}"></td><td>${a.nome}</td><td>${a.classe}</td><td><button class="btn btn-sm btn-p" onclick="genDocx('${d.id}')">📄 DOCX</button> <button class="btn btn-sm btn-s" onclick="genDocPDF('${d.id}')">📄 PDF</button></td></tr>`});$('docDiv').innerHTML=`<table><tr><th><input type="checkbox" onclick="document.querySelectorAll('.dk').forEach(c=>c.checked=this.checked)"></th><th>Nome</th><th>Classe</th><th>Ação</th></tr>${r}</table><div class="btn-group mt-2"><button class="btn btn-ok" onclick="genLoteDOCX()">📄 DOCX Lote</button><button class="btn btn-s" onclick="genLotePDF()">📄 PDF Lote</button></div>`}
async function genDocx(aid){const ad=await db.collection('escolas').doc(CSI).collection('alunos').doc(aid).get();const a=ad.data();const e=CS;const dirS=await db.collection('escolas').doc(CSI).collection('usuarios').where('perfil','==','director').get();const dir=dirS.empty?{nome:'Diretor'}:dirS.docs[0].data();const al=$('docAno').value;const tipo=$('docTipo').value;const qrText=`SIGE|${e.nome}|${a.nome}|${a.bi||''}|${tipo}|${al}|${new Date().toISOString()}`;let qrB64;try{qrB64=await QRCode.toDataURL(qrText,{width:100,margin:1})}catch(ex){qrB64=null}const tt=tipo==='decl'?'DECLARAÇÃO':tipo==='bolet'?'BOLETIM DE NOTAS':'CERTIFICADO';try{const{Document,Packer,Paragraph,TextRun,AlignmentType,Table,TableRow,TableCell,WidthType,ImageRun}=docx;const ch=[];ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:60},children:[new TextRun({text:'REPÚBLICA DE ANGOLA',bold:true,size:22})]}));ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:60},children:[new TextRun({text:'MINISTÉRIO DA EDUCAÇÃO',bold:true,size:22})]}));ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:160},children:[new TextRun({text:(e.nome||'').toUpperCase(),bold:true,size:24})]}));ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:300},children:[new TextRun({text:tt,bold:true,size:30,color:'990000'})]}));const corpo=`${dir.nome}, Director, certifica que ${a.nome}, filho(a) de ${a.nomePai||'___'} e de ${a.nomeMae||'___'}, portador(a) do B.I. nº ${a.bi||'___'}, é aluno(a) da ${a.classe||'___'}, turma ${a.turma||'___'}, no ano lectivo ${al}.`;ch.push(new Paragraph({spacing:{after:250},children:[new TextRun({text:corpo,size:22})]}));if(tipo!=='decl'){const ns=await db.collection('escolas').doc(CSI).collection('notas').where('alunoId','==',aid).where('anoLetivo','==',al).get();if(!ns.empty){const bd={};ns.forEach(d=>{const n=d.data();if(!bd[n.disciplina])bd[n.disciplina]={};bd[n.disciplina][n.trimestre]=n});const hdr=new TableRow({children:['Disciplina','1ºT','2ºT','3ºT','MF'].map(h=>new TableCell({children:[new Paragraph({children:[new TextRun({text:h,bold:true,size:18})]})]}))});const drs=Object.entries(bd).sort().map(([d,ts2])=>{const t1=ts2['1º Trimestre']?.mt||'-',t2=ts2['2º Trimestre']?.mt||'-',t3=ts2['3º Trimestre']?.mt||'-';const nums=[t1,t2,t3].filter(x=>typeof x==='number');const mf=nums.length?Math.round(nums.reduce((a2,b)=>a2+b,0)/nums.length):'-';return new TableRow({children:[d,String(t1),String(t2),String(t3),String(mf)].map(v=>new TableCell({children:[new Paragraph({children:[new TextRun({text:v,size:18})]})]}))})});ch.push(new Table({rows:[hdr,...drs],width:{size:100,type:WidthType.PERCENTAGE}}))}}const h=new Date();const ms=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];ch.push(new Paragraph({spacing:{before:250},children:[new TextRun({text:`${e.municipio||''}, ${h.getDate()} de ${ms[h.getMonth()]} de ${h.getFullYear()}`,size:22})]}));ch.push(new Paragraph({spacing:{before:350},alignment:AlignmentType.RIGHT,children:[new TextRun({text:'O Director\n\n_______________________\n'+dir.nome,size:22})]}));if(qrB64){const qrD=qrB64.split(',')[1];const qrBuf=Uint8Array.from(atob(qrD),c2=>c2.charCodeAt(0));ch.push(new Paragraph({spacing:{before:150},alignment:AlignmentType.RIGHT,children:[new ImageRun({data:qrBuf,transformation:{width:70,height:70}})]}))}const doc2=new Document({sections:[{children:ch}]});const blob=await Packer.toBlob(doc2);const url=URL.createObjectURL(blob);const lnk=document.createElement('a');lnk.href=url;lnk.download=`${tt}_${(a.nome||'').replace(/\s/g,'_')}.docx`;document.body.appendChild(lnk);lnk.click();document.body.removeChild(lnk);URL.revokeObjectURL(url);logAct('Gerou DOCX: '+tt+' '+a.nome);notify('DOCX!','ok')}catch(err){console.error(err);notify('Erro: '+err.message,'er')}}
async function genDocPDF(aid){const ad=await db.collection('escolas').doc(CSI).collection('alunos').doc(aid).get();const a=ad.data();const e=CS;const dirS=await db.collection('escolas').doc(CSI).collection('usuarios').where('perfil','==','director').get();const dir=dirS.empty?{nome:'Diretor'}:dirS.docs[0].data();const al=$('docAno').value;const tipo=$('docTipo').value;const tt=tipo==='decl'?'DECLARAÇÃO':tipo==='bolet'?'BOLETIM DE NOTAS':'CERTIFICADO';let qrImg;try{qrImg=await QRCode.toDataURL(`SIGE|${e.nome}|${a.nome}|${a.bi||''}|${tipo}|${al}`,{width:80,margin:1})}catch(ex){qrImg=null}const{jsPDF}=window.jspdf;const pdf=new jsPDF();pdf.setFontSize(11);pdf.text('REPÚBLICA DE ANGOLA',105,15,{align:'center'});pdf.text('MINISTÉRIO DA EDUCAÇÃO',105,21,{align:'center'});pdf.setFontSize(10);pdf.text((e.nome||'').toUpperCase(),105,28,{align:'center'});pdf.setFontSize(14);pdf.setTextColor(153,0,0);pdf.text(tt,105,40,{align:'center'});pdf.setTextColor(0);pdf.setFontSize(9);const corpo=`${dir.nome}, Director, certifica que ${a.nome}, filho(a) de ${a.nomePai||'___'} e de ${a.nomeMae||'___'}, portador(a) do B.I. nº ${a.bi||'___'}, é aluno(a) da ${a.classe||'___'}, turma ${a.turma||'___'}, no ano lectivo ${al}.`;pdf.text(corpo,20,52,{maxWidth:170});let y=70;if(tipo!=='decl'){const ns=await db.collection('escolas').doc(CSI).collection('notas').where('alunoId','==',aid).where('anoLetivo','==',al).get();if(!ns.empty){const bd={};ns.forEach(d=>{const n=d.data();if(!bd[n.disciplina])bd[n.disciplina]={};bd[n.disciplina][n.trimestre]=n});const body=Object.entries(bd).sort().map(([d,ts2])=>{const t1=ts2['1º Trimestre']?.mt||'-',t2=ts2['2º Trimestre']?.mt||'-',t3=ts2['3º Trimestre']?.mt||'-';const nums=[t1,t2,t3].filter(x=>typeof x==='number');const mf=nums.length?Math.round(nums.reduce((a2,b)=>a2+b,0)/nums.length):'-';return[d,String(t1),String(t2),String(t3),String(mf)]});pdf.autoTable({head:[['Disciplina','1ºT','2ºT','3ºT','MF']],body,startY:y,theme:'grid',headStyles:{fillColor:[26,35,126],fontSize:7},styles:{fontSize:7}});y=pdf.lastAutoTable.finalY+10}}const h=new Date();const ms=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];pdf.text(`${e.municipio||''}, ${h.getDate()} de ${ms[h.getMonth()]} de ${h.getFullYear()}`,20,y);pdf.text('O Director',150,y+15);pdf.text('_______________________',135,y+25);pdf.text(dir.nome,140,y+31);if(qrImg)pdf.addImage(qrImg,'PNG',165,y+35,20,20);pdf.save(`${tt}_${(a.nome||'').replace(/\s/g,'_')}.pdf`);logAct('Gerou PDF: '+tt+' '+a.nome);notify('PDF!','ok')}
async function genLoteDOCX(){const cks=document.querySelectorAll('.dk:checked');if(!cks.length){notify('Selecione!','er');return}for(const c of cks)await genDocx(c.value)}
async function genLotePDF(){const cks=document.querySelectorAll('.dk:checked');if(!cks.length){notify('Selecione!','er');return}for(const c of cks)await genDocPDF(c.value)}

async function pgCfgFin(){if(!['director','subdirAdm'].includes(CU.perfil)){notify('Sem permissão!','er');return}const cfg=await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').get();const data=cfg.exists?cfg.data():{ativo:false,emolumentos:[]};let emR='';(data.emolumentos||[]).forEach((em,i)=>{emR+=`<tr><td>${em.nome}</td><td>${(em.valor||0).toLocaleString()} Kz</td><td>${em.periodicidade||''}</td><td><button class="btn btn-sm btn-s" onclick="remEmol(${i})">🗑️</button></td></tr>`});$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>⚙️ Config. Financeira</h3></div><div class="card-b"><p class="mt-1" style="font-weight:600">Sistema de Pagamentos:</p><div class="btn-group mt-1 mb-2"><button class="btn ${data.ativo?'btn-ok':'btn-out'}" onclick="togFin(true)">✅ Ativado</button><button class="btn ${!data.ativo?'btn-s':'btn-out'}" onclick="togFin(false)">❌ Desativado</button></div><div class="divider"></div><h4 style="font-size:.88em;margin-bottom:6px">💰 Emolumentos</h4><table><tr><th>Descrição</th><th>Valor</th><th>Periodicidade</th><th></th></tr>${emR||'<tr><td colspan="4">Nenhum</td></tr>'}</table><div class="fr mt-2"><div class="fg"><label>Descrição</label><input id="emN" placeholder="Ex: Propina"></div><div class="fg"><label>Valor (Kz)</label><input type="number" id="emV"></div></div><div class="fg"><label>Periodicidade</label><select id="emP"><option>Mensal</option><option>Trimestral</option><option>Anual</option><option>Matrícula</option></select></div><button class="btn btn-p mt-1" onclick="addEmol()">➕ Adicionar</button></div></div>`}
async function togFin(v){await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').set({ativo:v},{merge:true});logAct(v?'Ativou pagamentos':'Desativou pagamentos');notify(v?'Ativado!':'Desativado!','ok');pgCfgFin()}
async function addEmol(){const nm=$('emN').value.trim(),vl=parseFloat($('emV').value)||0;if(!nm||!vl)return;const cfg=await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').get();const em=cfg.exists?(cfg.data().emolumentos||[]):[];em.push({nome:nm,valor:vl,periodicidade:$('emP').value});await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').set({emolumentos:em},{merge:true});logAct('Adicionou emolumento: '+nm);notify('OK','ok');pgCfgFin()}
async function remEmol(i){const cfg=await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').get();const em=cfg.data().emolumentos||[];em.splice(i,1);await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').set({emolumentos:em},{merge:true});notify('OK','ok');pgCfgFin()}

async function pgPagamentos(){if(!['director','subdirAdm'].includes(CU.perfil)){notify('Sem permissão!','er');return}const cfg=await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').get();if(!cfg.exists||!cfg.data().ativo){$('eC').innerHTML=`<div class="card"><div class="card-b text-center" style="padding:30px">💰 Pagamentos desativados <button class="btn btn-p mt-2" onclick="eNav('cfgFin')">⚙️ Configurar</button></div></div>`;return}const cs=await db.collection('escolas').doc(CSI).collection('classes').get();$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>💰 Pagamentos</h3></div><div class="card-b"><div class="fp"><select id="fPCl" onchange="ldFPTm()"><option value="">Todas Classes</option>${cs.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}</select><select id="fPTm"><option value="">Todas Turmas</option></select><input type="text" id="fPNm" placeholder="🔍 Nome..." style="flex:1;max-width:200px"><button class="btn btn-p" onclick="ldFPAlunos()">🔍 Filtrar</button></div><div id="fPDiv"><p class="text-center" style="color:var(--txl);padding:15px">Filtre e clique 🔍</p></div></div></div>`}
async function ldFPTm(){const c=$('fPCl').value;if(!c){$('fPTm').innerHTML='<option value="">Todas</option>';return}const s=await db.collection('escolas').doc(CSI).collection('turmas').where('classe','==',c).get();$('fPTm').innerHTML='<option value="">Todas</option>'+s.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}
async function ldFPAlunos(){const cl=$('fPCl').value,tm=$('fPTm').value,nm=($('fPNm').value||'').toLowerCase();const cfg=await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').get();let totalEsp=0;(cfg.data().emolumentos||[]).forEach(em=>{totalEsp+=(em.valor||0)});let q=db.collection('escolas').doc(CSI).collection('alunos').where('estado','==','ativo');if(cl)q=q.where('classe','==',cl);if(tm)q=q.where('turma','==',tm);const als=await q.get();const sorted=[...als.docs].sort((a,b)=>(a.data().nome||'').localeCompare(b.data().nome||''));const pags=await db.collection('escolas').doc(CSI).collection('pagamentos').get();const pm={};pags.forEach(d=>{const p=d.data();if(!pm[p.alunoId])pm[p.alunoId]=0;pm[p.alunoId]+=(p.valor||0)});let rows='',idx=0;sorted.forEach(d=>{const a=d.data();if(nm&&!a.nome.toLowerCase().includes(nm))return;idx++;const pago=pm[d.id]||0;const div=totalEsp-pago;rows+=`<tr><td>${idx}</td><td>${a.nome}</td><td>${a.classe||''}</td><td>${a.turma||''}</td><td>${pago.toLocaleString()} Kz</td><td style="color:${div>0?'var(--s)':'var(--ok)'};font-weight:700">${div>0?div.toLocaleString()+' Kz':'✅'}</td><td><button class="btn btn-sm btn-ok" onclick="regPag('${d.id}','${a.nome.replace(/'/g,"\\'")}')">💰</button> <button class="btn btn-sm btn-inf" onclick="verPag('${d.id}','${a.nome.replace(/'/g,"\\'")}')">👁️</button></td></tr>`});$('fPDiv').innerHTML=`<table><tr><th>#</th><th>Nome</th><th>Classe</th><th>Turma</th><th>Pago</th><th>Dívida</th><th></th></tr>${rows||'<tr><td colspan="7">Nenhum</td></tr>'}</table>`}
function regPag(aid,nm){$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>💰 ${nm}</h3><button class="mx" onclick="cM()">×</button></div><div class="mb"><div class="fr"><div class="fg"><label>Tipo</label><select id="pTp"><option>Propina</option><option>Matrícula</option><option>Confirmação</option><option>Outro</option></select></div><div class="fg"><label>Mês</label><select id="pMs"><option>Janeiro</option><option>Fevereiro</option><option>Março</option><option>Abril</option><option>Maio</option><option>Junho</option><option>Julho</option><option>Agosto</option><option>Setembro</option><option>Outubro</option><option>Novembro</option><option>Dezembro</option></select></div></div><div class="fr"><div class="fg"><label>Valor (Kz)</label><input type="number" id="pVl"></div><div class="fg"><label>Data</label><input type="date" id="pDt" value="${new Date().toISOString().split('T')[0]}"></div></div></div><div class="mf"><button class="btn btn-p" onclick="svPag('${aid}')">💾</button></div>`;oM()}
async function svPag(aid){await db.collection('escolas').doc(CSI).collection('pagamentos').add({alunoId:aid,tipo:$('pTp').value,mes:$('pMs').value,valor:parseFloat($('pVl').value)||0,data:$('pDt').value,criadoEm:ts()});logAct('Registou pagamento: '+($('pVl').value||0)+' Kz');notify('Pago!','ok');cM();ldFPAlunos()}
async function verPag(aid,nm){const ps=await db.collection('escolas').doc(CSI).collection('pagamentos').where('alunoId','==',aid).get();let r='',t=0;ps.forEach(d=>{const p=d.data();t+=(p.valor||0);r+=`<tr><td>${p.tipo}</td><td>${p.mes}</td><td>${(p.valor||0).toLocaleString()} Kz</td><td>${p.data}</td></tr>`});$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>💰 ${nm} — ${t.toLocaleString()} Kz</h3><button class="mx" onclick="cM()">×</button></div><div class="mb"><table><tr><th>Tipo</th><th>Mês</th><th>Valor</th><th>Data</th></tr>${r||'<tr><td colspan="4">—</td></tr>'}</table></div>`;oM()}

// ===== RECEITAS E DESPESAS =====
async function pgRecDesp(){if(!['director','subdirAdm'].includes(CU.perfil)){notify('Sem permissão!','er');return}const[pagsS,finS]=await Promise.all([db.collection('escolas').doc(CSI).collection('pagamentos').get(),db.collection('escolas').doc(CSI).collection('financeiro').get()]);let totalRec=0;pagsS.forEach(d=>{totalRec+=(d.data().valor||0)});let totalDesp=0,outrasRec=0;const despesas=[],outrasReceitas=[];finS.forEach(d=>{const f=d.data();if(f.tipo==='despesa'){totalDesp+=(f.valor||0);despesas.push({id:d.id,...f})}if(f.tipo==='receita'){outrasRec+=(f.valor||0);outrasReceitas.push({id:d.id,...f})}});const totalRecG=totalRec+outrasRec;const saldo=totalRecG-totalDesp;const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];const rM=Array(12).fill(0),dM=Array(12).fill(0);pagsS.forEach(d=>{const p=d.data();if(p.data){const m=new Date(p.data).getMonth();rM[m]+=(p.valor||0)}});finS.forEach(d=>{const f=d.data();if(f.data){const m=new Date(f.data).getMonth();if(f.tipo==='despesa')dM[m]+=(f.valor||0);if(f.tipo==='receita')rM[m]+=(f.valor||0)}});let dR='';despesas.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).forEach(d=>{dR+=`<tr><td>${d.data||''}</td><td>${d.descricao||''}</td><td>${d.categoria||''}</td><td>${(d.valor||0).toLocaleString()} Kz</td><td><button class="btn btn-sm btn-s" onclick="delC('financeiro','${d.id}',pgRecDesp)">🗑️</button></td></tr>`});let rR='';outrasReceitas.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).forEach(d=>{rR+=`<tr><td>${d.data||''}</td><td>${d.descricao||''}</td><td>${(d.valor||0).toLocaleString()} Kz</td><td><button class="btn btn-sm btn-s" onclick="delC('financeiro','${d.id}',pgRecDesp)">🗑️</button></td></tr>`});$('eC').innerHTML=`<div class="fin-grid"><div class="fin-card green"><h2>${totalRecG.toLocaleString()} Kz</h2><p>💰 Receitas Totais</p></div><div class="fin-card red"><h2>${totalDesp.toLocaleString()} Kz</h2><p>📉 Despesas</p></div><div class="fin-card blue"><h2>${saldo.toLocaleString()} Kz</h2><p>${saldo>=0?'✅':'⚠️'} Saldo Caixa</p></div></div><div class="card"><div class="card-h"><h3>📊 Receitas vs Despesas (Mensal)</h3></div><div class="card-b"><div style="height:220px"><canvas id="chRD"></canvas></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="card"><div class="card-h"><h3>📉 Despesas</h3><button class="btn btn-sm btn-s" onclick="addDesp()">➕</button></div><div class="card-b"><div class="tbl"><table><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th></th></tr>${dR||'<tr><td colspan="5">Nenhuma</td></tr>'}</table></div></div></div><div class="card"><div class="card-h"><h3>💰 Outras Receitas</h3><button class="btn btn-sm btn-ok" onclick="addRec()">➕</button></div><div class="card-b"><div class="tbl"><table><tr><th>Data</th><th>Descrição</th><th>Valor</th><th></th></tr>${rR||'<tr><td colspan="4">Nenhuma</td></tr>'}</table></div><p class="mt-2">Propinas: <strong>${totalRec.toLocaleString()} Kz</strong></p></div></div><div class="btn-group mt-2"><button class="btn btn-ok" onclick="finXLSX()">📊 XLSX</button><button class="btn btn-s" onclick="finPDF()">📄 PDF</button></div>`;setTimeout(()=>{drawChart('chRD','bar',meses,[{label:'Receitas',data:rM,backgroundColor:'#2e7d32'},{label:'Despesas',data:dM,backgroundColor:'#c62828'}])},100)}
function addDesp(){$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>➕ Despesa</h3><button class="mx" onclick="cM()">×</button></div><div class="mb"><div class="fg"><label>Descrição</label><input id="dDs"></div><div class="fr"><div class="fg"><label>Valor (Kz)</label><input type="number" id="dVl"></div><div class="fg"><label>Data</label><input type="date" id="dDt" value="${new Date().toISOString().split('T')[0]}"></div></div><div class="fg"><label>Categoria</label><select id="dCt"><option>Material Escolar</option><option>Manutenção</option><option>Salários</option><option>Água/Luz</option><option>Equipamentos</option><option>Transporte</option><option>Outro</option></select></div></div><div class="mf"><button class="btn btn-s" onclick="svDesp()">💾</button></div>`;oM()}
async function svDesp(){await db.collection('escolas').doc(CSI).collection('financeiro').add({tipo:'despesa',descricao:$('dDs').value.trim(),valor:parseFloat($('dVl').value)||0,data:$('dDt').value,categoria:$('dCt').value,criadoEm:ts()});logAct('Despesa: '+$('dDs').value);cM();pgRecDesp()}
function addRec(){$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>➕ Receita</h3><button class="mx" onclick="cM()">×</button></div><div class="mb"><div class="fg"><label>Descrição</label><input id="rDs"></div><div class="fr"><div class="fg"><label>Valor (Kz)</label><input type="number" id="rVl"></div><div class="fg"><label>Data</label><input type="date" id="rDt" value="${new Date().toISOString().split('T')[0]}"></div></div></div><div class="mf"><button class="btn btn-ok" onclick="svRec()">💾</button></div>`;oM()}
async function svRec(){await db.collection('escolas').doc(CSI).collection('financeiro').add({tipo:'receita',descricao:$('rDs').value.trim(),valor:parseFloat($('rVl').value)||0,data:$('rDt').value,criadoEm:ts()});logAct('Receita: '+$('rDs').value);cM();pgRecDesp()}
async function finXLSX(){const[pags,fin]=await Promise.all([db.collection('escolas').doc(CSI).collection('pagamentos').get(),db.collection('escolas').doc(CSI).collection('financeiro').get()]);const wb=XLSX.utils.book_new();const d=[['Tipo','Descrição','Valor','Data']];pags.forEach(x=>{const p=x.data();d.push(['Propina '+p.tipo,p.mes,(p.valor||0),p.data])});fin.forEach(x=>{const f=x.data();d.push([f.tipo,f.descricao,(f.valor||0),f.data])});XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),'Financeiro');XLSX.writeFile(wb,'Financeiro.xlsx');notify('XLSX!','ok')}
async function finPDF(){const{jsPDF}=window.jspdf;const pdf=new jsPDF();pdf.setFontSize(14);pdf.text('RELATÓRIO FINANCEIRO - '+CS.nome,105,15,{align:'center'});const[pags,fin]=await Promise.all([db.collection('escolas').doc(CSI).collection('pagamentos').get(),db.collection('escolas').doc(CSI).collection('financeiro').get()]);let tRec=0,tDesp=0;pags.forEach(d=>{tRec+=(d.data().valor||0)});fin.forEach(d=>{const f=d.data();if(f.tipo==='receita')tRec+=(f.valor||0);if(f.tipo==='despesa')tDesp+=(f.valor||0)});pdf.setFontSize(10);pdf.text(`Receitas: ${tRec.toLocaleString()} Kz`,15,30);pdf.text(`Despesas: ${tDesp.toLocaleString()} Kz`,15,37);pdf.text(`SALDO: ${(tRec-tDesp).toLocaleString()} Kz`,15,44);pdf.save('Financeiro.pdf');notify('PDF!','ok')}
