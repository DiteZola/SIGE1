<!DOCTYPE html>
<html lang="pt-AO">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#1a237e;--pl:#3949ab;--pd:#0d1642;--s:#c62828;--sl:#ef5350;--ac:#ff8f00;--ok:#2e7d32;--wn:#ef6c00;--dg:#c62828;--inf:#0277bd;--bg:#f0f2f5;--card:#fff;--tx:#212121;--txl:#757575;--brd:#e0e0e0;--sh:0 2px 10px rgba(0,0,0,.07);--r:8px;--sw:260px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.hidden{display:none!important}
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1642,#1a237e 50%,#3949ab);padding:20px}
.auth-card{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-card.wide{max-width:860px}
.alogo{text-align:center;margin-bottom:24px}
.alogo .licon{width:72px;height:72px;background:linear-gradient(135deg,var(--p),var(--pl));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:2em;color:#fff}
.alogo h1{color:var(--p);font-size:1.5em}
.alogo p{color:var(--txl);font-size:.85em;margin-top:3px}
.fg{margin-bottom:11px}
.fg label{display:block;margin-bottom:3px;font-weight:600;font-size:.8em}
.fg .req{color:var(--s)}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;border:2px solid var(--brd);border-radius:var(--r);font-size:.88em;outline:none;background:#fafbfc;font-family:inherit;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--p);background:#fff}
.fg textarea{resize:vertical;min-height:55px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.st{font-size:.88em;font-weight:700;color:var(--p);margin:14px 0 7px;padding-bottom:4px;border-bottom:2px solid #e8eaf6}
.btn{padding:8px 16px;border:none;border-radius:var(--r);cursor:pointer;font-size:.85em;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:5px;justify-content:center;font-family:inherit}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-p{background:var(--p);color:#fff}.btn-s{background:var(--s);color:#fff}.btn-ok{background:var(--ok);color:#fff}.btn-wn{background:var(--wn);color:#fff}.btn-inf{background:var(--inf);color:#fff}.btn-dg{background:var(--dg);color:#fff}
.btn-out{background:transparent;border:2px solid var(--p);color:var(--p)}.btn-out:hover{background:var(--p);color:#fff}
.btn-ghost{background:rgba(26,35,126,.06);color:var(--p)}
.btn-block{width:100%;display:flex}.btn-sm{padding:4px 10px;font-size:.76em}.btn-lg{padding:11px 22px;font-size:.95em}.btn-group{display:flex;gap:5px;flex-wrap:wrap}
.dash{display:flex;min-height:100vh}
.side{width:var(--sw);background:linear-gradient(180deg,var(--pd),var(--p) 50%,#283593);color:#fff;position:fixed;height:100vh;overflow-y:auto;z-index:200;transition:transform .3s;left:0;top:0}
.side::-webkit-scrollbar{width:3px}.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
.shdr{padding:14px;text-align:center;border-bottom:1px solid rgba(255,255,255,.1)}
.shdr .slogo{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.3);margin:0 auto 7px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;overflow:hidden}
.shdr .slogo img{width:100%;height:100%;object-fit:cover}
.shdr h3{font-size:.82em}.shdr p{font-size:.7em;opacity:.6}
.smenu{padding:5px 0}.scat{padding:7px 15px 2px;font-size:.62em;text-transform:uppercase;letter-spacing:1.5px;opacity:.4;font-weight:700}
.si{display:flex;align-items:center;padding:8px 15px;cursor:pointer;transition:all .15s;gap:9px;font-size:.8em;border-left:3px solid transparent;color:rgba(255,255,255,.8)}
.si:hover{background:rgba(255,255,255,.07)}.si.act{background:rgba(255,255,255,.1);border-left-color:var(--ac);font-weight:600;color:#fff}
.si .ic{width:16px;text-align:center;flex-shrink:0}
.si.logout{margin-top:8px;color:var(--sl);border-top:1px solid rgba(255,255,255,.08);padding-top:11px}
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}.sov.show{display:block}
.main{margin-left:var(--sw);flex:1;min-height:100vh;transition:margin-left .3s}
.top{background:#fff;padding:0 18px;height:50px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.06);position:sticky;top:0;z-index:50}
.top h2{font-size:1em;color:var(--p)}.topr{display:flex;align-items:center;gap:9px}
.uinfo{display:flex;align-items:center;gap:7px;cursor:pointer;padding:3px 7px;border-radius:var(--r)}.uinfo:hover{background:var(--bg)}
.uav{width:32px;height:32px;border-radius:50%;border:2px solid var(--p);background:#e8eaf6;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:.85em}
.uav img{width:100%;height:100%;object-fit:cover}
.uname{font-size:.8em;font-weight:600}.urole{font-size:.68em;color:var(--txl)}
.content{padding:18px}
.mtog{display:none;background:none;border:none;font-size:1.2em;color:var(--p);cursor:pointer;margin-right:10px}
@media(max-width:900px){.side{transform:translateX(-100%)}.side.open{transform:translateX(0)}.main{margin-left:0!important}.mtog{display:block}.fr,.fr3{grid-template-columns:1fr}}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.sc{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--sh);display:flex;align-items:center;gap:11px}
.sci{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2em;color:#fff;flex-shrink:0}
.sci.bl{background:#1565c0}.sci.gn{background:#2e7d32}.sci.or{background:#e65100}.sci.rd{background:#c62828}.sci.pp{background:#6a1b9a}.sci.tl{background:#00695c}
.scn h3{font-size:1.4em;line-height:1}.scn p{font-size:.75em;color:var(--txl);margin-top:1px}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden}
.card-h{padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;background:#fafbfc}
.card-h h3{font-size:.9em;color:var(--p)}.card-b{padding:14px}
.tbl{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:7px 9px;text-align:left;border-bottom:1px solid #eee;font-size:.8em}
th{background:var(--p);color:#fff;font-weight:600;white-space:nowrap}
tr:hover td{background:#f5f7ff}
.badge{padding:2px 8px;border-radius:14px;font-size:.7em;font-weight:600;display:inline-block}
.b-ok{background:#e8f5e9;color:var(--ok)}.b-wn{background:#fff3e0;color:var(--wn)}.b-dg{background:#ffebee;color:var(--dg)}.b-p{background:#e8eaf6;color:var(--p)}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:660px;max-height:93vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal.lg{max-width:880px}.modal.xl{max-width:1050px}
.mh{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;background:var(--p);color:#fff;border-radius:12px 12px 0 0;position:sticky;top:0;z-index:1}
.mh h3{font-size:.9em}.mx{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:1.1em;cursor:pointer;padding:2px 7px;border-radius:5px}
.mb{padding:18px}.mf{padding:10px 18px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:7px;background:#fafbfc;border-radius:0 0 12px 12px}
.phup{text-align:center;margin-bottom:12px}
.phpv{width:100px;height:100px;border-radius:50%;border:3px dashed var(--brd);display:flex;align-items:center;justify-content:center;margin:0 auto 5px;overflow:hidden;cursor:pointer;background:#fafbfc;position:relative}
.phpv:hover{border-color:var(--p)}.phpv img{width:100%;height:100%;object-fit:cover}
.phpv .pht{color:var(--txl);font-size:.75em;text-align:center;padding:6px}
.phpv .phb{position:absolute;bottom:2px;right:2px;background:var(--p);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75em}
.fp{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:10px;padding:9px;background:#f5f7ff;border-radius:var(--r);border:1px solid #e8eaf6}
.fp select,.fp input{padding:5px 9px;border:1px solid var(--brd);border-radius:var(--r);font-size:.8em;background:#fff;font-family:inherit}
.acwrap{position:relative}.aclist{position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid var(--p);border-top:none;border-radius:0 0 var(--r) var(--r);max-height:180px;overflow-y:auto;z-index:10;box-shadow:0 6px 20px rgba(0,0,0,.1)}
.acitem{padding:8px 10px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:.82em}.acitem:hover{background:#e8eaf6}
.toast{position:fixed;top:14px;right:14px;padding:10px 16px;border-radius:var(--r);color:#fff;z-index:2000;animation:ti .3s;max-width:360px;box-shadow:0 5px 20px rgba(0,0,0,.2);font-size:.83em}
.toast.ok{background:#2e7d32}.toast.er{background:#c62828}.toast.wn{background:#e65100}.toast.in{background:#0277bd}
@keyframes ti{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.tabs{display:flex;border-bottom:2px solid var(--brd);margin-bottom:14px}.tab{padding:7px 16px;cursor:pointer;font-weight:600;color:var(--txl);border-bottom:3px solid transparent;margin-bottom:-2px;font-size:.8em}.tab.act{color:var(--p);border-bottom-color:var(--p)}
.divider{height:1px;background:var(--brd);margin:12px 0}
.avsm{width:26px;height:26px;border-radius:50%;object-fit:cover}
.mt-1{margin-top:5px}.mt-2{margin-top:12px}
.text-center{text-align:center}
.prog{height:6px;background:#eee;border-radius:4px;overflow:hidden;margin:3px 0}.prog-bar{height:100%;border-radius:4px;transition:width .6s}
.prog-bar.gn{background:var(--ok)}.prog-bar.bl{background:var(--inf)}.prog-bar.or{background:var(--ac)}.prog-bar.rd{background:var(--s)}
.fin-card{border-radius:var(--r);padding:18px;margin-bottom:14px;color:#fff}
.fin-card.green{background:linear-gradient(135deg,#1b5e20,#388e3c)}
.fin-card.red{background:linear-gradient(135deg,#b71c1c,#e53935)}
.fin-card.blue{background:linear-gradient(135deg,#0d47a1,#1976d2)}
.fin-card h2{font-size:1.6em}.fin-card p{opacity:.8;font-size:.82em}
.fin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:700px){.fin-grid{grid-template-columns:1fr}}
@media(max-width:500px){.sg{grid-template-columns:1fr 1fr}}
@media print{.side,.top,.sov{display:none!important}.main{margin-left:0!important}}
</style>
</head>
<body>
<div id="pgSetup" class="auth-bg"><div class="auth-card wide"><div class="alogo"><div class="licon">🏫</div><h1>SIGE</h1><p>Sistema Integrado de Gestão Escolar</p></div><div class="st">🔐 Configuração Inicial</div><div class="fr"><div class="fg"><label>Nome <span class="req">*</span></label><input id="sNm"></div><div class="fg"><label>Email <span class="req">*</span></label><input id="sEm"></div></div><div class="fr"><div class="fg"><label>Utilizador <span class="req">*</span></label><input id="sUs"></div><div class="fg"><label>Senha <span class="req">*</span></label><input type="password" id="sPw"></div></div><div class="fg"><label>Confirmar <span class="req">*</span></label><input type="password" id="sPw2"></div><button class="btn btn-p btn-block btn-lg mt-2" onclick="criarAdmin()">🔐 Criar</button></div></div>

<div id="pgLogin" class="auth-bg hidden"><div class="auth-card"><div class="alogo"><div class="licon">🏫</div><h1>SIGE</h1><p>Sistema Integrado de Gestão Escolar</p></div><div class="tabs" style="justify-content:center" id="ltabs"><div class="tab act" onclick="ltab('login',this)">🔑 Entrar</div><div class="tab" onclick="ltab('enc',this)">👨‍👩‍👧 Encarregado</div></div><div id="loginDiv"><div class="fg"><input id="lUs" placeholder="Utilizador ou email"></div><div class="fg"><input type="password" id="lPw" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()"></div><button class="btn btn-p btn-block btn-lg" onclick="doLogin()">🔑 Entrar</button><p id="loginErr" class="hidden" style="color:var(--s);text-align:center;margin-top:8px;font-size:.82em"></p></div><div id="encDiv" class="hidden"><div class="fg"><input id="encBI" placeholder="BI ou Cédula do aluno"></div><div class="fg"><select id="encEsc"></select></div><button class="btn btn-p btn-block" onclick="consultarEnc()">🔍</button><div id="encRes" class="hidden mt-2"></div></div></div></div>

<div id="pgAdmin" class="dash hidden"><div class="sov" id="ovA" onclick="cS('a')"></div><div class="side" id="sideA"><div class="shdr"><div class="slogo">⚙️</div><h3 id="anm">Admin</h3><p>Sistema</p></div><div class="smenu"><div class="scat">Principal</div><div class="si act" onclick="aN('dash',this)"><span class="ic">📊</span>Painel</div><div class="si" onclick="aN('esc',this)"><span class="ic">🏫</span>Escolas</div><div class="si logout" onclick="logout()"><span class="ic">🚪</span>Sair</div></div></div><div class="main"><div class="top"><button class="mtog" onclick="oS('a')">☰</button><h2 id="aT">Painel</h2><div class="topr"><div class="uinfo" onclick="logout()"><div class="uav">👤</div><div><div class="uname" id="anmT">Admin</div><div class="urole">Admin</div></div></div></div></div><div class="content" id="aC"></div></div></div>

<div id="pgEsc" class="dash hidden"><div class="sov" id="ovE" onclick="cS('e')"></div><div class="side" id="sideE"><div class="shdr"><div class="slogo" id="eLogo">🏫</div><h3 id="eNS">Escola</h3><p id="ePS">Perfil</p></div><div class="smenu" id="eMenu"></div></div><div class="main"><div class="top"><button class="mtog" onclick="oS('e')">☰</button><h2 id="eT">Painel</h2><div class="topr"><div class="uinfo"><div class="uav" id="eAv">👤</div><div><div class="uname" id="eUN">User</div><div class="urole" id="eUR">Perfil</div></div><span style="margin-left:5px;cursor:pointer" onclick="logout()">🚪</span></div></div></div><div class="content" id="eC"></div></div></div>

<div id="mOv" class="mov hidden" onclick="if(event.target===this)cM()"><div class="modal" id="mB"></div></div>
<div id="tC"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDrxTEwO8vLDyYSZGk2UbQb11oWEA3hlIE",authDomain:"sige1-2ee70.firebaseapp.com",projectId:"sige1-2ee70",storageBucket:"sige1-2ee70.firebasestorage.app",messagingSenderId:"976468440304",appId:"1:976468440304:web:f5d0344344c93f0e24be35"});
const db=firebase.firestore();let CU=null,CS=null,CSI=null;
const $=id=>document.getElementById(id),show=id=>$(id)?.classList.remove('hidden'),hide=id=>$(id)?.classList.add('hidden'),ts=()=>firebase.firestore.FieldValue.serverTimestamp(),isMob=()=>window.innerWidth<=900;
const PN={director:'Diretor Geral',subdirPed:'Subdiretor Pedagógico',subdirAdm:'Subdiretor Administrativo',secretaria:'Secretário(a)',professor:'Professor(a)'};
function notify(m,t='in'){const d=document.createElement('div');d.className='toast '+t;d.textContent=m;$('tC').appendChild(d);setTimeout(()=>d.remove(),4000)}
function calcIdade(n){if(!n)return'';const h=new Date(),x=new Date(n);let a=h.getFullYear()-x.getFullYear();if(h.getMonth()<x.getMonth()||(h.getMonth()===x.getMonth()&&h.getDate()<x.getDate()))a--;return a>=0?a:''}
function genMat(){return'MAT-'+new Date().getFullYear()+'-'+Math.floor(10000+Math.random()*90000)}
function provO(){return['','Bengo','Benguela','Bié','Cabinda','Cuando Cubango','Cuanza Norte','Cuanza Sul','Cunene','Huambo','Huíla','Luanda','Lunda Norte','Lunda Sul','Malanje','Moxico','Namibe','Uíge','Zaire'].map(p=>`<option value="${p}">${p||'— Selecione —'}</option>`).join('')}
function cM(){hide('mOv')}function oM(){show('mOv')}
function oS(c){$(c==='a'?'sideA':'sideE').classList.add('open');$(c==='a'?'ovA':'ovE').classList.add('show')}
function cS(c){$(c==='a'?'sideA':'sideE').classList.remove('open');$(c==='a'?'ovA':'ovE').classList.remove('show')}
function autoC(c){if(isMob())cS(c)}
async function imgB64(inp){return new Promise(r=>{if(!inp.files?.[0]){r(null);return}const f=inp.files[0];if(f.size>5.5e6){notify('Max 5,5MB!','er');r(null);return}const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;const mx=800;if(w>mx||h>mx){if(w>h){h*=mx/w;w=mx}else{w*=mx/h;h=mx}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);r(c.toDataURL('image/jpeg',0.8))};img.src=e.target.result};rd.readAsDataURL(f)})}
function prevF(i,img,txt){const f=$(i).files[0];if(!f||f.size>5.5e6)return;const r=new FileReader();r.onload=e=>{$(img).src=e.target.result;$(img).style.display='block';if(txt)$(txt).style.display='none'};r.readAsDataURL(f)}
function drawChart(id,type,labels,datasets,opts={}){const ctx=$(id);if(!ctx)return;if(ctx._chart)ctx._chart.destroy();ctx._chart=new Chart(ctx,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},...opts}})}

// INIT
async function init(){try{const a=await db.collection('system').doc('admin').get();if(a.exists){hide('pgSetup');show('pgLogin');ldEncE()}else{show('pgSetup');hide('pgLogin')}}catch(e){show('pgSetup')}}
async function criarAdmin(){const n=$('sNm').value.trim(),u=$('sUs').value.trim(),p=$('sPw').value;if(!n||!$('sEm').value.trim()||!u||!p||p.length<6||p!==$('sPw2').value){notify('Verifique os campos!','er');return}await db.collection('system').doc('admin').set({nome:n,email:$('sEm').value.trim(),username:u,password:p,perfil:'admin',criadoEm:ts()});notify('Admin criado!','ok');hide('pgSetup');show('pgLogin');ldEncE()}
function ltab(t,el){document.querySelectorAll('#ltabs .tab').forEach(x=>x.classList.remove('act'));el.classList.add('act');t==='login'?(show('loginDiv'),hide('encDiv')):(hide('loginDiv'),show('encDiv'));hide('loginErr')}
async function doLogin(){const u=$('lUs').value.trim(),p=$('lPw').value;hide('loginErr');if(!u||!p){notify('Preencha!','er');return}const ad=await db.collection('system').doc('admin').get();if(ad.exists){const a=ad.data();if((a.username===u||a.email===u)&&a.password===p){CU={...a,id:'admin',perfil:'admin'};hide('pgLogin');show('pgAdmin');$('anm').textContent=$('anmT').textContent=a.nome;aN('dash');return}}const escs=await db.collection('escolas').get();for(const ed of escs.docs){const us=await db.collection('escolas').doc(ed.id).collection('usuarios').get();for(const ud of us.docs){const uu=ud.data();if((uu.username===u||uu.email===u)&&uu.password===p){if(uu.estado==='inativo'){notify('Conta inativa!','er');return}CU={...uu,id:ud.id};CSI=ed.id;CS=ed.data();hide('pgLogin');show('pgEsc');initE();return}}}$('loginErr').textContent='❌ Credenciais inválidas!';show('loginErr')}
function logout(){CU=CS=CSI=null;hide('pgAdmin');hide('pgEsc');show('pgLogin');$('lUs').value=$('lPw').value='';hide('loginErr')}
async function ldEncE(){const s=await db.collection('escolas').get();let h='<option value="">— Escola —</option>';s.forEach(d=>{h+=`<option value="${d.id}">${d.data().nome}</option>`});$('encEsc').innerHTML=h}

function mEsc(){$('mB').className='modal xl';$('mB').innerHTML=`<div class="mh"><h3>➕ Nova Escola</h3><button class="mx" onclick="cM()">&times;</button></div><div class="mb"><div class="fr"><div class="fg"><label>Nome <span class="req">*</span></label><input id="eNm"></div><div class="fg"><label>Província</label><select id="ePv">${provO()}</select></div></div><div class="fg"><label>Município</label><input id="eMn"></div><div class="st">👤 Diretor</div><div class="phup"><div class="phpv" onclick="$('dfoto').click()"><span class="pht" id="dfotoT">📷</span><img id="dfotoI" style="display:none"><div class="phb">📷</div></div><input type="file" id="dfoto" accept="image/*" style="display:none" onchange="prevF('dfoto','dfotoI','dfotoT')"></div><div class="fr"><div class="fg"><label>Nome <span class="req">*</span></label><input id="dNm"></div><div class="fg"><label>BI</label><input id="dBI"></div></div><div class="fr"><div class="fg"><label>Tel</label><input id="dTl"></div><div class="fg"><label>Email</label><input id="dEm"></div></div><div class="st">🔑 Credenciais</div><div class="fr"><div class="fg"><label>User <span class="req">*</span></label><input id="dUs"></div><div class="fg"><label>Senha <span class="req">*</span></label><input type="password" id="dPw"></div></div></div><div class="mf"><button class="btn btn-out" onclick="cM()">Cancelar</button><button class="btn btn-p" onclick="svEsc()">💾</button></div>`;oM()}
async function svEsc(){const n=$('eNm').value.trim();if(!n||!$('dNm').value.trim()||$('dPw').value.length<6){notify('Preencha!','er');return}let foto=null;if($('dfoto').files[0])foto=await imgB64($('dfoto'));const r=await db.collection('escolas').add({nome:n,provincia:$('ePv').value,municipio:$('eMn').value.trim(),directorNome:$('dNm').value.trim(),directorBI:$('dBI').value.trim(),criadoEm:ts()});await db.collection('escolas').doc(r.id).collection('usuarios').add({nome:$('dNm').value.trim(),bi:$('dBI').value.trim(),telefone:$('dTl').value.trim(),email:$('dEm').value.trim(),username:$('dUs').value.trim(),password:$('dPw').value,perfil:'director',estado:'ativo',foto:foto,criadoEm:ts()});notify('Criada!','ok');cM();admEsc();ldEncE()}
async function delEsc(id){if(!confirm('Eliminar?'))return;for(const c of['usuarios','alunos','notas','turmas','classes','disciplinas','turnos','anosLetivos','presencas','mensagens','faltas','eventos','pagamentos','config','patrimonio','financeiro']){const s=await db.collection('escolas').doc(id).collection(c).get();for(const d of s.docs)await d.ref.delete()}await db.collection('escolas').doc(id).delete();notify('OK','ok');admEsc();ldEncE()}

}else if(p==='subdirAdm'){m+='<div class="scat">Administrativo</div>';m+=smi('users','👤','Funcionários')+smi('faltasF','📊','Faltas');m+='<div class="scat">Financeiro</div>';m+=smi('cfgFin','⚙️','Config. Financeira')+smi('financeiro','💰','Pagamentos')+smi('recDesp','📊','Receitas/Despesas')+smi('patrimonio','🏗️','Património');m+='<div class="scat">Outros</div>';m+=smi('msgs','💬','Mensagens')
}else if(p==='secretaria'){m+='<div class="scat">Secretaria</div>';m+=smi('alunos','👨‍🎓','Alunos')+smi('pautas','📋','Pautas Gerais')+smi('presen','✅','Presenças');m+='<div class="scat">Documentos</div>';m+=smi('decl','📜','Declarações')+smi('bolet','📋','Boletins')+smi('cert','🎓','Certificados');m+='<div class="scat">Outros</div>';m+=smi('stats','📈','Estatísticas')+smi('msgs','💬','Mensagens')

// DASHBOARD
async function pgDash(){const[als,uss]=await Promise.all([db.collection('escolas').doc(CSI).collection('alunos').get(),db.collection('escolas').doc(CSI).collection('usuarios').get()]);let m=0,f=0;const byCl={};als.forEach(d=>{const a=d.data();a.genero==='M'?m++:f++;if(!byCl[a.classe])byCl[a.classe]=0;byCl[a.classe]++});const anos=await db.collection('escolas').doc(CSI).collection('anosLetivos').where('estado','==','aberto').get();$('eC').innerHTML=`<div class="sg"><div class="sc"><div class="sci bl">👨‍🎓</div><div class="scn"><h3>${als.size}</h3><p>Alunos (${m}♂/${f}♀)</p></div></div><div class="sc"><div class="sci gn">👨‍🏫</div><div class="scn"><h3>${uss.docs.filter(d=>d.data().perfil==='professor').length}</h3><p>Professores</p></div></div><div class="sc"><div class="sci or">👥</div><div class="scn"><h3>${uss.size}</h3><p>Funcionários</p></div></div><div class="sc"><div class="sci pp">📅</div><div class="scn"><h3 style="font-size:.9em">${anos.empty?'—':anos.docs[0].data().nome}</h3><p>Ano Letivo</p></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="card"><div class="card-h"><h3>📊 Por Classe</h3></div><div class="card-b"><div style="height:220px"><canvas id="chCl"></canvas></div></div></div><div class="card"><div class="card-h"><h3>📊 Género</h3></div><div class="card-b"><div style="height:220px"><canvas id="chGn"></canvas></div></div></div></div>`;setTimeout(()=>{const cls=Object.keys(byCl).sort();drawChart('chCl','bar',cls,[{label:'Alunos',data:cls.map(c=>byCl[c]),backgroundColor:'#1565c0'}]);drawChart('chGn','doughnut',['Masculino','Feminino'],[{data:[m,f],backgroundColor:['#1565c0','#e65100']}])},100)}

async function pgAnoLet(){const s=await db.collection('escolas').doc(CSI).collection('anosLetivos').orderBy('criadoEm','desc').get();let r='';s.forEach(d=>{const a=d.data();r+=`<tr><td>${a.nome}</td><td><span class="badge ${a.estado==='aberto'?'b-ok':'b-dg'}">${a.estado}</span></td><td>${a.trimestre||'—'}</td><td><span class="badge ${a.trimestreEstado==='aberto'?'b-ok':'b-wn'}">${a.trimestreEstado||'fechado'}</span></td><td>${a.estado==='aberto'?`<button class="btn btn-sm btn-wn" onclick="mTrim('${d.id}')">📅</button> <button class="btn btn-sm btn-dg" onclick="fAno('${d.id}')">🔒</button>`:`<button class="btn btn-sm btn-ok" onclick="rAno('${d.id}')">🔓</button>`}</td></tr>`});$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>📅 Anos Letivos</h3><button class="btn btn-p" onclick="nAno()">➕</button></div><div class="card-b"><table><tr><th>Ano</th><th>Estado</th><th>Trim.</th><th>Est.</th><th>Ações</th></tr>${r||'<tr><td colspan="5">—</td></tr>'}</table></div></div>`}
function nAno(){const y=new Date().getFullYear();$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>➕ Ano</h3><button class="mx" onclick="cM()">&times;</button></div><div class="mb"><div class="fg"><label>Nome</label><input id="anN" value="${y}/${y+1}"></div></div><div class="mf"><button class="btn btn-out" onclick="cM()">Cancelar</button><button class="btn btn-p" onclick="cAno()">Criar</button></div>`;oM()}
async function cAno(){const nm=$('anN').value.trim();if(!nm)return;const ab=await db.collection('escolas').doc(CSI).collection('anosLetivos').where('estado','==','aberto').get();for(const d of ab.docs)await d.ref.update({estado:'fechado',trimestreEstado:'fechado'});await db.collection('escolas').doc(CSI).collection('anosLetivos').add({nome:nm,estado:'aberto',trimestre:'1º Trimestre',trimestreEstado:'aberto',criadoEm:ts()});notify('Criado!','ok');cM();pgAnoLet()}

async function rAno(id){const ab=await db.collection('escolas').doc(CSI).collection('anosLetivos').where('estado','==','aberto').get();for(const d of ab.docs)await d.ref.update({estado:'fechado'});await db.collection('escolas').doc(CSI).collection('anosLetivos').doc(id).update({estado:'aberto'});notify('OK','ok');pgAnoLet()}
function mTrim(id){$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>📅</h3><button class="mx" onclick="cM()">&times;</button></div><div class="mb"><div class="fg"><select id="sT"><option>1º Trimestre</option><option>2º Trimestre</option><option>3º Trimestre</option></select></div><div class="btn-group"><button class="btn btn-ok" onclick="aT('${id}')">🔓 Abrir</button><button class="btn btn-dg" onclick="fT('${id}')">🔒 Fechar</button></div></div>`;oM()}

async function acAl(t){const l=$('acL');if(t.length<3){l.classList.add('hidden');return}const s=await db.collection('escolas').doc(CSI).collection('alunos').get();const m=[];s.forEach(d=>{const a=d.data();if(a.nome?.toLowerCase().includes(t.toLowerCase()))m.push({id:d.id,...a})});if(!m.length){l.classList.add('hidden');return}l.classList.remove('hidden');l.innerHTML=m.slice(0,8).map(a=>`<div class="acitem" onclick="fillAl('${a.id}')"><strong>${a.nome}</strong><br><small>${a.classe||''} · ${a.turma||''}</small></div>`).join('')}

async function lP(){const cl=$('nC').value,tm=$('nT').value,dsc=$('nD').value,trim=$('nTr').value,aId=$('nA').value;if(!cl||!tm||!dsc){notify('Selecione!','er');return}const ad=await db.collection('escolas').doc(CSI).collection('anosLetivos').doc(aId).get();const ano=ad.data(),aNm=ano.nome;const lk=ano.estado!=='aberto'||ano.trimestreEstado!=='aberto'||ano.trimestre!==trim;const dis=lk?'disabled':'';const als=await db.collection('escolas').doc(CSI).collection('alunos').where('classe','==',cl).where('turma','==',tm).where('estado','==','ativo').get();const ns=await db.collection('escolas').doc(CSI).collection('notas').where('classe','==',cl).where('turma','==',tm).where('disciplina','==',dsc).where('trimestre','==',trim).where('anoLetivo','==',aNm).get();const nm={};ns.forEach(d=>{nm[d.data().alunoId]=d.data()});let rows='',i=0;als.forEach(d=>{i++;const a=d.data(),n=nm[d.id]||{};rows+=`<tr><td>${i}</td><td>${a.nome}</td><td><input type="number" min="0" max="20" value="${n.av1||''}" class="ni" data-a="${d.id}" data-f="av1" style="width:44px" ${dis}></td><td><input type="number" min="0" max="20" value="${n.av2||''}" class="ni" data-a="${d.id}" data-f="av2" style="width:44px" ${dis}></td><td><input type="number" min="0" max="20" value="${n.av3||''}" class="ni" data-a="${d.id}" data-f="av3" style="width:44px" ${dis}></td><td><input type="number" min="0" max="20" value="${n.av4||''}" class="ni" data-a="${d.id}" data-f="av4" style="width:44px" ${dis}></td><td id="mac_${d.id}" style="font-weight:700">-</td><td><input type="number" min="0" max="20" value="${n.pt||''}" class="ni" data-a="${d.id}" data-f="pt" style="width:44px" ${dis}></td><td id="mt_${d.id}" style="font-weight:700;color:var(--p)">-</td></tr>`});$('pD').innerHTML=`${lk?'<div style="background:#fff3e0;padding:7px 10px;border-radius:var(--r);margin-bottom:8px;color:var(--wn);font-size:.8em;font-weight:600">⚠️ Fechado</div>':''}<div class="tbl"><table><tr><th>#</th><th>Nome</th><th>AV1</th><th>AV2</th><th>AV3</th><th>AV4</th><th>MAC</th><th>PT</th><th>MT</th></tr>${rows||'<tr><td colspan="9">—</td></tr>'}</table></div>${!lk&&rows?'<button class="btn btn-ok mt-2" onclick="sN()">💾 Salvar</button>':''}`;document.querySelectorAll('.ni').forEach(inp=>{inp.addEventListener('input',()=>cN(inp.dataset.a))});als.forEach(d=>cN(d.id))}
function cN(aid){const inps=document.querySelectorAll(`.ni[data-a="${aid}"]`);let a1=0,a2=0,a3=0,a4=0,pt=0;inps.forEach(i=>{const v=parseFloat(i.value)||0;if(i.dataset.f==='av1')a1=v;if(i.dataset.f==='av2')a2=v;if(i.dataset.f==='av3')a3=v;if(i.dataset.f==='av4')a4=v;if(i.dataset.f==='pt')pt=v});const mac=Math.round((a1+a2+a3+a4)/4);document.getElementById('mac_'+aid).textContent=mac||'-';const cl=$('nC')?.value||'',tr=$('nTr')?.value||'';const mt=(cl.includes('9')&&tr==='3º Trimestre')?mac:(pt>0?Math.round((mac+pt)/2):mac);document.getElementById('mt_'+aid).textContent=mt||'-'}
async function sN(){const cl=$('nC').value,tm=$('nT').value,dsc=$('nD').value,tr=$('nTr').value,aId=$('nA').value;const ad=await db.collection('escolas').doc(CSI).collection('anosLetivos').doc(aId).get();const ano=ad.data();if(ano.estado!=='aberto'||ano.trimestreEstado!=='aberto'||ano.trimestre!==tr){notify('Fechado!','er');return}const aNm=ano.nome;const aids=[...new Set([...document.querySelectorAll('.ni')].map(i=>i.dataset.a))];for(const aid of aids){const inps=document.querySelectorAll(`.ni[data-a="${aid}"]`);const d={alunoId:aid,classe:cl,turma:tm,disciplina:dsc,trimestre:tr,anoLetivo:aNm};inps.forEach(i=>{d[i.dataset.f]=parseFloat(i.value)||0});d.mac=Math.round(((d.av1||0)+(d.av2||0)+(d.av3||0)+(d.av4||0))/4);d.mt=(cl.includes('9')&&tr==='3º Trimestre')?d.mac:(d.pt>0?Math.round((d.mac+(d.pt||0))/2):d.mac);const ex=await db.collection('escolas').doc(CSI).collection('notas').where('alunoId','==',aid).where('disciplina','==',dsc).where('trimestre','==',tr).where('anoLetivo','==',aNm).get();if(!ex.empty)await ex.docs[0].ref.update(d);else await db.collection('escolas').doc(CSI).collection('notas').add(d)}notify('Salvas!','ok')}

async function ldPgTm(){const c=$('pgCl').value;const s=await db.collection('escolas').doc(CSI).collection('turmas').where('classe','==',c).get();$('pgTm').innerHTML='<option value="">— Turma —</option>'+s.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}

async function carregarPauta(){
    const anoLet=$('pgAno').value,cl=$('pgCl').value,tm=$('pgTm').value,dsc=$('pgDsc').value,trim=$('pgTrim').value;
    if(!cl){notify('Selecione a classe!','er');return}

    // Build query
    let q=db.collection('escolas').doc(CSI).collection('notas').where('classe','==',cl).where('anoLetivo','==',anoLet);
    if(tm)q=q.where('turma','==',tm);
    if(dsc)q=q.where('disciplina','==',dsc);
    if(trim)q=q.where('trimestre','==',trim);

    const notasSnap=await q.get();
    const alunosSnap=await db.collection('escolas').doc(CSI).collection('alunos').where('classe','==',cl).get();
    const alunoMap={};alunosSnap.forEach(d=>{alunoMap[d.id]=d.data().nome});

    // Build table
    const data={};
    notasSnap.forEach(d=>{
        const n=d.data();const key=`${n.alunoId}_${n.disciplina}_${n.trimestre}`;
        data[key]={aluno:alunoMap[n.alunoId]||'?',disciplina:n.disciplina,trimestre:n.trimestre,turma:n.turma,...n};
    });

    const rows=Object.values(data).sort((a,b)=>(a.aluno||'').localeCompare(b.aluno||''));
    let html='';rows.forEach(r=>{
        html+=`<tr><td>${r.aluno}</td><td>${r.turma||''}</td><td>${r.disciplina}</td><td>${r.trimestre}</td><td>${r.av1||'-'}</td><td>${r.av2||'-'}</td><td>${r.av3||'-'}</td><td>${r.av4||'-'}</td><td><strong>${r.mac||'-'}</strong></td><td>${r.pt||'-'}</td><td style="font-weight:700;color:var(--p)">${r.mt||'-'}</td></tr>`;
    });

    $('pgDiv').innerHTML=`
    <h4 style="margin:10px 0;font-size:.88em">${cl}${tm?' / Turma '+tm:''} — ${anoLet}${dsc?' — '+dsc:''}${trim?' — '+trim:''}</h4>
    <div class="tbl"><table id="pautaGeral"><tr><th>Aluno</th><th>Turma</th><th>Disciplina</th><th>Trimestre</th><th>AV1</th><th>AV2</th><th>AV3</th><th>AV4</th><th>MAC</th><th>PT</th><th>MT</th></tr>
    ${html||'<tr><td colspan="11">Nenhuma nota encontrada</td></tr>'}</table></div>
    <div class="btn-group mt-2">
        <button class="btn btn-ok" onclick="expPautaXL()">📊 XLSX</button>
        <button class="btn btn-s" onclick="expPautaPDF()">📄 PDF</button>
    </div>`;
}

function expPautaXL(){const t=document.querySelector('#pautaGeral');if(!t)return;const wb=XLSX.utils.table_to_book(t);XLSX.writeFile(wb,'Pauta_Geral.xlsx');notify('XLSX!','ok')}
function expPautaPDF(){const{jsPDF}=window.jspdf;const pdf=new jsPDF('l');pdf.setFontSize(12);pdf.text('PAUTA GERAL — '+CS.nome,148,12,{align:'center'});const t=document.querySelector('#pautaGeral');if(t)pdf.autoTable({html:t,startY:20,theme:'grid',headStyles:{fillColor:[26,35,126]},styles:{fontSize:7}});pdf.save('Pauta_Geral.pdf');notify('PDF!','ok')}

async function pgStats(){const als=await db.collection('escolas').doc(CSI).collection('alunos').get();let t=als.size,m=0,f=0,at=0,tr=0,ds=0;const byCl={};als.forEach(d=>{const a=d.data();a.genero==='M'?m++:f++;if(a.estado==='ativo')at++;if(a.estado==='transferido')tr++;if(a.estado==='desistente')ds++;if(!byCl[a.classe])byCl[a.classe]={m:0,f:0};a.genero==='M'?byCl[a.classe].m++:byCl[a.classe].f++});$('eC').innerHTML=`<div class="sg"><div class="sc"><div class="sci bl">👥</div><div class="scn"><h3>${t}</h3><p>Total</p></div></div><div class="sc"><div class="sci gn">✅</div><div class="scn"><h3>${at}</h3><p>Ativos</p></div></div><div class="sc"><div class="sci or">🔄</div><div class="scn"><h3>${tr}</h3><p>Transf.</p></div></div><div class="sc"><div class="sci rd">❌</div><div class="scn"><h3>${ds}</h3><p>Desist.</p></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="card"><div class="card-h"><h3>📊 Classe/Género</h3></div><div class="card-b"><div style="height:240px"><canvas id="chSCl"></canvas></div></div></div><div class="card"><div class="card-h"><h3>📊 Estado</h3></div><div class="card-b"><div style="height:240px"><canvas id="chSEst"></canvas></div></div></div></div><div class="btn-group"><button class="btn btn-ok" onclick="stXL()">📊 XLSX</button><button class="btn btn-s" onclick="stPDF()">📄 PDF</button></div>`;setTimeout(()=>{const cls=Object.keys(byCl).sort();drawChart('chSCl','bar',cls,[{label:'♂',data:cls.map(c=>byCl[c].m),backgroundColor:'#1565c0'},{label:'♀',data:cls.map(c=>byCl[c].f),backgroundColor:'#e65100'}]);drawChart('chSEst','pie',['Ativos','Transf.','Desist.'],[{data:[at,tr,ds],backgroundColor:['#2e7d32','#ff9800','#c62828']}])},100)}
async function stXL(){const s=await db.collection('escolas').doc(CSI).collection('alunos').get();const st={};s.forEach(d=>{const a=d.data();if(!st[a.classe])st[a.classe]={t:0,m:0,f:0};st[a.classe].t++;a.genero==='M'?st[a.classe].m++:st[a.classe].f++});const d=[['Classe','Total','♂','♀']];for(const[c,v]of Object.entries(st))d.push([c,v.t,v.m,v.f]);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),'Stats');XLSX.writeFile(wb,'Estatisticas.xlsx');notify('XLSX!','ok')}

async function pgDoc(tipo){const[cs,anos]=await Promise.all([db.collection('escolas').doc(CSI).collection('classes').get(),db.collection('escolas').doc(CSI).collection('anosLetivos').get()]);const T={decl:'📜 Declarações',bolet:'📋 Boletins',cert:'🎓 Certificados'};$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>${T[tipo]}</h3></div><div class="card-b"><div class="fp"><select id="dAno">${anos.docs.map(d=>`<option value="${d.data().nome}">${d.data().nome}</option>`).join('')}</select><select id="dCl" onchange="ldDTm()"><option value="">Classe</option>${cs.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}</select><select id="dTm"><option value="">Turma</option></select><button class="btn btn-p" onclick="ldDA('${tipo}')">📋</button></div><div id="dDiv"></div></div></div>`}

async function ldDA(tipo){const cl=$('dCl').value;if(!cl)return;let q=db.collection('escolas').doc(CSI).collection('alunos').where('classe','==',cl);const tm=$('dTm').value;if(tm)q=q.where('turma','==',tm);const s=await q.get();let r='';s.forEach(d=>{const a=d.data();r+=`<tr><td><input type="checkbox" class="dk" value="${d.id}"></td><td>${a.nome}</td><td>${a.classe}</td><td><button class="btn btn-sm btn-p" onclick="genDoc('${tipo}','${d.id}')">📄</button></td></tr>`});$('dDiv').innerHTML=`<table><tr><th><input type="checkbox" onclick="document.querySelectorAll('.dk').forEach(c=>c.checked=this.checked)"></th><th>Nome</th><th>Classe</th><th>Ação</th></tr>${r}</table><button class="btn btn-ok mt-2" onclick="genDocLote('${tipo}')">📄 DOCX Lote</button>`}
async function genDoc(tipo,aid){const ad=await db.collection('escolas').doc(CSI).collection('alunos').doc(aid).get();const a=ad.data();const e=CS;const dirS=await db.collection('escolas').doc(CSI).collection('usuarios').where('perfil','==','director').get();const dir=dirS.empty?{nome:'Diretor'}:dirS.docs[0].data();const al=$('dAno').value;const qr=await QRCode.toDataURL(`SIGE|${e.nome}|${a.nome}|${a.bi||''}|${tipo}`,{width:100,margin:1}).catch(()=>null);try{const{Document,Packer,Paragraph,TextRun,AlignmentType,Table,TableRow,TableCell,WidthType,ImageRun}=docx;const ch=[];ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:60},children:[new TextRun({text:'REPÚBLICA DE ANGOLA',bold:true,size:22})]}));ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:60},children:[new TextRun({text:'MINISTÉRIO DA EDUCAÇÃO',bold:true,size:22})]}));ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:160},children:[new TextRun({text:e.nome.toUpperCase(),bold:true,size:24})]}));let tt=tipo==='decl'?'DECLARAÇÃO':tipo==='bolet'?'BOLETIM DE NOTAS':'CERTIFICADO';ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:300},children:[new TextRun({text:tt,bold:true,size:30,color:'990000'})]}));ch.push(new Paragraph({spacing:{after:250},children:[new TextRun({text:`${dir.nome}, Director, certifica que ${a.nome}, filho(a) de ${a.nomePai||'___'} e de ${a.nomeMae||'___'}, portador(a) do B.I. nº ${a.bi||'___'}, é aluno(a) da ${a.classe||'___'}, turma ${a.turma||'___'}, no ano lectivo ${al}.`,size:22})]}));
if(tipo!=='decl'){const ns=await db.collection('escolas').doc(CSI).collection('notas').where('alunoId','==',aid).get();if(!ns.empty){const bd={};ns.forEach(d=>{const n=d.data();if(!bd[n.disciplina])bd[n.disciplina]={};bd[n.disciplina][n.trimestre]=n});const hdr=new TableRow({children:['Disciplina','1ºT','2ºT','3ºT','MF','Extenso'].map(h=>new TableCell({children:[new Paragraph({children:[new TextRun({text:h,bold:true,size:18})]})]}))});const drs=Object.entries(bd).map(([d,ts2])=>{const t1=ts2['1º Trimestre']?.mt||'-',t2=ts2['2º Trimestre']?.mt||'-',t3=ts2['3º Trimestre']?.mt||'-';const nums=[t1,t2,t3].filter(x=>typeof x==='number');const mf=nums.length?Math.round(nums.reduce((a2,b)=>a2+b,0)/nums.length):'-';const ext=typeof mf==='number'?(['zero','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','catorze','quinze','dezasseis','dezassete','dezoito','dezanove','vinte'][mf]||mf)+' valores':'-';return new TableRow({children:[d,String(t1),String(t2),String(t3),String(mf),ext].map(v=>new TableCell({children:[new Paragraph({children:[new TextRun({text:v,size:18})]})]}))})});ch.push(new Table({rows:[hdr,...drs],width:{size:100,type:WidthType.PERCENTAGE}}))}}
const h=new Date();const ms=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];ch.push(new Paragraph({spacing:{before:250},children:[new TextRun({text:`${e.municipio||''}, ${h.getDate()} de ${ms[h.getMonth()]} de ${h.getFullYear()}`,size:22})]}));ch.push(new Paragraph({spacing:{before:350},alignment:AlignmentType.RIGHT,children:[new TextRun({text:'O Director\n\n_______________________\n'+dir.nome,size:22})]}));
if(qr){const qrD=qr.split(',')[1];const qrB=Uint8Array.from(atob(qrD),c2=>c2.charCodeAt(0));ch.push(new Paragraph({spacing:{before:150},alignment:AlignmentType.RIGHT,children:[new ImageRun({data:qrB,transformation:{width:70,height:70}})]}))}
const doc2=new Document({sections:[{children:ch}]});const blob=await Packer.toBlob(doc2);const url=URL.createObjectURL(blob);const lnk=document.createElement('a');lnk.href=url;lnk.download=`${tt}_${a.nome.replace(/\s/g,'_')}.docx`;lnk.click();URL.revokeObjectURL(url);notify('Gerado!','ok')}catch(err){notify('Erro: '+err.message,'er');console.error(err)}}
async function genDocLote(tipo){const cks=document.querySelectorAll('.dk:checked');if(!cks.length){notify('Selecione!','er');return}for(const c of cks)await genDoc(tipo,c.value)}

// ===== FINANCEIRO (Config, Pagamentos com filtro, Receitas/Despesas) =====
async function pgCfgFin(){if(!['director','subdirAdm'].includes(CU.perfil))return;const cfg=await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').get();const data=cfg.exists?cfg.data():{ativo:false,emolumentos:[]};let emR='';(data.emolumentos||[]).forEach((em,i)=>{emR+=`<tr><td>${em.nome}</td><td>${(em.valor||0).toLocaleString()} Kz</td><td>${em.periodicidade||''}</td><td><button class="btn btn-sm btn-dg" onclick="remEmol(${i})">🗑️</button></td></tr>`});$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>⚙️ Config. Financeira</h3></div><div class="card-b"><div class="btn-group mb-2"><button class="btn ${data.ativo?'btn-ok':'btn-out'}" onclick="togFin(true)">✅ Ativado</button><button class="btn ${!data.ativo?'btn-dg':'btn-out'}" onclick="togFin(false)">❌ Desativado</button></div><div class="divider"></div><h4>Emolumentos</h4><table><tr><th>Descrição</th><th>Valor</th><th>Period.</th><th>Ação</th></tr>${emR||'<tr><td colspan="4">—</td></tr>'}</table><div class="fr mt-2"><div class="fg"><label>Descrição</label><input id="emN"></div><div class="fg"><label>Valor (Kz)</label><input type="number" id="emV"></div></div><div class="fg"><label>Periodicidade</label><select id="emP"><option>Mensal</option><option>Trimestral</option><option>Anual</option><option>Matrícula</option></select></div><button class="btn btn-p mt-1" onclick="addEmol()">➕</button></div></div>`}
async function togFin(v){await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').set({ativo:v},{merge:true});notify('OK','ok');pgCfgFin()}
async function addEmol(){const nm=$('emN').value.trim(),vl=parseFloat($('emV').value)||0;if(!nm||!vl)return;const cfg=await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').get();const em=cfg.exists?(cfg.data().emolumentos||[]):[];em.push({nome:nm,valor:vl,periodicidade:$('emP').value});await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').set({emolumentos:em},{merge:true});notify('OK','ok');pgCfgFin()}
async function remEmol(i){const cfg=await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').get();const em=cfg.data().emolumentos||[];em.splice(i,1);await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').set({emolumentos:em},{merge:true});notify('OK','ok');pgCfgFin()}

async function pgFinanceiro(){if(!['director','subdirAdm'].includes(CU.perfil))return;const cfg=await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').get();if(!cfg.exists||!cfg.data().ativo){$('eC').innerHTML=`<div class="card"><div class="card-b text-center" style="padding:30px">💰 Desativado <button class="btn btn-p mt-2" onclick="eNav('cfgFin')">⚙️</button></div></div>`;return}const cs=await db.collection('escolas').doc(CSI).collection('classes').get();$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>💰 Pagamentos</h3></div><div class="card-b"><div class="fp"><select id="fPCl" onchange="ldFPTm()"><option value="">Todas Classes</option>${cs.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}</select><select id="fPTm"><option value="">Todas Turmas</option></select><input type="text" id="fPNm" placeholder="🔍 Nome..." style="flex:1;max-width:200px"><button class="btn btn-p" onclick="ldFPAlunos()">🔍</button></div><div id="fPDiv"><p class="text-center" style="color:var(--txl);padding:15px">Filtre e clique 🔍</p></div></div></div>`}
async function ldFPTm(){const c=$('fPCl').value;if(!c){$('fPTm').innerHTML='<option value="">Todas</option>';return}const s=await db.collection('escolas').doc(CSI).collection('turmas').where('classe','==',c).get();$('fPTm').innerHTML='<option value="">Todas</option>'+s.docs.map(d=>`<option>${d.data().nome}</option>`).join('')}
async function ldFPAlunos(){const cl=$('fPCl').value,tm=$('fPTm').value,nm=($('fPNm').value||'').toLowerCase();const cfg=await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').get();let totalEsp=0;(cfg.data().emolumentos||[]).forEach(em=>{totalEsp+=(em.valor||0)});let q=db.collection('escolas').doc(CSI).collection('alunos').where('estado','==','ativo');if(cl)q=q.where('classe','==',cl);if(tm)q=q.where('turma','==',tm);const als=await q.get();const pags=await db.collection('escolas').doc(CSI).collection('pagamentos').get();const pm={};pags.forEach(d=>{const p=d.data();if(!pm[p.alunoId])pm[p.alunoId]=0;pm[p.alunoId]+=(p.valor||0)});let rows='',idx=0;als.forEach(d=>{const a=d.data();if(nm&&!a.nome.toLowerCase().includes(nm))return;idx++;const pago=pm[d.id]||0;const div=totalEsp-pago;rows+=`<tr><td>${idx}</td><td>${a.nome}</td><td>${a.classe||''}</td><td>${a.turma||''}</td><td>${pago.toLocaleString()} Kz</td><td style="color:${div>0?'var(--s)':'var(--ok)'};font-weight:700">${div>0?div.toLocaleString()+' Kz':'✅'}</td><td><button class="btn btn-sm btn-ok" onclick="regPag('${d.id}','${a.nome.replace(/'/g,"\\'")}')">💰</button> <button class="btn btn-sm btn-inf" onclick="verPag('${d.id}','${a.nome.replace(/'/g,"\\'")}')">👁️</button></td></tr>`});$('fPDiv').innerHTML=`<table><tr><th>#</th><th>Nome</th><th>Classe</th><th>Turma</th><th>Pago</th><th>Dívida</th><th>Ações</th></tr>${rows||'<tr><td colspan="7">Nenhum</td></tr>'}</table>`}
function regPag(aid,nm){$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>💰 ${nm}</h3><button class="mx" onclick="cM()">&times;</button></div><div class="mb"><div class="fr"><div class="fg"><label>Tipo</label><select id="pTp"><option>Propina</option><option>Matrícula</option><option>Confirmação</option><option>Outro</option></select></div><div class="fg"><label>Mês</label><select id="pMs"><option>Janeiro</option><option>Fevereiro</option><option>Março</option><option>Abril</option><option>Maio</option><option>Junho</option><option>Julho</option><option>Agosto</option><option>Setembro</option><option>Outubro</option><option>Novembro</option><option>Dezembro</option></select></div></div><div class="fr"><div class="fg"><label>Valor (Kz)</label><input type="number" id="pVl"></div><div class="fg"><label>Data</label><input type="date" id="pDt" value="${new Date().toISOString().split('T')[0]}"></div></div></div><div class="mf"><button class="btn btn-out" onclick="cM()">Cancelar</button><button class="btn btn-p" onclick="svPag('${aid}')">💾</button></div>`;oM()}
async function svPag(aid){await db.collection('escolas').doc(CSI).collection('pagamentos').add({alunoId:aid,tipo:$('pTp').value,mes:$('pMs').value,valor:parseFloat($('pVl').value)||0,data:$('pDt').value,criadoEm:ts()});notify('OK','ok');cM();ldFPAlunos()}
async function verPag(aid,nm){const ps=await db.collection('escolas').doc(CSI).collection('pagamentos').where('alunoId','==',aid).get();let r='',t=0;ps.forEach(d=>{const p=d.data();t+=(p.valor||0);r+=`<tr><td>${p.tipo}</td><td>${p.mes}</td><td>${(p.valor||0).toLocaleString()} Kz</td><td>${p.data}</td></tr>`});$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>💰 ${nm} — ${t.toLocaleString()} Kz</h3><button class="mx" onclick="cM()">&times;</button></div><div class="mb"><table><tr><th>Tipo</th><th>Mês</th><th>Valor</th><th>Data</th></tr>${r||'<tr><td colspan="4">—</td></tr>'}</table></div>`;oM()}

// ===== RECEITAS E DESPESAS COM GRÁFICO =====
async function pgRecDesp(){if(!['director','subdirAdm'].includes(CU.perfil))return;const[pagsS,finS]=await Promise.all([db.collection('escolas').doc(CSI).collection('pagamentos').get(),db.collection('escolas').doc(CSI).collection('financeiro').get()]);let totalRec=0;pagsS.forEach(d=>{totalRec+=(d.data().valor||0)});let totalDesp=0,outrasRec=0;const despesas=[];finS.forEach(d=>{const f=d.data();if(f.tipo==='despesa'){totalDesp+=(f.valor||0);despesas.push({id:d.id,...f})}if(f.tipo==='receita'){outrasRec+=(f.valor||0)}});const totalRecGeral=totalRec+outrasRec;const saldo=totalRecGeral-totalDesp;const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];const rM=Array(12).fill(0),dM=Array(12).fill(0);pagsS.forEach(d=>{const p=d.data();if(p.data){const m=new Date(p.data).getMonth();rM[m]+=(p.valor||0)}});finS.forEach(d=>{const f=d.data();if(f.data){const m=new Date(f.data).getMonth();if(f.tipo==='despesa')dM[m]+=(f.valor||0);if(f.tipo==='receita')rM[m]+=(f.valor||0)}});let dR='';despesas.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).forEach(d=>{dR+=`<tr><td>${d.data||''}</td><td>${d.descricao||''}</td><td>${d.categoria||''}</td><td>${(d.valor||0).toLocaleString()} Kz</td><td><button class="btn btn-sm btn-dg" onclick="delC('financeiro','${d.id}',pgRecDesp)">🗑️</button></td></tr>`});$('eC').innerHTML=`<div class="fin-grid"><div class="fin-card green"><h2>${totalRecGeral.toLocaleString()} Kz</h2><p>💰 Receitas</p></div><div class="fin-card red"><h2>${totalDesp.toLocaleString()} Kz</h2><p>📉 Despesas</p></div><div class="fin-card blue"><h2>${saldo.toLocaleString()} Kz</h2><p>${saldo>=0?'✅':'⚠️'} Saldo Caixa</p></div></div><div class="card"><div class="card-h"><h3>📊 Receitas vs Despesas</h3></div><div class="card-b"><div style="height:240px"><canvas id="chRD"></canvas></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="card"><div class="card-h"><h3>📉 Despesas</h3><button class="btn btn-sm btn-s" onclick="addDesp()">➕</button></div><div class="card-b"><div class="tbl"><table><tr><th>Data</th><th>Desc.</th><th>Cat.</th><th>Valor</th><th>Ação</th></tr>${dR||'<tr><td colspan="5">—</td></tr>'}</table></div></div></div><div class="card"><div class="card-h"><h3>💰 Outras Receitas</h3><button class="btn btn-sm btn-ok" onclick="addRec()">➕</button></div><div class="card-b"><p>Propinas: <strong>${totalRec.toLocaleString()} Kz</strong></p><p>Outras: <strong>${outrasRec.toLocaleString()} Kz</strong></p><div class="divider"></div><p style="font-weight:700">Total: ${totalRecGeral.toLocaleString()} Kz</p></div></div></div>`;setTimeout(()=>{drawChart('chRD','bar',meses,[{label:'Receitas',data:rM,backgroundColor:'#2e7d32'},{label:'Despesas',data:dM,backgroundColor:'#c62828'}])},100)}
function addDesp(){$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>➕ Despesa</h3><button class="mx" onclick="cM()">&times;</button></div><div class="mb"><div class="fg"><label>Descrição <span class="req">*</span></label><input id="dDs"></div><div class="fr"><div class="fg"><label>Valor (Kz)</label><input type="number" id="dVl"></div><div class="fg"><label>Data</label><input type="date" id="dDt" value="${new Date().toISOString().split('T')[0]}"></div></div><div class="fg"><label>Categoria</label><select id="dCt"><option>Material</option><option>Manutenção</option><option>Salários</option><option>Água/Luz</option><option>Equipamentos</option><option>Outro</option></select></div></div><div class="mf"><button class="btn btn-out" onclick="cM()">Cancelar</button><button class="btn btn-s" onclick="svDesp()">💾</button></div>`;oM()}
async function svDesp(){await db.collection('escolas').doc(CSI).collection('financeiro').add({tipo:'despesa',descricao:$('dDs').value.trim(),valor:parseFloat($('dVl').value)||0,data:$('dDt').value,categoria:$('dCt').value,criadoEm:ts()});notify('OK','ok');cM();pgRecDesp()}
function addRec(){$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>➕ Receita</h3><button class="mx" onclick="cM()">&times;</button></div><div class="mb"><div class="fg"><label>Descrição</label><input id="rDs"></div><div class="fr"><div class="fg"><label>Valor (Kz)</label><input type="number" id="rVl"></div><div class="fg"><label>Data</label><input type="date" id="rDt" value="${new Date().toISOString().split('T')[0]}"></div></div></div><div class="mf"><button class="btn btn-out" onclick="cM()">Cancelar</button><button class="btn btn-ok" onclick="svRec()">💾</button></div>`;oM()}
async function svRec(){await db.collection('escolas').doc(CSI).collection('financeiro').add({tipo:'receita',descricao:$('rDs').value.trim(),valor:parseFloat($('rVl').value)||0,data:$('rDt').value,criadoEm:ts()});notify('OK','ok');cM();pgRecDesp()}

// ===== PATRIMÔNIO, FALTAS, MSGS (compact) =====
async function pgPatrimonio(){if(!['director','subdirAdm'].includes(CU.perfil))return;const s=await db.collection('escolas').doc(CSI).collection('patrimonio').get();let r='';s.forEach(d=>{const p=d.data();r+=`<tr><td>${p.descricao}</td><td>${p.categoria||''}</td><td>${p.quantidade||1}</td><td><span class="badge ${p.estado==='Bom'?'b-ok':'b-wn'}">${p.estado||'Bom'}</span></td><td>${(p.valor||0).toLocaleString()}</td><td><button class="btn btn-sm btn-dg" onclick="delC('patrimonio','${d.id}',pgPatrimonio)">🗑️</button></td></tr>`});$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>🏗️ Património</h3><button class="btn btn-p" onclick="addPat()">➕</button></div><div class="card-b"><table><tr><th>Descrição</th><th>Cat.</th><th>Qtd</th><th>Estado</th><th>Valor</th><th>Ação</th></tr>${r||'<tr><td colspan="6">—</td></tr>'}</table></div></div>`}
function addPat(){$('mB').className='modal';$('mB').innerHTML=`<div class="mh"><h3>➕ Item</h3><button class="mx" onclick="cM()">&times;</button></div><div class="mb"><div class="fg"><label>Descrição <span class="req">*</span></label><input id="ptDs"></div><div class="fr3"><div class="fg"><label>Categoria</label><select id="ptCt"><option>Mobiliário</option><option>Equipamento</option><option>Informática</option><option>Outro</option></select></div><div class="fg"><label>Qtd</label><input type="number" id="ptQt" value="1"></div><div class="fg"><label>Estado</label><select id="ptEs"><option>Bom</option><option>Regular</option><option>Mau</option></select></div></div><div class="fg"><label>Valor (Kz)</label><input type="number" id="ptVl"></div></div><div class="mf"><button class="btn btn-out" onclick="cM()">Cancelar</button><button class="btn btn-p" onclick="db.collection('escolas').doc(CSI).collection('patrimonio').add({descricao:$('ptDs').value.trim(),categoria:$('ptCt').value,quantidade:parseInt($('ptQt').value)||1,estado:$('ptEs').value,valor:parseFloat($('ptVl').value)||0,criadoEm:ts()}).then(()=>{notify('OK','ok');cM();pgPatrimonio()})">💾</button></div>`;oM()}

async function pgFaltasF(){const[us,fs]=await Promise.all([db.collection('escolas').doc(CSI).collection('usuarios').get(),db.collection('escolas').doc(CSI).collection('faltas').get()]);const fp={};fs.forEach(d=>{fp[d.data().userId]=(fp[d.data().userId]||0)+1});let r='';us.forEach(d=>{const u=d.data();r+=`<tr><td>${u.nome}</td><td><span class="badge b-p">${PN[u.perfil]||u.perfil}</span></td><td><strong>${fp[d.id]||0}</strong></td><td><button class="btn btn-sm btn-dg" onclick="db.collection('escolas').doc(CSI).collection('faltas').add({userId:'${d.id}',data:new Date().toISOString().split('T')[0],justificada:false}).then(()=>{notify('OK','ok');pgFaltasF()})">➕</button></td></tr>`});$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>📊 Faltas</h3></div><div class="card-b"><table><tr><th>Nome</th><th>Perfil</th><th>Faltas</th><th>Ação</th></tr>${r}</table></div></div>`}

async function pgMsgs(){const us=await db.collection('escolas').doc(CSI).collection('usuarios').get();let uO='<option value="todos">📢 Todos</option>';const allowed=CU.perfil==='professor'?['director','subdirPed','subdirAdm','secretaria','professor']:null;us.forEach(d=>{if(d.id===CU.id)return;if(allowed&&!allowed.includes(d.data().perfil))return;uO+=`<option value="${d.id}">${d.data().nome}</option>`});const ms=await db.collection('escolas').doc(CSI).collection('mensagens').orderBy('criadoEm','desc').limit(20).get();let mh='';ms.forEach(d=>{const m=d.data();const isMe=m.deId===CU.id,isFor=m.paraId===CU.id;if(!isMe&&!isFor)return;mh+=`<div style="padding:7px;border-bottom:1px solid #f0f0f0;${!m.lida&&isFor?'background:#e3f2fd;':''}font-size:.8em"><strong>${isMe?'→ '+m.paraNome:m.deNome}</strong> — ${m.assunto||''}<br><span style="color:var(--txl)">${(m.mensagem||'').substring(0,80)}</span></div>`});$('eC').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="card"><div class="card-h"><h3>✉️</h3></div><div class="card-b"><div class="fg"><select id="msgP">${uO}</select></div><div class="fg"><input id="msgA" placeholder="Assunto"></div><div class="fg"><textarea id="msgT" rows="3" placeholder="Mensagem..."></textarea></div><button class="btn btn-p" onclick="sMsg()">📨</button></div></div><div class="card"><div class="card-h"><h3>📬</h3></div><div class="card-b" style="max-height:380px;overflow-y:auto">${mh||'<p class="text-center" style="color:var(--txl);padding:20px">—</p>'}</div></div></div>`}
async function sMsg(){const para=$('msgP').value,msg=$('msgT').value.trim();if(!msg)return;const base={deId:CU.id,deNome:CU.nome,assunto:$('msgA').value.trim(),mensagem:msg,lida:false,criadoEm:ts()};if(para==='todos'){const s=await db.collection('escolas').doc(CSI).collection('usuarios').get();for(const d of s.docs)if(d.id!==CU.id)await db.collection('escolas').doc(CSI).collection('mensagens').add({...base,paraId:d.id,paraNome:d.data().nome})}else{const ud=await db.collection('escolas').doc(CSI).collection('usuarios').doc(para).get();await db.collection('escolas').doc(CSI).collection('mensagens').add({...base,paraId:para,paraNome:ud.data().nome})}notify('Enviada!','ok');$('msgA').value=$('msgT').value='';pgMsgs()}

init();
</script>
