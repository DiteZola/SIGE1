<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGE - Sistema Integrado de Gestão Escolar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#1a237e;--pl:#3949ab;--pd:#0d1642;--s:#c62828;--ok:#2e7d32;--wn:#ef6c00;--inf:#0277bd;--bg:#f0f2f5;--tx:#212121;--txl:#757575;--brd:#e0e0e0;--sh:0 2px 8px rgba(0,0,0,.06);--r:8px;--sw:250px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}
.hidden{display:none!important}
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1642,#1a237e 50%,#3949ab);padding:16px}
.auth-card{background:#fff;border-radius:14px;padding:30px;width:100%;max-width:480px;box-shadow:0 16px 48px rgba(0,0,0,.3)}
.auth-card.wide{max-width:860px}
.alogo{text-align:center;margin-bottom:18px}
.alogo .licon{width:60px;height:60px;background:linear-gradient(135deg,var(--p),var(--pl));border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:1.6em;color:#fff}
.alogo h1{color:var(--p);font-size:1.3em}.alogo p{color:var(--txl);font-size:.8em}
.fg{margin-bottom:9px}.fg label{display:block;margin-bottom:2px;font-weight:600;font-size:.76em}.fg .req{color:var(--s)}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 9px;border:2px solid var(--brd);border-radius:var(--r);font-size:.84em;outline:none;background:#fafbfc;font-family:inherit}
.fg input:focus,.fg select:focus{border-color:var(--p)}.fg textarea{resize:vertical;min-height:45px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:7px}.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.st{font-size:.82em;font-weight:700;color:var(--p);margin:10px 0 5px;padding-bottom:3px;border-bottom:2px solid #e8eaf6}
.btn{padding:6px 13px;border:none;border-radius:var(--r);cursor:pointer;font-size:.8em;font-weight:600;display:inline-flex;align-items:center;gap:4px;justify-content:center;font-family:inherit;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-p{background:var(--p);color:#fff}.btn-s{background:var(--s);color:#fff}.btn-ok{background:var(--ok);color:#fff}.btn-wn{background:var(--wn);color:#fff}.btn-inf{background:var(--inf);color:#fff}
.btn-out{background:transparent;border:2px solid var(--p);color:var(--p)}.btn-out:hover{background:var(--p);color:#fff}
.btn-block{width:100%;display:flex}.btn-sm{padding:3px 8px;font-size:.72em}.btn-lg{padding:9px 18px;font-size:.88em}
.btn-group{display:flex;gap:4px;flex-wrap:wrap}
.dash{display:flex;min-height:100vh}
.side{width:var(--sw);background:linear-gradient(180deg,var(--pd),var(--p) 50%,#283593);color:#fff;position:fixed;height:100vh;overflow-y:auto;z-index:200;transition:transform .3s;left:0;top:0}
.side::-webkit-scrollbar{width:3px}.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2)}
.shdr{padding:10px;text-align:center;border-bottom:1px solid rgba(255,255,255,.1)}
.shdr .slogo{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.3);margin:0 auto 5px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;overflow:hidden}
.shdr .slogo img{width:100%;height:100%;object-fit:cover}
.shdr h3{font-size:.75em}.shdr p{font-size:.64em;opacity:.6}
.smenu{padding:3px 0}.scat{padding:5px 12px 1px;font-size:.56em;text-transform:uppercase;letter-spacing:1.5px;opacity:.4;font-weight:700}
.si{display:flex;align-items:center;padding:6px 12px;cursor:pointer;transition:all .12s;gap:7px;font-size:.74em;border-left:3px solid transparent;color:rgba(255,255,255,.78)}
.si:hover{background:rgba(255,255,255,.06)}.si.act{background:rgba(255,255,255,.1);border-left-color:#ff8f00;font-weight:600;color:#fff}
.si .ic{width:14px;text-align:center;flex-shrink:0}
.si.logout{margin-top:5px;color:#ef5350;border-top:1px solid rgba(255,255,255,.06);padding-top:8px}
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:199}.sov.show{display:block}
.main{margin-left:var(--sw);flex:1;min-height:100vh}
.top{background:#fff;padding:0 14px;height:44px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 2px rgba(0,0,0,.05);position:sticky;top:0;z-index:50}
.top h2{font-size:.9em;color:var(--p)}
.uinfo{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:.75em}
.uav{width:28px;height:28px;border-radius:50%;border:2px solid var(--p);background:#e8eaf6;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.uav img{width:100%;height:100%;object-fit:cover}
.content{padding:14px}
.mtog{display:none;background:none;border:none;font-size:1em;color:var(--p);cursor:pointer;margin-right:7px}
@media(max-width:900px){.side{transform:translateX(-100%)}.side.open{transform:translateX(0)}.main{margin-left:0!important}.mtog{display:block}.fr,.fr3{grid-template-columns:1fr}}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:9px;margin-bottom:14px}
.sc{background:#fff;border-radius:var(--r);padding:10px;box-shadow:var(--sh);display:flex;align-items:center;gap:9px}
.sci{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1em;color:#fff;flex-shrink:0}
.sci.bl{background:#1565c0}.sci.gn{background:#2e7d32}.sci.or{background:#e65100}.sci.rd{background:#c62828}.sci.pp{background:#6a1b9a}.sci.tl{background:#00695c}.sci.yl{background:#f9a825}
.scn h3{font-size:1.2em;line-height:1}.scn p{font-size:.68em;color:var(--txl)}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden}
.card-h{padding:8px 10px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;background:#fafbfc}
.card-h h3{font-size:.82em;color:var(--p)}.card-b{padding:10px}
.tbl{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:5px 7px;text-align:left;border-bottom:1px solid #eee;font-size:.75em}
th{background:var(--p);color:#fff;font-weight:600;white-space:nowrap}
tr:hover td{background:#f5f7ff}
.badge{padding:2px 6px;border-radius:10px;font-size:.65em;font-weight:600;display:inline-block}
.b-ok{background:#e8f5e9;color:var(--ok)}.b-wn{background:#fff3e0;color:var(--wn)}.b-dg{background:#ffebee;color:var(--s)}.b-p{background:#e8eaf6;color:var(--p)}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:10px}
.modal{background:#fff;border-radius:10px;width:100%;max-width:620px;max-height:93vh;overflow-y:auto}
.modal.lg{max-width:820px}.modal.xl{max-width:980px}
.mh{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--p);color:#fff;border-radius:10px 10px 0 0;position:sticky;top:0;z-index:1}
.mh h3{font-size:.82em}.mx{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:.95em;cursor:pointer;padding:2px 5px;border-radius:4px}
.mb{padding:14px}.mf{padding:8px 14px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:5px;background:#fafbfc;border-radius:0 0 10px 10px}
.phup{text-align:center;margin-bottom:8px}
.phpv{width:80px;height:80px;border-radius:50%;border:3px dashed var(--brd);display:flex;align-items:center;justify-content:center;margin:0 auto 3px;overflow:hidden;cursor:pointer;background:#fafbfc;position:relative}
.phpv:hover{border-color:var(--p)}.phpv img{width:100%;height:100%;object-fit:cover}
.phpv .pht{color:var(--txl);font-size:.65em;padding:5px}
.phpv .phb{position:absolute;bottom:1px;right:1px;background:var(--p);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65em}
.fp{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:8px;padding:7px;background:#f5f7ff;border-radius:var(--r)}
.fp select,.fp input{padding:4px 7px;border:1px solid var(--brd);border-radius:var(--r);font-size:.75em;background:#fff;font-family:inherit}
.toast{position:fixed;top:10px;right:10px;padding:8px 12px;border-radius:var(--r);color:#fff;z-index:2000;animation:ti .3s;max-width:300px;font-size:.77em}
.toast.ok{background:#2e7d32}.toast.er{background:#c62828}.toast.wn{background:#e65100}.toast.in{background:#0277bd}
@keyframes ti{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.divider{height:1px;background:var(--brd);margin:8px 0}
.avsm{width:22px;height:22px;border-radius:50%;object-fit:cover}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}
.fin-card{border-radius:var(--r);padding:14px;margin-bottom:10px;color:#fff}
.fin-card.green{background:linear-gradient(135deg,#1b5e20,#388e3c)}
.fin-card.red{background:linear-gradient(135deg,#b71c1c,#e53935)}
.fin-card.blue{background:linear-gradient(135deg,#0d47a1,#1976d2)}
.fin-card h2{font-size:1.3em}.fin-card p{opacity:.8;font-size:.74em}
.fin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.pauta-tbl th,.pauta-tbl td{text-align:center!important;font-size:.68em;padding:3px 4px}
.pauta-tbl td.nome{text-align:left!important;font-weight:600}
.pauta-tbl .nota-ok{background:#e8f5e9;color:#1b5e20;font-weight:700}
.pauta-tbl .nota-dg{background:#ffebee;color:#b71c1c;font-weight:700}
.log-item{padding:4px 7px;border-bottom:1px solid #f0f0f0;font-size:.72em}
.log-item .log-time{color:var(--txl);font-size:.68em;margin-right:5px}
.acwrap{position:relative}.aclist{position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid var(--p);border-top:none;max-height:150px;overflow-y:auto;z-index:10}
.acitem{padding:6px 8px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:.75em}.acitem:hover{background:#e8eaf6}
@media(max-width:700px){.fin-grid{grid-template-columns:1fr}}
@media(max-width:500px){.sg{grid-template-columns:1fr 1fr}}
@media print{.side,.top,.sov{display:none!important}.main{margin-left:0!important}}
</style>
</head>
<body>
<div id="pgSetup" class="auth-bg"><div class="auth-card wide"><div class="alogo"><div class="licon">🏫</div><h1>SIGE</h1><p>Sistema Integrado de Gestão Escolar</p></div><div class="st">🔐 Configuração Inicial</div><div class="fr"><div class="fg"><label>Nome <span class="req">*</span></label><input id="sNm"></div><div class="fg"><label>Email <span class="req">*</span></label><input id="sEm"></div></div><div class="fr"><div class="fg"><label>Utilizador <span class="req">*</span></label><input id="sUs"></div><div class="fg"><label>Senha <span class="req">*</span></label><input type="password" id="sPw"></div></div><div class="fg"><label>Confirmar <span class="req">*</span></label><input type="password" id="sPw2"></div><button class="btn btn-p btn-block btn-lg mt-2" onclick="criarAdmin()">🔐 Criar</button></div></div>

<div id="pgLogin" class="auth-bg hidden"><div class="auth-card"><div class="alogo"><div class="licon">🏫</div><h1>SIGE</h1><p>Sistema Integrado de Gestão Escolar</p></div><div id="loginDiv"><div class="fg"><input id="lUs" placeholder="Utilizador ou email"></div><div class="fg"><input type="password" id="lPw" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()"></div><button class="btn btn-p btn-block btn-lg" onclick="doLogin()">🔑 Entrar</button><p id="loginErr" class="hidden" style="color:var(--s);text-align:center;margin-top:5px;font-size:.78em"></p></div></div></div>

<div id="pgAdmin" class="dash hidden">
<div class="sov" id="ovA" onclick="cS('a')"></div>
<div class="side" id="sideA"><div class="shdr"><div class="slogo">⚙️</div><h3 id="anm">Admin</h3><p>Sistema</p></div><div class="smenu"><div class="scat">Principal</div><div class="si act" onclick="aN('dash',this)"><span class="ic">📊</span>Painel</div><div class="si" onclick="aN('esc',this)"><span class="ic">🏫</span>Escolas</div><div class="si" onclick="aN('bkp',this)"><span class="ic">💾</span>Backup</div><div class="si logout" onclick="logout()"><span class="ic">🚪</span>Sair</div></div></div>
<div class="main"><div class="top"><button class="mtog" onclick="oS('a')">☰</button><h2 id="aT">Painel</h2><div class="uinfo" onclick="logout()"><div class="uav">👤</div><span id="anmT">Admin</span> 🚪</div></div><div class="content" id="aC"></div></div></div>

<div id="pgEsc" class="dash hidden">
<div class="sov" id="ovE" onclick="cS('e')"></div>
<div class="side" id="sideE"><div class="shdr"><div class="slogo" id="eLogo">🏫</div><h3 id="eNS">Escola</h3><p id="ePS">Perfil</p></div><div class="smenu" id="eMenu"></div></div>
<div class="main"><div class="top"><button class="mtog" onclick="oS('e')">☰</button><h2 id="eT">Painel</h2><div class="uinfo"><div class="uav" id="eAv">👤</div><span id="eUN">User</span><span style="cursor:pointer;margin-left:3px" onclick="logout()">🚪</span></div></div><div class="content" id="eC"></div></div></div>

<div id="mOv" class="mov hidden" onclick="if(event.target===this)cM()"><div class="modal" id="mB"></div></div>
<div id="tC"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDrxTEwO8vLDyYSZGk2UbQb11oWEA3hlIE",authDomain:"sige1-2ee70.firebaseapp.com",projectId:"sige1-2ee70",storageBucket:"sige1-2ee70.firebasestorage.app",messagingSenderId:"976468440304",appId:"1:976468440304:web:f5d0344344c93f0e24be35"});
const db=firebase.firestore();let CU=null,CS=null,CSI=null;
const $=id=>document.getElementById(id),show=id=>$(id)?.classList.remove('hidden'),hide=id=>$(id)?.classList.add('hidden'),ts=()=>firebase.firestore.FieldValue.serverTimestamp(),isMob=()=>window.innerWidth<=900;
const PN={director:'Diretor Geral',subdirPed:'Subdiretor Pedagógico',subdirAdm:'Subdiretor Administrativo',secretaria:'Secretário(a)',professor:'Professor(a)'};
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function notify(m,t='in'){const d=document.createElement('div');d.className='toast '+t;d.textContent=m;$('tC').appendChild(d);setTimeout(()=>d.remove(),3500)}
function calcIdade(n){if(!n)return'';const h=new Date(),x=new Date(n);let a=h.getFullYear()-x.getFullYear();if(h.getMonth()<x.getMonth()||(h.getMonth()===x.getMonth()&&h.getDate()<x.getDate()))a--;return a>=0?a:''}
function genMat(){return'MAT-'+new Date().getFullYear()+'-'+Math.floor(10000+Math.random()*90000)}
function numExt(n){const u=['zero','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','catorze','quinze','dezasseis','dezassete','dezoito','dezanove','vinte'];return n>=0&&n<=20?(u[n]+' valores'):(n+' valores')}
function provO(){return['','Bengo','Benguela','Bié','Cabinda','Cuando Cubango','Cuanza Norte','Cuanza Sul','Cunene','Huambo','Huíla','Luanda','Lunda Norte','Lunda Sul','Malanje','Moxico','Namibe','Uíge','Zaire'].map(p=>`<option value="${p}">${p||'Selecione'}</option>`).join('')}
function cM(){hide('mOv')}function oM(){show('mOv')}
function oS(c){$(c==='a'?'sideA':'sideE').classList.add('open');$(c==='a'?'ovA':'ovE').classList.add('show')}
function cS(c){$(c==='a'?'sideA':'sideE').classList.remove('open');$(c==='a'?'ovA':'ovE').classList.remove('show')}
function autoC(c){if(isMob())cS(c)}
function isPrimario(c){return c&&(c.includes('1ª')||c.includes('2ª')||c.includes('3ª')||c.includes('4ª')||c.includes('5ª')||c.includes('6ª'))}
function notaMax(c){return isPrimario(c)?10:20}
function classeCertificado(c){return c&&(c.includes('6ª')||c.includes('9ª')||c.includes('12ª'))}
async function imgB64(inp){return new Promise(r=>{if(!inp.files?.[0]){r(null);return}const f=inp.files[0];if(f.size>5.5e6){notify('Max 5,5MB!','er');r(null);return}const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;const mx=800;if(w>mx||h>mx){if(w>h){h*=mx/w;w=mx}else{w*=mx/h;h=mx}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);r(c.toDataURL('image/jpeg',0.8))};img.src=e.target.result};rd.readAsDataURL(f)})}
function prevF(i,img,txt){const f=$(i).files[0];if(!f||f.size>5.5e6)return;const r=new FileReader();r.onload=e=>{$(img).src=e.target.result;$(img).style.display='block';if(txt)$(txt).style.display='none'};r.readAsDataURL(f)}
function drawChart(id,type,labels,datasets){const ctx=$(id);if(!ctx)return;if(ctx._chart)ctx._chart.destroy();ctx._chart=new Chart(ctx,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:8}}}}}})}
async function logAct(a){if(!CSI)return;try{await db.collection('escolas').doc(CSI).collection('logs').add({usuario:CU?.nome||'',perfil:CU?.perfil||'',acao:a,data:new Date().toISOString(),criadoEm:ts()})}catch(e){}}
async function getDir(){const s=await db.collection('escolas').doc(CSI).collection('usuarios').where('perfil','==','director').get();return s.empty?{nome:'Diretor'}:s.docs[0].data()}
async function delC(c,id,cb){if(!confirm('Eliminar?'))return;await db.collection('escolas').doc(CSI).collection(c).doc(id).delete();notify('OK','ok');cb?.()}

async function init(){try{const a=await db.collection('system').doc('admin').get();if(a.exists){hide('pgSetup');show('pgLogin')}else{show('pgSetup');hide('pgLogin')}}catch(e){show('pgSetup')}}
async function criarAdmin(){const n=$('sNm').value.trim(),u=$('sUs').value.trim(),p=$('sPw').value;if(!n||!$('sEm').value.trim()||!u||!p||p.length<6||p!==$('sPw2').value){notify('Verifique!','er');return}await db.collection('system').doc('admin').set({nome:n,email:$('sEm').value.trim(),username:u,password:p,perfil:'admin',criadoEm:ts()});notify('Criado!','ok');hide('pgSetup');show('pgLogin')}

async function doLogin(){const u=$('lUs').value.trim(),p=$('lPw').value;hide('loginErr');if(!u||!p){notify('Preencha!','er');return}
const ad=await db.collection('system').doc('admin').get();
if(ad.exists){const a=ad.data();if((a.username===u||a.email===u)&&a.password===p){CU={...a,id:'admin',perfil:'admin'};hide('pgLogin');show('pgAdmin');$('anm').textContent=$('anmT').textContent=a.nome;aN('dash');return}}
const escs=await db.collection('escolas').get();
for(const ed of escs.docs){const us=await db.collection('escolas').doc(ed.id).collection('usuarios').get();
for(const ud of us.docs){const uu=ud.data();
if((uu.username===u||uu.email===u)&&uu.password===p){if(uu.estado==='inativo'){notify('Conta inativa!','er');return}
CU={...uu,id:ud.id};CSI=ed.id;CS=ed.data();hide('pgLogin');show('pgEsc');initE();logAct('Login');return}}}
$('loginErr').textContent='❌ Credenciais inválidas';show('loginErr')}

function logout(){CU=CS=CSI=null;hide('pgAdmin');hide('pgEsc');show('pgLogin');$('lUs').value=$('lPw').value='';hide('loginErr')}

// ===== ADMIN =====
function aN(s,el){document.querySelectorAll('#pgAdmin .si').forEach(x=>x.classList.remove('act'));el?.classList.add('act');autoC('a');$('aT').textContent={dash:'Painel',esc:'Escolas',bkp:'Backup'}[s]||s;({dash:admDash,esc:admEsc,bkp:admBkp})[s]?.()}
async function admDash(){const es=await db.collection('escolas').get();let tA=0;for(const d of es.docs)tA+=(await db.collection('escolas').doc(d.id).collection('alunos').get()).size;$('aC').innerHTML=`<div class="sg"><div class="sc"><div class="sci bl">🏫</div><div class="scn"><h3>${es.size}</h3><p>Escolas</p></div></div><div class="sc"><div class="sci gn">👨‍🎓</div><div class="scn"><h3>${tA}</h3><p>Alunos</p></div></div></div>`}

async function pgDash(){const[als,uss]=await Promise.all([db.collection('escolas').doc(CSI).collection('alunos').get(),db.collection('escolas').doc(CSI).collection('usuarios').get()]);let m=0,f=0,at=0;const byCl={};als.forEach(d=>{const a=d.data();a.genero==='M'?m++:f++;if(a.estado==='ativo')at++;if(!byCl[a.classe])byCl[a.classe]=0;byCl[a.classe]++});const anos=await db.collection('escolas').doc(CSI).collection('anosLetivos').where('estado','==','aberto').get();let logsH='';if(CU.perfil==='director'){const logs=await db.collection('escolas').doc(CSI).collection('logs').orderBy('criadoEm','desc').limit(5).get();logs.forEach(d=>{const l=d.data();logsH+=`<div class="log-item"><span style="color:var(--txl);font-size:.68em;margin-right:4px">${l.data?new Date(l.data).toLocaleString('pt-AO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}</span><strong>${l.usuario}</strong> — ${l.acao}</div>`})}$('eC').innerHTML=`<div class="sg"><div class="sc"><div class="sci bl">👨‍🎓</div><div class="scn"><h3>${als.size}</h3><p>Alunos (${m}♂/${f}♀)</p></div></div><div class="sc"><div class="sci gn">👨‍🏫</div><div class="scn"><h3>${uss.docs.filter(d=>d.data().perfil==='professor').length}</h3><p>Professores</p></div></div><div class="sc"><div class="sci or">✅</div><div class="scn"><h3>${at}</h3><p>Ativos</p></div></div><div class="sc"><div class="sci pp">📅</div><div class="scn"><h3 style="font-size:.75em">${anos.empty?'—':anos.docs[0].data().nome}</h3><p>Ano Letivo</p></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px"><div class="card"><div class="card-h"><h3>📊 Classes</h3></div><div class="card-b"><div style="height:160px"><canvas id="chD1"></canvas></div></div></div><div class="card"><div class="card-h"><h3>📊 Género</h3></div><div class="card-b"><div style="height:160px"><canvas id="chD2"></canvas></div></div></div></div>${logsH?`<div class="card"><div class="card-h"><h3>📋 Atividades</h3></div><div class="card-b">${logsH}</div></div>`:''} async function svAtrib(){
const profId=$('atProf').value;const profNome=$('atProf').selectedOptions[0]?.dataset?.nome||'';
const disc=$('atDisc').value;const cl=$('atCl').value;const tm=$('atTm').value;
if(!profId||!disc||!cl){notify('Preencha!','er');return}
const existing=await db.collection('escolas').doc(CSI).collection('atribuicoes')
.where('professorId','==',profId).where('disciplina','==',disc).where('classe','==',cl).get();
if(!existing.empty){notify('Já atribuído!','wn');return}
await db.collection('escolas').doc(CSI).collection('atribuicoes').add({
professorId:profId,professorNome:profNome,disciplina:disc,classe:cl,turma:tm,criadoEm:ts()});
logAct('Atribuiu '+disc+' a '+profNome);notify('Atribuído!','ok');cM();pgAtrib()}

.where('professorId','==',profId).where('disciplina','==',disc).where('classe','==',cl).get();
return!atribs.empty}

db.collection('escolas').doc(CSI).collection('anosLetivos').get()

const atribs=await db.collection('escolas').doc(CSI).collection('atribuicoes').where('professorId','==',CU.id).where('classe','==',c).get();

atribs.forEach(d=>{const t=d.data().turma;if(t)tmsAtr.add(t)});

const temTurmaEspecifica=atribs.docs.some(d=>d.data().turma);

// Calcular CT3 = (CT1 + CT2 + MAC3) / 3
async function calcCT3(aid,cl,tm,dsc,aNm){
const t1=await db.collection('escolas').doc(CSI).collection('notas').where('alunoId','==',aid).where('disciplina','==',dsc).where('trimestre','==','1º Trimestre').where('anoLetivo','==',aNm).get();
const t2=await db.collection('escolas').doc(CSI).collection('notas').where('alunoId','==',aid).where('disciplina','==',dsc).where('trimestre','==','2º Trimestre').where('anoLetivo','==',aNm).get();
const ct1=t1.empty?0:(t1.docs[0].data().mt||0);
const ct2=t2.empty?0:(t2.docs[0].data().mt||0);
const macEl=document.querySelector(`.ni[data-a="${aid}"][data-f="mac"]`);
const mac3=parseFloat(macEl?.value)||0;
const ct3=Math.round((ct1+ct2+mac3)/3);
const ct3El=document.getElementById('ct3_'+aid);
if(ct3El)ct3El.textContent=ct3||'-';
ct3El?.setAttribute('data-ct3',ct3);
return ct3}

function cN(aid){
const inps=document.querySelectorAll(`.ni[data-a="${aid}"]`);
let mac=0,npt=0,exame=0;
inps.forEach(i=>{const v=parseFloat(i.value)||0;if(i.dataset.f==='mac')mac=v;if(i.dataset.f==='npt')npt=v;if(i.dataset.f==='exame')exame=v});
const trim=$('nTr')?.value||'';const cl=$('nC')?.value||'';
const isExame=trim==='3º Trimestre'&&classeCertificado(cl);
if(isExame){
// MFD = (CT3 * 0.5) + (Exame * 0.5)
const ct3El=document.getElementById('ct3_'+aid);
const ct3=parseFloat(ct3El?.getAttribute('data-ct3'))||0;
const mfd=Math.round((ct3*0.5)+(exame*0.5));
const mfdEl=document.getElementById('mfd_'+aid);if(mfdEl)mfdEl.textContent=mfd||'-'
}else{
// MT = (MAC + NPT) / 2
const mt=npt>0?Math.round((mac+npt)/2):mac;
const mtEl=document.getElementById('mt_'+aid);if(mtEl)mtEl.textContent=mt||'-'}}

async function sN(){
const cl=$('nC').value,tm=$('nT').value,dsc=$('nD').value,tr=$('nTr').value,aId=$('nA').value;
const ad=await db.collection('escolas').doc(CSI).collection('anosLetivos').doc(aId).get();
const ano=ad.data();
if(ano.estado!=='aberto'||ano.trimestreEstado!=='aberto'||ano.trimestre!==tr){notify('Fechado!','er');return}
const aNm=ano.nome;
const isExame=tr==='3º Trimestre'&&classeCertificado(cl);
const aids=[...new Set([...document.querySelectorAll('.ni')].map(i=>i.dataset.a))];
for(const aid of aids){
const inps=document.querySelectorAll(`.ni[data-a="${aid}"]`);
const d={alunoId:aid,classe:cl,turma:tm,disciplina:dsc,trimestre:tr,anoLetivo:aNm};
inps.forEach(i=>{d[i.dataset.f]=parseFloat(i.value)||0});
if(isExame){
// Buscar CT1 e CT2 para calcular CT3
const t1q=await db.collection('escolas').doc(CSI).collection('notas').where('alunoId','==',aid).where('disciplina','==',dsc).where('trimestre','==','1º Trimestre').where('anoLetivo','==',aNm).get();
const t2q=await db.collection('escolas').doc(CSI).collection('notas').where('alunoId','==',aid).where('disciplina','==',dsc).where('trimestre','==','2º Trimestre').where('anoLetivo','==',aNm).get();
const ct1=t1q.empty?0:(t1q.docs[0].data().mt||0);
const ct2=t2q.empty?0:(t2q.docs[0].data().mt||0);
d.ct3=Math.round((ct1+ct2+(d.mac||0))/3);
d.mt=Math.round((d.ct3*0.5)+((d.exame||0)*0.5)) // MFD para 3T exame
}else{
// MT = (MAC + NPT) / 2
d.mt=(d.npt||0)>0?Math.round(((d.mac||0)+(d.npt||0))/2):(d.mac||0)}
const ex=await db.collection('escolas').doc(CSI).collection('notas').where('alunoId','==',aid).where('disciplina','==',dsc).where('trimestre','==',tr).where('anoLetivo','==',aNm).get();
if(!ex.empty)await ex.docs[0].ref.update(d);else await db.collection('escolas').doc(CSI).collection('notas').add(d)}
logAct('Notas: '+dsc+' '+cl);notify('Salvas!','ok')}

async function pgPautas(){

</div><div id="pgDiv"></div></div></div>`}

async function loadPauta(){
const anoLet=$('pgAno').value,cl=$('pgCl').value,tm=$('pgTm').value,trimF=$('pgTrim').value;
if(!cl){notify('Classe!','er');return}
let qAl=db.collection('escolas').doc(CSI).collection('alunos').where('classe','==',cl);
if(tm)qAl=qAl.where('turma','==',tm);
const alsSnap=await qAl.get();
const alunos=[...alsSnap.docs].map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
let qN=db.collection('escolas').doc(CSI).collection('notas').where('classe','==',cl).where('anoLetivo','==',anoLet);
if(tm)qN=qN.where('turma','==',tm);
if(trimF)qN=qN.where('trimestre','==',trimF);
const notasSnap=await qN.get();
const discSet=new Set();const notasByAluno={};
notasSnap.forEach(d=>{const n=d.data();discSet.add(n.disciplina);if(!notasByAluno[n.alunoId])notasByAluno[n.alunoId]={};if(!notasByAluno[n.alunoId][n.disciplina])notasByAluno[n.alunoId][n.disciplina]={};notasByAluno[n.alunoId][n.disciplina][n.trimestre]=n});
const disciplinas=[...discSet].sort();
const trims=trimF?[trimF]:['1º Trimestre','2º Trimestre','3º Trimestre'];
const isAnual=!trimF; // Quando todos trimestres, mostrar MFD
const mx=notaMax(cl);
const lim=isPrimario(cl)?5:10;

// Construir cabeçalho
let thD='';
disciplinas.forEach(disc=>{
trims.forEach(tr=>{
const ex=tr==='3º Trimestre'&&classeCertificado(cl);
if(ex){thD+=`<th style="font-size:.5em">${disc.substring(0,3)}<br>3T MAC</th><th style="font-size:.5em">${disc.substring(0,3)}<br>CT3</th><th style="font-size:.5em">${disc.substring(0,3)}<br>Exame</th><th style="font-size:.5em">${disc.substring(0,3)}<br>MFD</th>`}
else{thD+=`<th style="font-size:.5em">${disc.substring(0,3)}<br>${tr.substring(0,2)} MAC</th><th style="font-size:.5em">${disc.substring(0,3)}<br>${tr.substring(0,2)} NPT</th><th style="font-size:.5em">${disc.substring(0,3)}<br>${tr.substring(0,2)} MT</th>`}});
if(isAnual)thD+=`<th style="font-size:.5em;background:#283593">${disc.substring(0,3)}<br>MFD</th>`});

let body='';
alunos.forEach((al,idx)=>{
let tMFD=0,cMFD=0,tds='';
disciplinas.forEach(disc=>{
const dn=notasByAluno[al.id]?.[disc]||{};
let mfds=[];
trims.forEach(tr=>{
const n=dn[tr];
const ex=tr==='3º Trimestre'&&classeCertificado(cl);
if(ex){
const mac=n?.mac||'-';const ct3=n?.ct3||'-';const exame=n?.exame||'-';const mfd=n?.mt||'-';
const ok=typeof mfd==='number'&&mfd>=lim;
tds+=`<td>${mac}</td><td>${ct3}</td><td>${exame}</td><td class="${typeof mfd==='number'?(ok?'nota-ok':'nota-dg'):''}">${mfd}</td>`;
if(typeof mfd==='number')mfds.push(mfd)
}else{
const mac=n?.mac||'-';const npt=n?.npt||'-';const mt=n?.mt||'-';
const ok=typeof mt==='number'&&mt>=lim;
tds+=`<td>${mac}</td><td>${npt}</td><td class="${typeof mt==='number'?(ok?'nota-ok':'nota-dg'):''}">${mt}</td>`;
if(typeof mt==='number')mfds.push(mt)}});
if(isAnual){
const mfd=mfds.length?Math.round(mfds.reduce((a,b)=>a+b,0)/mfds.length):'-';
tds+=`<td style="font-weight:700" class="${typeof mfd==='number'?(mfd>=lim?'nota-ok':'nota-dg'):''}">${mfd}</td>`;
if(typeof mfd==='number'){tMFD+=mfd;cMFD++}}});
const mg=cMFD?Math.round(tMFD/cMFD):'-';
let obs='';if(al.estado==='transferido')obs='Transf.';else if(al.estado==='desistente')obs='Desist.';else if(typeof mg==='number')obs=mg>=lim?'Aprov.':'Reprov.';
body+=`<tr><td>${idx+1}</td><td class="nome">${al.nome}</td>${tds}${isAnual?`<td style="font-weight:700">${mg}</td><td>${obs}</td>`:''}</tr>`});

$('pgDiv').innerHTML=`<h4 style="font-size:.76em;margin:4px 0">${cl}${tm?' / '+tm:''} — ${anoLet}${trimF?' — '+trimF:' (Anual)'}</h4>
<div class="tbl"><table class="pauta-tbl" id="pautaG"><tr><th>#</th><th style="text-align:left;min-width:80px">Nome</th>${thD}${isAnual?'<th>MG</th><th>Obs</th>':''}</tr>${body||'<tr><td colspan="20">—</td></tr>'}</table></div>
<div class="btn-group mt-2"><button class="btn btn-ok" onclick="expPXL()">📊 XLSX</button><button class="btn btn-s" onclick="expPPDF()">📄 PDF</button></div>`}

function expPXL(){const t=document.querySelector('#pautaG');if(!t)return;const wb=XLSX.utils.table_to_book(t);XLSX.writeFile(wb,'Pauta.xlsx');notify('XLSX!','ok')}
function expPPDF(){const{jsPDF}=window.jspdf;const pdf=new jsPDF('l');pdf.setFontSize(10);pdf.text('PAUTA — '+CS.nome,148,8,{align:'center'});const t=document.querySelector('#pautaG');if(t)pdf.autoTable({html:t,startY:13,theme:'grid',headStyles:{fillColor:[26,35,126],fontSize:4.5},styles:{fontSize:5,cellPadding:1.2},columnStyles:{1:{halign:'left'}}});pdf.save('Pauta.pdf');notify('PDF!','ok')}

async function buscarAlunoHist(){
const nm=$('hNm').value.trim().toLowerCase();
if(!nm||nm.length<3){notify('Digite 3 letras+','er');return}
const als=await db.collection('escolas').doc(CSI).collection('alunos').get();
const m=[];als.forEach(d=>{const a=d.data();if(a.nome?.toLowerCase().includes(nm))m.push({id:d.id,...a})});
if(!m.length){$('histDiv').innerHTML='<p style="color:var(--txl)">Nenhum encontrado</p>';return}
let r='';m.sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).forEach(a=>{
r+=`<tr><td>${a.nome}</td><td>${a.classe||''}</td><td><button class="btn btn-sm btn-inf" onclick="editHistNotas('${a.id}','${a.nome.replace(/'/g,"\\'")}')">📝 Editar</button></td></tr>`});
$('histDiv').innerHTML=`<table><tr><th>Nome</th><th>Classe</th><th></th></tr>${r}</table>`}

async function editHistNotas(aid,nome){
const histSnap=await db.collection('escolas').doc(CSI).collection('histNotas').where('alunoId','==',aid).get();
const hist={};histSnap.forEach(d=>{const h=d.data();if(!hist[h.classe])hist[h.classe]={};hist[h.classe][h.disciplina]=h});
const discSnap=await db.collection('escolas').doc(CSI).collection('disciplinas').get();
const disciplinas=[...discSnap.docs].map(d=>d.data().nome).sort();
const aluno=await db.collection('escolas').doc(CSI).collection('alunos').doc(aid).get();
const classeAtual=aluno.data().classe||'';
// Determinar classes anteriores
let classesAnt=[];
if(classeAtual.includes('6ª'))classesAnt=['1ª Classe','2ª Classe','3ª Classe','4ª Classe','5ª Classe'];
else if(classeAtual.includes('9ª'))classesAnt=['7ª Classe','8ª Classe'];
else if(classeAtual.includes('12ª'))classesAnt=['10ª Classe','11ª Classe'];
else{notify('Aluno não está em 6ª, 9ª ou 12ª','wn');return}
let f='';
classesAnt.forEach(cl=>{
f+=`<h4 style="margin:5px 0;font-size:.78em;color:var(--p)">${cl}</h4><table><tr><th>Disciplina</th><th>MFD</th></tr>`;
disciplinas.forEach(disc=>{
const val=hist[cl]?.[disc]?.mediaFinal||'';
f+=`<tr><td>${disc}</td><td><input type="number" min="0" max="${notaMax(cl)}" value="${val}" class="hni" data-cl="${cl}" data-disc="${disc}" style="width:45px"></td></tr>`});
f+=`</table>`});
$('mB').className='modal lg';
$('mB').innerHTML=`<div class="mh"><h3>📚 ${nome}</h3><button class="mx" onclick="cM()">×</button></div><div class="mb">${f}</div><div class="mf"><button class="btn btn-p" onclick="salvarHistNotas('${aid}')">💾 Salvar</button></div>`;oM()}

async function salvarHistNotas(aid){
const inps=document.querySelectorAll('.hni');
for(const inp of inps){
const cl=inp.dataset.cl;const disc=inp.dataset.disc;const val=parseFloat(inp.value)||0;
if(val<=0)continue;
const ex=await db.collection('escolas').doc(CSI).collection('histNotas').where('alunoId','==',aid).where('classe','==',cl).where('disciplina','==',disc).get();
if(!ex.empty)await ex.docs[0].ref.update({mediaFinal:val});
else await db.collection('escolas').doc(CSI).collection('histNotas').add({alunoId:aid,classe:cl,disciplina:disc,mediaFinal:val,criadoEm:ts()})}
notify('Histórico salvo!','ok');cM()}

// Buscar notas das classes anteriores (sistema + histórico)
async function getNotasCert(aid,classeAtual){
let classesAnt=[];
if(classeAtual.includes('6ª'))classesAnt=['1ª Classe','2ª Classe','3ª Classe','4ª Classe','5ª Classe','6ª Classe'];
else if(classeAtual.includes('9ª'))classesAnt=['7ª Classe','8ª Classe','9ª Classe'];
else if(classeAtual.includes('12ª'))classesAnt=['10ª Classe','11ª Classe','12ª Classe'];
// Notas do sistema (classes atuais)
const notasSnap=await db.collection('escolas').doc(CSI).collection('notas').where('alunoId','==',aid).get();
const byDisc={};
notasSnap.forEach(d=>{const n=d.data();if(!classesAnt.includes(n.classe))return;if(!byDisc[n.disciplina])byDisc[n.disciplina]={};if(!byDisc[n.disciplina][n.classe])byDisc[n.disciplina][n.classe]=[];byDisc[n.disciplina][n.classe].push(n.mt||0)});
// Notas históricas (manuais)
const histSnap=await db.collection('escolas').doc(CSI).collection('histNotas').where('alunoId','==',aid).get();
histSnap.forEach(d=>{const h=d.data();if(!classesAnt.includes(h.classe))return;if(!byDisc[h.disciplina])byDisc[h.disciplina]={};if(!byDisc[h.disciplina][h.classe])byDisc[h.disciplina][h.classe]=[h.mediaFinal]});
return{classes:classesAnt,byDisc}}

async function ldFPAl(){
const cl=$('fPCl').value,tm=$('fPTm').value,nm=($('fPNm').value||'').toLowerCase();
const cfg=await db.collection('escolas').doc(CSI).collection('config').doc('financeiro').get();

let q=db.collection('escolas').doc(CSI).collection('alunos').where('estado','==','ativo');

const als=await q.get();
const sorted=[...als.docs].sort((a,b)=>(a.data().nome||'').localeCompare(b.data().nome||''));

let rows='',idx=0;
sorted.forEach(d=>{
const a=d.data();if(nm&&!a.nome.toLowerCase().includes(nm))return;
// Calcular total esperado para a classe deste aluno
let tE=0;emols.forEach(em=>{if(!em.classes||em.classes.length===0||em.classes.includes(a.classe))tE+=(em.valor||0)});

rows+=`<tr><td>${idx}</td><td>${a.nome}</td><td>${a.classe||''}</td><td>${tE.toLocaleString()} Kz</td><td>${pago.toLocaleString()} Kz</td><td style="color:${div>0?'var(--s)':'var(--ok)'};font-weight:700">${div>0?div.toLocaleString()+' Kz':'✅'}</td><td><button class="btn btn-sm btn-ok" onclick="regPag('${d.id}','${a.nome.replace(/'/g,"\\'")}','${a.classe||''}')">💰</button></td></tr>`});

async function bkpEscJSON(){

for(const col of['usuarios','alunos','notas','classes','turmas','disciplinas','turnos','anosLetivos','config','atribuicoes','histNotas','pagamentos','financeiro','patrimonio','eventos','faltas','presencas','mensagens','logs']){

XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ad),'Alunos');

async function restaurarEsc(){

if(!confirm('Restaurar dados? Pode duplicar registos existentes.'))return;
const rd=new FileReader();
rd.onload=async(e)=>{try{const data=JSON.parse(e.target.result);
for(const[col,docs]of Object.entries(data.cols||{})){
for(const doc of docs)await db.collection('escolas').doc(CSI).collection(col).add(doc)}
notify('Restaurado com sucesso!','ok')}catch(err){notify('Erro: '+err.message,'er')}};
rd.readAsText(f)}

// ===== LOGS =====
async function pgLogs(){const s=await db.collection('escolas').doc(CSI).collection('logs').orderBy('criadoEm','desc').limit(80).get();let r='';s.forEach(d=>{const l=d.data();r+=`<div class="log-item"><span style="color:var(--txl);font-size:.68em;margin-right:4px">${l.data?new Date(l.data).toLocaleString('pt-AO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}</span><strong>${l.usuario}</strong> — ${l.acao}</div>`});$('eC').innerHTML=`<div class="card"><div class="card-h"><h3>📋 Atividades</h3></div><div class="card-b">${r||'<p>—</p>'}</div></div>`}

// ===== MENSAGENS =====
async function pgMsgs(){const us=await db.collection('escolas').doc(CSI).collection('usuarios').get();let uO='<option value="todos">📢 Todos</option>';us.forEach(d=>{if(d.id!==CU.id)uO+=`<option value="${d.id}">${d.data().nome}</option>`});const ms=await db.collection('escolas').doc(CSI).collection('mensagens').orderBy('criadoEm','desc').limit(15).get();let mh='';ms.forEach(d=>{const m=d.data();const isMe=m.deId===CU.id,isFor=m.paraId===CU.id;if(!isMe&&!isFor)return;mh+=`<div style="padding:4px;border-bottom:1px solid #f0f0f0;font-size:.72em"><strong>${isMe?'→ '+m.paraNome:m.deNome}</strong> — ${m.assunto||''}<br><span style="color:var(--txl)">${(m.mensagem||'').substring(0,60)}</span></div>`});$('eC').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px"><div class="card"><div class="card-h"><h3>✉️</h3></div><div class="card-b"><div class="fg"><select id="msgP">${uO}</select></div><div class="fg"><input id="msgA" placeholder="Assunto"></div><div class="fg"><textarea id="msgT" rows="3"></textarea></div><button class="btn btn-p" onclick="sMsg()">📨</button></div></div><div class="card"><div class="card-h"><h3>📬</h3></div><div class="card-b" style="max-height:280px;overflow-y:auto">${mh||'<p>—</p>'}</div></div></div>`}
async function sMsg(){const para=$('msgP').value,msg=$('msgT').value.trim();if(!msg)return;const base={deId:CU.id,deNome:CU.nome,assunto:$('msgA').value.trim(),mensagem:msg,lida:false,criadoEm:ts()};if(para==='todos'){const s=await db.collection('escolas').doc(CSI).collection('usuarios').get();for(const d of s.docs)if(d.id!==CU.id)await db.collection('escolas').doc(CSI).collection('mensagens').add({...base,paraId:d.id,paraNome:d.data().nome})}else{const ud=await db.collection('escolas').doc(CSI).collection('usuarios').doc(para).get();await db.collection('escolas').doc(CSI).collection('mensagens').add({...base,paraId:para,paraNome:ud.data().nome})}notify('Enviada!','ok');$('msgA').value=$('msgT').value='';pgMsgs()}

// INICIAR SISTEMA
init();
</script>
</body>
